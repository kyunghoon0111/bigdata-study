/* ===== QUIZ VIEW ===== */
function startPartQuiz(part){
  state.tab='quiz';state.page='quizView';state.quizPart=part;state.quizLevel='all';
  state.quizMode='sequential';state.quizIdx=0;state.quizAnswered=false;
  state.quizResults=[];state.quizShuffled=null;state.quizStreak=0;
  updateTabs();render();
}

function getCurrentQuizList(){
  if(state.quizMode==='random'){
    if(!state.quizShuffled) state.quizShuffled=shuffle(getQuizzesFor(state.quizPart,state.quizLevel));
    return state.quizShuffled;
  }
  return getQuizzesFor(state.quizPart,state.quizLevel);
}

function renderQuizView(){
  const qs=getCurrentQuizList();
  const q=qs[state.quizIdx];
  const subj=getSubjectForPart(state.quizPart);
  const progressPct=qs.length?Math.round(((state.quizIdx+(state.quizAnswered?1:0))/qs.length)*100):0;
  const markers=['A','B','C','D'];

  let h='<div class="page-enter">';

  // Progress bar
  h+='<div style="height:3px;background:var(--divider);border-radius:2px;overflow:hidden;margin-bottom:16px"><div style="height:100%;width:'+progressPct+'%;background:'+(subj?subj.bgColor:'var(--s1)')+';border-radius:2px;transition:width .4s var(--ease)"></div></div>';

  // Filters
  h+='<div class="chip-wrap" style="margin-bottom:16px">';
  ['all','core','advanced'].forEach(l=>{
    const label=l==='all'?'전체':l==='core'?'핵심':'심화';
    h+='<div class="chip '+(state.quizLevel===l?'active':'')+'" onclick="setQuizLevel(\''+l+'\')">'+label+'</div>';
  });
  h+='<div style="width:1px;height:20px;background:var(--border);flex-shrink:0;align-self:center"></div>';
  ['sequential','random'].forEach(m=>{
    const label=m==='sequential'?'순서':'랜덤';
    h+='<div class="chip '+(state.quizMode===m?'active':'')+'" onclick="setQuizMode(\''+m+'\')">'+label+'</div>';
  });
  h+='</div>';

  if(!q){
    h+='<div class="card-group"><div class="empty-state"><h3>퀴즈 없음</h3><p>해당 조건의 퀴즈가 없습니다.</p></div></div></div>';
    app.innerHTML=h;return;
  }

  // Streak
  if(state.quizStreak>=3){
    h+='<div style="text-align:center;margin-bottom:12px"><span class="streak-badge">'+state.quizStreak+'연속 정답!</span></div>';
  }

  h+='<div class="card-group" style="padding:20px" id="quizCard">';
  h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">';
  h+='<span style="font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums">Q'+(state.quizIdx+1)+' / '+qs.length+'</span>';
  h+='<div style="display:flex;gap:6px">';
  h+='<span class="badge '+(q.level==='core'?'badge-core':'badge-adv')+'">'+(q.level==='core'?'핵심':'심화')+'</span>';
  if(q.verificationStatus==='review_needed') h+='<span class="badge badge-review">검토필요</span>';
  h+='</div></div>';

  h+='<div style="font-size:17px;font-weight:500;line-height:1.7;margin-bottom:20px">'+esc(q.question)+'</div>';

  q.options.forEach((opt,i)=>{
    let cls='quiz-option';
    let markerContent=markers[i];
    if(state.quizAnswered){
      cls+=' disabled';
      if(i===q.answerIndex){cls+=' correct';markerContent=checkSVG();}
      else if(state.quizResults[state.quizIdx]===i&&i!==q.answerIndex){cls+=' wrong';markerContent=xSVG();}
    }
    h+='<button class="'+cls+'" onclick="answerQuiz('+i+',\''+q.id+'\','+q.answerIndex+')">';
    h+='<span class="opt-marker">'+markerContent+'</span>';
    h+='<span style="flex:1">'+esc(opt)+'</span></button>';
  });

  if(state.quizAnswered){
    const isCorrect=state.quizResults[state.quizIdx]===q.answerIndex;
    h+='<div class="explanation-box'+(isCorrect?'':' wrong-exp')+'">';
    h+='<strong>'+(isCorrect?'정답!':'오답')+'</strong>';
    h+='<p>'+esc(q.explanation)+'</p></div>';

    if(q.relatedConceptIds&&q.relatedConceptIds.length){
      h+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">관련 개념</div><div style="display:flex;flex-wrap:wrap;gap:6px">';
      q.relatedConceptIds.forEach(cid=>{
        const concept=APP_CONCEPTS.find(c=>c.id===cid);
        if(concept) h+='<button class="btn btn-xs btn-secondary" onclick="goToConcept(\''+cid+'\')">'+esc(concept.title)+'</button>';
      });
      h+='</div></div>';
    }

    h+='<div style="margin-top:20px">';

function answerQuiz(selected,qid,correct){
  if(state.quizAnswered) return;
  state.quizAnswered=true;
  state.quizResults[state.quizIdx]=selected;
  const prog=loadProgress();prog[qid]=(selected===correct);saveProgress(prog);
  if(selected!==correct){addWrong(qid,selected);state.quizStreak=0;}
  else{removeWrong(qid);state.quizStreak++;}
  incStudiedToday();
  render();
}

function nextQuiz(){state.quizIdx++;state.quizAnswered=false;render();}
function finishPartQuiz(){
  const qs=getCurrentQuizList();

function addWrong(qid,selectedIdx){
  let w=loadWrong();const ex=w.find(x=>x.qid===qid);
  if(ex){ex.count++;ex.selectedIdx=selectedIdx;ex.date=Date.now();}
  else w.push({qid,selectedIdx,count:1,date:Date.now()});
  saveWrong(w);
}

function retryWrong(qid){

/* ===== MOCK EXAM ===== */
function startMock(){
  showModal('모의고사','80문제 / 120분\n시작하시겠습니까?',[
    {label:'시작',value:true,style:'primary'},
    {label:'취소',value:false,style:'cancel'}
  ]).then(v=>{
    if(!v) return;
    state.page='mock';state.tab='home';state.mockDone=false;state.mockIdx=0;
    state.mockAnswers=new Array(80).fill(-1);state.mockTimeLeft=7200;
    let questions=[];
    SUBJECTS.forEach(s=>{
      let sq=[];
      s.parts.forEach(p=>{
        const w=MOCK_WEIGHTS[p];
        const pool=APP_QUIZZES.filter(q=>q.part===p);
        sq.push(...shuffle(pool).slice(0,w));
      });
      sq=shuffle(sq).slice(0,20);
      if(sq.length<20){
        const used=new Set(sq.map(q=>q.id));
        const extra=shuffle(APP_QUIZZES.filter(q=>q.subject===s.name&&!used.has(q.id)));
        sq.push(...extra.slice(0,20-sq.length));
      }
      questions.push(...sq);
    });
    state.mockQuestions=questions;
    if(state.mockTimer) clearInterval(state.mockTimer);
    state.mockTimer=setInterval(()=>{
      state.mockTimeLeft--;
      if(state.mockTimeLeft<=0){clearInterval(state.mockTimer);finishMock();}
      const el=document.getElementById('mock-timer');
      if(el){el.textContent=fmtTime(state.mockTimeLeft);if(state.mockTimeLeft<=600) el.classList.add('warning');}
    },1000);
    document.getElementById('tabBar').style.display='none';
    document.body.style.paddingBottom='0';
    render();
  });
}

function mockAnswer(i){state.mockAnswers[state.mockIdx]=i;render();}
function mockNav(dir){state.mockIdx+=dir;render();}
function mockGoTo(i){state.mockIdx=i;render();}

function finishMock(){
  const unanswered=state.mockAnswers.filter(a=>a<0).length;
  if(unanswered>0){
    showModal('미답변 문제','아직 '+unanswered+'문제를 풀지 않았습니다.',[
      {label:'제출',value:true,style:'danger'},
      {label:'계속 풀기',value:false,style:'cancel'}
    ]).then(v=>{if(v) doFinishMock();});
  } else {
    doFinishMock();
  }
}

function doFinishMock(){
  clearInterval(state.mockTimer);
  document.getElementById('tabBar').style.display='';
  document.body.style.paddingBottom='';

  let results={total:0,subjects:{}};
  SUBJECTS.forEach(s=>{results.subjects[s.name]={correct:0,total:20};});
  state.mockQuestions.forEach((q,i)=>{
    const isCorrect=state.mockAnswers[i]===q.answerIndex;
    if(isCorrect){results.total++;results.subjects[q.subject].correct++;}
    if(!isCorrect&&state.mockAnswers[i]>=0) addWrong(q.id,state.mockAnswers[i]);
  });
  const totalScore=results.total*5;
  const subjectScores={};
  let pass=totalScore>=240;
  SUBJECTS.forEach(s=>{const sc=results.subjects[s.name].correct*5;subjectScores[s.name]=sc;if(sc<40)pass=false;});
  const history=loadMockHistory();
  history.push({date:new Date().toLocaleString('ko-KR'),totalScore,subjectScores,pass,timeUsed:7200-state.mockTimeLeft});
  saveMockHistory(history);
  state.mockResults={results,totalScore,subjectScores,pass};
  state.page='mockResult';render();
}

  h+='<div style="font-size:17px;font-weight:600;margin-bottom:16px">파트별 정답률</div>';
  const allParts=SUBJECTS.flatMap(s=>s.parts.map(p=>({part:p,subj:s})));
  allParts.forEach(({part,subj})=>{
    const pct=getPartProgress(part);
    h+='<div style="margin-bottom:14px">';
    h+='<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">';
    h+='<span style="font-size:14px;font-weight:500">'+part+'</span>';
    h+='<span style="font-size:13px;font-weight:600;color:'+subj.bgColor+'">'+pct+'%</span></div>';
    h+='<div class="progress-bar" style="height:6px"><div class="progress-fill" style="width:'+Math.max(pct,1)+'%;background:'+subj.bgColor+'"></div></div></div>';
  });
  h+='</div>';

  // Weak parts
  const weakParts=allParts.filter(({part})=>getPartProgress(part)<50).sort((a,b)=>getPartProgress(a.part)-getPartProgress(b.part));
  if(weakParts.length){
    h+='<div class="card-group" style="padding:20px">';
    h+='<div style="font-size:17px;font-weight:600;margin-bottom:12px;color:var(--wrong)">취약 파트 (50% 미만)</div>';
    weakParts.forEach(({part,subj})=>{
      const pct=getPartProgress(part);
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:0.5px solid var(--divider)">';
      h+='<div style="display:flex;align-items:center;gap:8px"><span class="badge" style="background:var('+subj.bgVar+');color:'+subj.bgColor+'">'+subj.id+'</span>';
      h+='<span style="font-weight:500;font-size:14px">'+part+'</span></div>';
      h+='<div style="display:flex;gap:8px;align-items:center"><span style="color:var(--wrong);font-weight:600;font-size:13px">'+pct+'%</span>';
      h+='<button class="btn btn-xs btn-tinted" onclick="startPartQuiz(\''+part.replace(/'/g,"\\'")+'\')">학습</button></div></div>';
    });
    h+='</div>';
  }

  // Mock history
  const history=loadMockHistory();
  if(history.length){
    h+='<div class="card-group" style="padding:20px">';
    h+='<div style="font-size:17px;font-weight:600;margin-bottom:16px">모의고사 이력</div>';
    history.slice().reverse().forEach((hi,i)=>{
      h+='<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:0.5px solid var(--divider)">';
      h+='<div><div style="font-weight:600;font-size:15px">'+(history.length-i)+'회차</div>';
      h+='<div style="font-size:12px;color:var(--text2);margin-top:2px">'+hi.date+'</div></div>';
      h+='<div style="text-align:right"><div style="font-size:20px;font-weight:700;color:'+(hi.pass?'var(--correct)':'var(--wrong)')+'">'+hi.totalScore+'점</div>';
      h+='<div style="font-size:12px;color:'+(hi.pass?'var(--correct)':'var(--wrong)')+'">'+(hi.pass?'합격':'불합격')+'</div></div></div>';
    });
    h+='</div>';
  }

  h+='</div>';
  app.innerHTML=h;
}

/* ===== BOOKMARKS ===== */

/* ===== SWIPE HANDLING ===== */
function setupSwipe(elementId,onSwipeLeft,onSwipeRight){
  const el=document.getElementById(elementId);if(!el)return;
  let startX=0,startY=0,distX=0;
  el.addEventListener('touchstart',function(e){startX=e.touches[0].clientX;startY=e.touches[0].clientY;},{passive:true});
  el.addEventListener('touchmove',function(e){distX=e.touches[0].clientX-startX;},{passive:true});
  el.addEventListener('touchend',function(e){
    const distY=e.changedTouches[0].clientY-startY;
    if(Math.abs(distX)>60&&Math.abs(distX)>Math.abs(distY)){
      if(distX<0&&onSwipeLeft) onSwipeLeft();
      else if(distX>0&&onSwipeRight) onSwipeRight();
    }
    distX=0;
  },{passive:true});
}

/* ===== NAVIGATION ===== */
function navigate(page){
  if(page==='home'){state.tab='home';state.page='home';}
  else{state.page=page;}
  if(page!=='mock'&&state.mockTimer){
    clearInterval(state.mockTimer);
    document.getElementById('tabBar').style.display='';
    document.body.style.paddingBottom='';
  }
  updateTabs();render();
}

function toggleDark(){
  state.darkMode=!state.darkMode;
  document.documentElement.classList.toggle('dark',state.darkMode);
  localStorage.setItem(STOR_DARK,state.darkMode?'1':'0');
  document.querySelector('meta[name="theme-color"]').content=state.darkMode?'#000000':'#F5F5F7';
  if(state.page==='more') render();
}

/* ===== INIT ===== */
(function(){
  if(localStorage.getItem(STOR_DARK)==='1'){
    state.darkMode=true;
    document.documentElement.classList.add('dark');
    document.querySelector('meta[name="theme-color"]').content='#000000';
  }
  render();
})();
</script>
