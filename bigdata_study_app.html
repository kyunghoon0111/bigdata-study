 강도로 표현하여 패턴 파악","C) 시간에 따른 추세 분석","D) 단일 변수의 분포 확인"],"answerIndex":1,"explanation":"히트맵은 행렬 형태의 데이터(예: 상관행렬, 혼동행렬)를 색상의 강도로 시각화하여 변수 간 관계나 패턴을 한눈에 파악하는 데 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C005"]},{"id":"S2_P5_Q015","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"상관관계 분석","question":"순위 데이터나 비선형 단조 관계에 적합한 상관계수는?","options":["A) 피어슨 상관계수","B) 스피어만 순위 상관계수","C) 결정계수","D) 변동계수"],"answerIndex":1,"explanation":"스피어만 순위 상관계수는 데이터를 순위로 변환하여 상관을 측정하므로 순서형 데이터나 비선형이지만 단조적인 관계에 적합하다. 피어슨은 선형 관계 측정에 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C002"]},{"id":"S2_P5_Q016","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"시공간 데이터 탐색","question":"시계열 데이터 분해의 4가지 성분으로 올바르지 않은 것은?","options":["A) 추세(Trend)","B) 계절성(Seasonality)","C) 상관성(Correlation)","D) 불규칙(Irregular)"],"answerIndex":2,"explanation":"시계열 분해의 4가지 성분은 추세(Trend), 계절성(Seasonality), 순환(Cyclical), 불규칙(Irregular)이다. 상관성(Correlation)은 시계열 분해 성분이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C008"]},{"id":"S2_P5_Q017","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"시공간 데이터 탐색","question":"시계열에서 계절성(Seasonality)과 순환(Cyclical)의 차이로 가장 적절한 것은?","options":["A) 계절성은 추세가 있고 순환은 추세가 없다","B) 계절성은 일정한 주기를 가지고, 순환은 비고정적 주기를 가진다","C) 계절성은 장기적, 순환은 단기적 패턴이다","D) 계절성과 순환은 동일한 개념이다"],"answerIndex":1,"explanation":"계절성은 일정한 주기(매월, 매분기 등)로 반복되는 패턴이고, 순환은 경기 변동 등 주기가 고정되지 않은 장기적 변동이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C008"]},{"id":"S2_P5_Q018","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"다변량 데이터 탐색","question":"평행좌표 그래프(Parallel Coordinates)에 대한 설명으로 가장 적절한 것은?","options":["A) 두 변수 간 관계를 점으로 표시하는 차트이다","B) 각 변수를 평행한 축으로 두고 관측치를 선으로 연결하여 다차원 패턴을 시각화한다","C) 변수의 분포를 구간별 빈도로 표시하는 차트이다","D) 범주별 크기를 비교하는 차트이다"],"answerIndex":1,"explanation":"평행좌표 그래프는 각 변수를 평행한 수직 축으로 배치하고, 각 관측치의 변수 값을 선으로 연결하여 다차원 데이터의 패턴과 군집을 시각화한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C009"]},{"id":"S2_P5_Q019","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"다변량 데이터 탐색","question":"산점도 행렬(Pair Plot)에 대한 설명으로 가장 적절한 것은?","options":["A) 시간에 따른 추세를 보여주는 차트이다","B) 모든 변수 쌍의 산점도를 한 번에 표시하여 변수 간 관계를 전체적으로 파악한다","C) 단일 변수의 분포를 시각화한다","D) 범주형 변수의 구성 비율을 보여준다"],"answerIndex":1,"explanation":"산점도 행렬은 데이터셋의 모든 연속형 변수 쌍에 대한 산점도를 행렬 형태로 한 번에 표시하여 변수 간 관계를 전체적으로 탐색할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C009"]},{"id":"S2_P5_Q020","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"다변량 데이터 탐색","question":"t-SNE에 대한 설명으로 가장 적절한 것은?","options":["A) 분산을 최대화하는 선형 차원축소 기법이다","B) 국소적 구조(이웃 관계)를 보존하는 비선형 차원축소 기법으로 시각화에 특화되어 있다","C) 클래스 간 분산을 최대화하는 지도학습 기반 기법이다","D) 실시간 데이터 처리를 위한 스트리밍 도구이다"],"answerIndex":1,"explanation":"t-SNE는 고차원 데이터의 국소적 이웃 구조를 보존하면서 2~3차원으로 축소하는 비선형 기법이다. 시각화 전용으로 새 데이터에 변환 적용이 어렵다. A는 PCA, C는 LDA의 설명이다.","level":"advanced","verificationStatus":"verified","relatedConceptIds":["S2_P5_C010"]},{"id":"S2_P5_Q021","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"비정형 데이터 탐색","question":"TF-IDF에 대한 설명으로 가장 적절한 것은?","options":["A) 문서에서 단어의 출현 빈도만을 측정하는 지표이다","B) 단어의 문서 내 빈도(TF)와 전체 문서에서의 희귀도(IDF)를 곱하여 단어의 중요도를 측정하는 지표이다","C) 문서의 감성(긍정/부정)을 분류하는 알고리즘이다","D) 문서를 요약하는 알고리즘이다"],"answerIndex":1,"explanation":"TF-IDF는 TF(Term Frequency: 특정 문서 내 단어 빈도) × IDF(Inverse Document Frequency: 전체 문서 중 해당 단어가 드물수록 높은 값)로, 특정 문서에서 중요한 단어를 식별한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C011"]},{"id":"S2_P5_Q022","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"비정형 데이터 탐색","question":"어간 추출(Stemming)과 표제어 추출(Lemmatization)의 차이로 가장 적절한 것은?","options":["A) 둘은 동일한 기법이다","B) 어간 추출은 규칙 기반으로 어미를 자르고, 표제어 추출은 사전 기반으로 원형을 복원한다","C) 어간 추출이 표제어 추출보다 항상 정확하다","D) 표제어 추출은 불용어를 제거하는 기법이다"],"answerIndex":1,"explanation":"어간 추출(Stemming)은 규칙 기반으로 접미사를 제거하여 어간을 추출하며(running→runn), 표제어 추출(Lemmatization)은 사전을 참조하여 단어의 원형을 복원한다(running→run). 표제어 추출이 더 정확하지만 느리다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C011"]},{"id":"S2_P5_Q023","subject":"빅데이터 탐색","part":"데이터 탐색","section":"고급 데이터 탐색","subtopic":"비정형 데이터 탐색","question":"네트워크 분석에서 매개 중심성(Betweenness Centrality)이 측정하는 것은?","options":["A) 해당 노드에 연결된 엣지의 수","B) 해당 노드가 다른 노드 쌍의 최단 경로에 포함되는 정도","C) 해당 노드에서 다른 모든 노드까지의 평균 거리","D) 해당 노드의 이웃 노드들의 중요도 합"],"answerIndex":1,"explanation":"매개 중심성은 네트워크에서 한 노드가 다른 노드 쌍 간 최단 경로에 얼마나 자주 포함되는지를 측정한다. A는 연결 중심성, C는 근접 중심성, D는 고유벡터 중심성의 설명이다.","level":"advanced","verificationStatus":"verified","relatedConceptIds":["S2_P5_C012"]},{"id":"S2_P5_Q024","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"데이터 탐색 개요","question":"EDA와 CDA의 일반적인 수행 순서로 올바른 것은?","options":["A) CDA → EDA","B) EDA → CDA","C) EDA와 CDA를 동시에 수행","D) CDA만 수행하면 충분하다"],"answerIndex":1,"explanation":"일반적으로 EDA를 먼저 수행하여 데이터의 패턴과 특성을 탐색하고 가설을 도출한 후, CDA로 해당 가설을 통계적으로 검증하는 순서를 따른다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C014"]},{"id":"S2_P5_Q025","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"첨도(Kurtosis)가 높은 분포(Leptokurtic)의 특징으로 가장 적절한 것은?","options":["A) 분포가 납작하고 꼬리가 얇다","B) 분포가 뾰족하고 꼬리가 두꺼워 극단값이 많다","C) 완전히 균일한 분포이다","D) 좌우 비대칭인 분포이다"],"answerIndex":1,"explanation":"Leptokurtic(양의 초과첨도)은 정규분포보다 뾰족하고 꼬리가 두꺼운 분포로, 극단값(이상값)이 많이 나타날 수 있다. A는 Platykurtic(음의 초과첨도), D는 왜도와 관련된 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C013"]},{"id":"S2_P6_Q001","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"데이터요약","question":"다음 중 기술통계(Descriptive Statistics)에 대한 설명으로 가장 적절한 것은?","options":["A) 표본 데이터를 기반으로 모집단의 특성을 추론한다","B) 수집된 데이터의 특성을 수치나 그래프로 요약·정리한다","C) 가설검정을 통해 통계적 유의성을 판단한다","D) 신뢰구간을 설정하여 모수의 범위를 추정한다"],"answerIndex":1,"explanation":"기술통계는 수집된 데이터 자체를 요약·정리하는 방법이다. A, C, D는 모두 추론통계에 해당하는 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C001"]},{"id":"S2_P6_Q002","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"데이터요약","question":"교차표(분할표)에서 기대빈도를 구하는 공식으로 올바른 것은?","options":["A) (행 합계 + 열 합계) / 전체 합계","B) (행 합계 × 열 합계) / 전체 합계","C) (행 합계 × 열 합계) × 전체 합계","D) (행 합계 - 열 합계) / 전체 합계"],"answerIndex":1,"explanation":"기대빈도 = (행 합계 × 열 합계) / 전체 합계이다. 이 공식은 카이제곱 검정에서 관측빈도와 비교할 때 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C002"]},{"id":"S2_P6_Q003","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본추출","question":"모집단을 동질적인 여러 층(Stratum)으로 나눈 뒤, 각 층에서 독립적으로 표본을 추출하는 방법은?","options":["A) 군집추출","B) 체계적 추출","C) 층화추출","D) 단순무작위추출"],"answerIndex":2,"explanation":"층화추출은 모집단을 동질적 층으로 나누고 각 층에서 독립적으로 추출한다. 군집추출은 이질적 군집으로 나눠 군집 단위로 선택하는 것으로, 층화추출과 반대 개념이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C003"]},{"id":"S2_P6_Q004","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본추출","question":"다음 중 층화추출과 군집추출에 대한 비교로 올바르지 않은 것은?","options":["A) 층화추출은 층 내 동질성, 층 간 이질성을 전제로 한다","B) 군집추출은 군집 내 이질성, 군집 간 동질성을 전제로 한다","C) 층화추출은 모든 층에서 표본을 추출한다","D) 군집추출은 모든 군집에서 표본을 추출한다"],"answerIndex":3,"explanation":"군집추출은 무작위로 선택된 일부 군집만 조사하며, 모든 군집에서 추출하지 않는다. 반면 층화추출은 모든 층에서 표본을 추출한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C003"]},{"id":"S2_P6_Q005","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본추출","question":"표본 크기를 4배로 늘리면 표본 오차(표준오차)는 어떻게 변하는가?","options":["A) 1/4로 줄어든다","B) 1/2로 줄어든다","C) 변하지 않는다","D) 2배로 늘어난다"],"answerIndex":1,"explanation":"표준오차(SE) = σ/√n이므로 n이 4배가 되면 √n이 2배가 되어 SE는 1/2로 줄어든다. 표본 오차는 표본 크기의 제곱근에 반비례한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C004","S2_P6_C008"]},{"id":"S2_P6_Q006","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본추출","question":"다음 중 비표본 오차(Non-sampling Error)에 해당하는 것은?","options":["A) 모집단에서 일부만 추출하여 발생하는 오차","B) 표본 크기가 작아서 발생하는 오차","C) 설문 응답자의 무응답이나 허위 응답으로 발생하는 오차","D) 무작위 추출 과정에서의 우연적 변동"],"answerIndex":2,"explanation":"비표본 오차는 측정 오류, 무응답 편향, 허위 응답 등 표본추출 외의 요인에서 발생한다. A, B, D는 표본 오차에 해당한다. 비표본 오차는 표본 크기를 늘려도 감소하지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C004"]},{"id":"S2_P6_Q007","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"이항분포 B(n, p)의 평균과 분산으로 올바른 것은?","options":["A) 평균 = np, 분산 = np","B) 평균 = np, 분산 = np(1-p)","C) 평균 = n(1-p), 분산 = np(1-p)","D) 평균 = np², 분산 = np(1-p)"],"answerIndex":1,"explanation":"이항분포의 평균은 np, 분산은 np(1-p)이다. 포아송 분포는 평균=분산=λ인 점과 구별하라.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C005"]},{"id":"S2_P6_Q008","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"포아송 분포의 특징으로 가장 적절한 것은?","options":["A) 성공/실패의 이진 결과를 가지는 1회 시행의 분포이다","B) 평균과 분산이 동일하며 단위 시간당 사건 발생 횟수를 모델링한다","C) 연속형 확률변수의 대칭적 종 모양 분포이다","D) 비복원 추출에서 성공 횟수의 분포이다"],"answerIndex":1,"explanation":"포아송 분포는 단위 시간/공간당 사건 발생 횟수를 모델링하며 평균=분산=λ이다. A는 베르누이, C는 정규분포, D는 초기하분포에 대한 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C005"]},{"id":"S2_P6_Q009","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"정규분포에서 μ±2σ 범위에 포함되는 데이터의 비율은 약 몇 %인가?","options":["A) 약 68%","B) 약 90%","C) 약 95%","D) 약 99.7%"],"answerIndex":2,"explanation":"68-95-99.7 규칙에 따라 μ±1σ에 68%, μ±2σ에 약 95%, μ±3σ에 99.7%가 포함된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C006"]},{"id":"S2_P6_Q010","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"다음 중 표준정규분포로의 변환(Z-변환) 공식으로 올바른 것은?","options":["A) Z = (X + μ) / σ","B) Z = (X - μ) / σ","C) Z = (X - σ) / μ","D) Z = (μ - X) / σ"],"answerIndex":1,"explanation":"Z = (X - μ) / σ이며, 이를 통해 N(μ, σ²)을 N(0, 1)로 변환한다. Z값은 원래 값이 평균으로부터 몇 표준편차 떨어져 있는지를 나타낸다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C006"]},{"id":"S2_P6_Q011","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"다음 중 t분포에 대한 설명으로 올바르지 않은 것은?","options":["A) 모분산을 모를 때 사용한다","B) 자유도가 커질수록 정규분포에 수렴한다","C) 정규분포보다 꼬리가 두껍다","D) 자유도와 관계없이 항상 동일한 형태를 가진다"],"answerIndex":3,"explanation":"t분포는 자유도에 따라 형태가 달라진다. 자유도가 작으면 꼬리가 두껍고, 자유도가 커지면 정규분포에 가까워진다. D는 틀린 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C007"]},{"id":"S2_P6_Q012","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"확률분포","question":"분산분석(ANOVA)에서 집단 간 분산과 집단 내 분산의 비를 검정할 때 사용하는 분포는?","options":["A) 정규분포","B) t분포","C) 카이제곱 분포","D) F분포"],"answerIndex":3,"explanation":"F분포는 두 분산의 비로 정의되며 ANOVA에서 집단 간 분산/집단 내 분산의 비를 검정하는 데 사용한다. t검정은 두 집단 평균 비교, 카이제곱은 적합도·독립성 검정에 주로 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C007","S2_P6_C012"]},{"id":"S2_P6_Q013","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본분포","question":"중심극한정리(CLT)에 대한 설명으로 가장 적절한 것은?","options":["A) 모집단이 정규분포를 따라야만 적용할 수 있다","B) 표본 크기가 충분히 크면 표본평균의 분포는 모집단 분포와 관계없이 정규분포에 근사한다","C) 표본 크기가 클수록 표본평균의 분산이 증가한다","D) 표본 크기가 정확히 30 이상이어야만 적용 가능하다"],"answerIndex":1,"explanation":"CLT는 모집단 분포와 무관하게 표본 크기가 충분히 크면 표본평균이 정규분포에 근사한다는 정리이다. n≥30은 자주 쓰이는 경험칙이며 절대 기준은 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C008"]},{"id":"S2_P6_Q014","subject":"빅데이터 탐색","part":"통계기법 이해","section":"기술통계","subtopic":"표본분포","question":"모집단의 평균이 μ, 표준편차가 σ일 때, 크기 n인 표본평균의 표준오차(SE)는?","options":["A) σ/n","B) σ/√n","C) σ²/n","D) σ × √n"],"answerIndex":1,"explanation":"표본평균의 표준오차(SE) = σ/√n이다. 표본 크기가 커지면 표준오차는 줄어들어 추정이 더 정밀해진다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C008"]},{"id":"S2_P6_Q015","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"점추정","question":"다음 중 좋은 추정량의 성질이 아닌 것은?","options":["A) 불편성(Unbiasedness)","B) 효율성(Efficiency)","C) 강건성(Robustness)","D) 일치성(Consistency)"],"answerIndex":2,"explanation":"좋은 추정량의 4가지 성질은 불편성, 효율성, 일치성, 충분성이다. 강건성(Robustness)은 이상값에 대한 민감도를 나타내는 개념으로 추정량의 바람직한 성질 4가지에 포함되지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C009"]},{"id":"S2_P6_Q016","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"점추정","question":"표본분산을 구할 때 n이 아닌 n-1로 나누는 이유로 가장 적절한 것은?","options":["A) 계산을 단순화하기 위해","B) 모분산의 불편추정량을 얻기 위해","C) 표본 크기를 보정하기 위해","D) 정규분포를 가정하기 위해"],"answerIndex":1,"explanation":"n으로 나누면 모분산을 과소추정하는 편향이 생긴다. n-1(자유도)로 나누면 E(S²) = σ²가 되어 모분산의 불편추정량이 된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C009"]},{"id":"S2_P6_Q017","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"구간추정","question":"95% 신뢰구간의 올바른 해석은?","options":["A) 모수가 이 구간 안에 있을 확률이 95%이다","B) 같은 방법으로 반복 추출하면 약 95%의 구간이 모수를 포함한다","C) 표본평균이 이 구간 안에 있을 확률이 95%이다","D) 다음 관측값이 이 구간에 포함될 확률이 95%이다"],"answerIndex":1,"explanation":"신뢰구간의 빈도론적 해석: 동일 방법으로 100번 구간을 만들면 약 95번은 모수를 포함한다. A는 흔한 오해이다. 모수는 고정된 값이므로 '확률'의 대상이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C010"]},{"id":"S2_P6_Q018","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"구간추정","question":"신뢰구간의 폭을 좁히기 위한 방법으로 적절하지 않은 것은?","options":["A) 표본 크기를 늘린다","B) 신뢰수준을 낮춘다","C) 모집단의 분산을 줄인다","D) 신뢰수준을 높인다"],"answerIndex":3,"explanation":"신뢰수준을 높이면(예: 95%→99%) 구간이 넓어진다. 구간을 좁히려면 표본 크기를 늘리거나 신뢰수준을 낮추거나 모분산이 작아야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C010"]},{"id":"S2_P6_Q019","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"귀무가설이 실제로 참인데 이를 기각하는 오류는?","options":["A) 제1종 오류(α 오류)","B) 제2종 오류(β 오류)","C) 표본 오차","D) 비표본 오차"],"answerIndex":0,"explanation":"제1종 오류(α)는 H₀가 참인데 기각하는 것이다. 제2종 오류(β)는 H₀가 거짓인데 채택하는 것이다. 유의수준 α는 제1종 오류의 최대 허용 확률이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C011"]},{"id":"S2_P6_Q020","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"검정력(Power)에 대한 설명으로 올바른 것은?","options":["A) 귀무가설이 참일 때 이를 채택할 확률","B) 귀무가설이 거짓일 때 이를 올바르게 기각할 확률","C) 제1종 오류를 범할 확률","D) 표본 크기와 무관한 고정된 값"],"answerIndex":1,"explanation":"검정력(Power) = 1 - β로, H₀가 거짓일 때 올바르게 기각할 확률이다. 표본 크기가 클수록, 효과 크기가 클수록, 유의수준이 클수록 검정력이 높아진다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C011"]},{"id":"S2_P6_Q021","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"세 집단 이상의 평균을 동시에 비교하고자 할 때 사용하는 검정 방법은?","options":["A) 대응표본 t검정","B) 독립표본 t검정","C) 분산분석(ANOVA)","D) 카이제곱 독립성 검정"],"answerIndex":2,"explanation":"ANOVA는 세 집단 이상의 평균 차이를 동시에 비교하는 검정이다. t검정은 두 집단까지만 비교 가능하며, 카이제곱 독립성 검정은 범주형 변수 간 관계를 분석한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C012"]},{"id":"S2_P6_Q022","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"동일 집단에 대해 처리 전과 처리 후의 평균 차이를 검정할 때 적절한 방법은?","options":["A) 독립표본 t검정","B) 대응표본 t검정","C) 일원분산분석(One-way ANOVA)","D) 카이제곱 적합도 검정"],"answerIndex":1,"explanation":"대응표본(쌍체) t검정은 동일 집단의 전후 비교에 사용한다. 독립표본 t검정은 서로 다른 두 집단의 비교이며, ANOVA는 세 집단 이상 비교에 사용한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C012"]},{"id":"S2_P6_Q023","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"p-value에 대한 설명으로 올바르지 않은 것은?","options":["A) 귀무가설이 참일 때 관측된 검정통계량 이상으로 극단적인 값이 나올 확률이다","B) p-value가 유의수준보다 작으면 귀무가설을 기각한다","C) p-value는 귀무가설이 참일 확률을 나타낸다","D) 표본이 크면 사소한 차이도 통계적으로 유의할 수 있다"],"answerIndex":2,"explanation":"p-value는 '귀무가설이 참일 확률'이 아니다. 귀무가설이 참이라는 가정 하에 현재 데이터 이상으로 극단적인 결과가 나올 확률이다. 이 오해는 매우 빈출되는 포인트이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C013"]},{"id":"S2_P6_Q024","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"가설검정","question":"가설검정의 올바른 순서는?","options":["A) 검정통계량 계산 → 가설 설정 → 유의수준 결정 → 결론","B) 가설 설정 → 유의수준 결정 → 검정통계량 계산 → 결론","C) 유의수준 결정 → 가설 설정 → 결론 → 검정통계량 계산","D) 가설 설정 → 검정통계량 계산 → 유의수준 결정 → 결론"],"answerIndex":1,"explanation":"올바른 순서: ①가설 설정 → ②유의수준 결정 → ③검정통계량 계산 → ④p-value/기각역 비교 → ⑤결론. 유의수준은 검정통계량을 구하기 전에 사전 설정해야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C011"]},{"id":"S2_P6_Q025","subject":"빅데이터 탐색","part":"통계기법 이해","section":"추론통계","subtopic":"구간추정","question":"모비율의 표본 크기를 결정할 때 모비율 p를 모르면 어떤 값을 사용하는 것이 가장 보수적인가?","options":["A) p = 0.1","B) p = 0.3","C) p = 0.5","D) p = 0.9"],"answerIndex":2,"explanation":"p(1-p)는 p=0.5일 때 최대값 0.25가 되므로 가장 큰 표본 크기가 산출된다. 이것이 가장 보수적인 접근으로, 모비율을 모를 때 안전하게 p=0.5를 사용한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P6_C014"]},{"id":"S3_P7_Q001","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 선정","question":"종속변수가 연속형인 예측 문제에 적합한 학습 유형은?","options":["A) 분류(Classification)","B) 회귀(Regression)","C) 군집화(Clustering)","D) 연관규칙(Association Rule)"],"answerIndex":1,"explanation":"종속변수가 연속형이면 회귀, 범주형이면 분류 문제이다. 군집화와 연관규칙은 종속변수 없이 패턴을 발견하는 비지도학습이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C001"]},{"id":"S3_P7_Q002","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 선정","question":"다음 중 비지도학습에 해당하는 것은?","options":["A) 로지스틱 회귀분석","B) 의사결정나무","C) K-평균 군집분석","D) 서포트벡터머신"],"answerIndex":2,"explanation":"K-평균 군집분석은 종속변수 없이 데이터를 유사한 그룹으로 나누는 비지도학습이다. 나머지는 모두 종속변수가 필요한 지도학습 알고리즘이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C001","S3_P7_C002"]},{"id":"S3_P7_Q003","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 선정","question":"소량의 라벨 데이터와 대량의 비라벨 데이터를 함께 사용하는 학습 방법은?","options":["A) 지도학습","B) 비지도학습","C) 준지도학습","D) 강화학습"],"answerIndex":2,"explanation":"준지도학습(Semi-supervised Learning)은 소량의 라벨 데이터와 대량의 비라벨 데이터를 함께 사용한다. 라벨링 비용이 높을 때 효과적이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C002"]},{"id":"S3_P7_Q004","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 선정","question":"환경과의 상호작용을 통해 보상을 최대화하는 행동 정책을 학습하는 방법은?","options":["A) 지도학습","B) 비지도학습","C) 준지도학습","D) 강화학습"],"answerIndex":3,"explanation":"강화학습(Reinforcement Learning)은 에이전트가 환경과 상호작용하며 보상을 최대화하는 행동 정책을 학습한다. 게임, 로보틱스, 자율주행 등에 활용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C002"]},{"id":"S3_P7_Q005","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 정의","question":"다음 중 손실함수(Loss Function)에 대한 설명으로 가장 적절한 것은?","options":["A) 모형의 하이퍼파라미터를 결정하는 함수이다","B) 모형의 예측값과 실제값 사이의 오차를 측정하는 함수이다","C) 데이터를 학습 세트와 테스트 세트로 나누는 함수이다","D) 모형의 복잡도를 증가시키는 함수이다"],"answerIndex":1,"explanation":"손실함수는 모형의 예측값과 실제값 사이의 오차를 측정한다. 모형은 이 손실함수를 최소화하는 방향으로 학습된다. 회귀의 MSE, 분류의 Cross-Entropy가 대표적이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C003"]},{"id":"S3_P7_Q006","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 정의","question":"다음 중 하이퍼파라미터에 해당하는 것은?","options":["A) 회귀분석의 회귀 계수","B) 신경망의 가중치(Weight)","C) 의사결정나무의 최대 깊이","D) 로지스틱 회귀의 절편"],"answerIndex":2,"explanation":"의사결정나무의 최대 깊이는 사용자가 학습 전에 설정하는 하이퍼파라미터이다. 회귀 계수, 가중치, 절편은 학습 과정에서 데이터로부터 결정되는 파라미터이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C011"]},{"id":"S3_P7_Q007","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"CRISP-DM의 6단계를 올바른 순서로 나열한 것은?","options":["A) 업무 이해 → 데이터 이해 → 모델링 → 데이터 준비 → 평가 → 전개","B) 데이터 이해 → 업무 이해 → 데이터 준비 → 모델링 → 평가 → 전개","C) 업무 이해 → 데이터 이해 → 데이터 준비 → 모델링 → 평가 → 전개","D) 업무 이해 → 데이터 준비 → 데이터 이해 → 모델링 → 전개 → 평가"],"answerIndex":2,"explanation":"CRISP-DM: 업무 이해 → 데이터 이해 → 데이터 준비 → 모델링 → 평가 → 전개. '데이터 이해'가 '데이터 준비'보다 먼저 와야 한다는 점에 주의.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C004"]},{"id":"S3_P7_Q008","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"CRISP-DM에서 전체 프로젝트의 가장 많은 시간을 차지하는 단계는?","options":["A) 업무 이해","B) 데이터 준비","C) 모델링","D) 평가"],"answerIndex":1,"explanation":"데이터 준비(Data Preparation) 단계가 전체 프로젝트의 약 60~70%를 차지한다. 데이터 정제, 변환, 통합 등의 작업이 포함된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C004"]},{"id":"S3_P7_Q009","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"다음 중 CRISP-DM과 KDD 프로세스를 비교한 설명으로 올바르지 않은 것은?","options":["A) CRISP-DM은 6단계, KDD는 5단계이다","B) CRISP-DM은 업무 이해 단계를 포함하지만 KDD는 포함하지 않는다","C) KDD는 전개(Deployment) 단계를 포함한다","D) CRISP-DM은 반복적 프로세스이다"],"answerIndex":2,"explanation":"KDD 프로세스는 전개(Deployment) 단계를 포함하지 않는다. KDD는 선택→전처리→변환→데이터마이닝→해석/평가의 5단계이다. 전개 단계는 CRISP-DM의 특징이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C004","S3_P7_C005"]},{"id":"S3_P7_Q010","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"SEMMA 방법론의 5단계를 올바른 순서로 나열한 것은?","options":["A) Sample → Model → Explore → Modify → Assess","B) Sample → Explore → Modify → Model → Assess","C) Select → Explore → Model → Modify → Assess","D) Sample → Explore → Model → Modify → Assess"],"answerIndex":1,"explanation":"SEMMA: Sample → Explore → Modify → Model → Assess. SAS Institute에서 제안한 방법론으로 도구 중심적 접근이다. 'Modify(변환)'가 'Model' 앞에 온다는 점에 주의.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C005"]},{"id":"S3_P7_Q011","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"모형이 학습 데이터에는 잘 맞지만 새로운 데이터에는 성능이 떨어지는 현상은?","options":["A) 과소적합(Underfitting)","B) 과대적합(Overfitting)","C) 편향(Bias)","D) 불가약 오차"],"answerIndex":1,"explanation":"과대적합은 모형이 학습 데이터의 노이즈까지 학습하여 일반화 성능이 떨어지는 현상이다. 과소적합은 반대로 모형이 너무 단순하여 학습 데이터조차 잘 설명하지 못하는 현상이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C006"]},{"id":"S3_P7_Q012","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"편향-분산 트레이드오프에서 모형 복잡도가 증가할 때 일반적으로 나타나는 현상은?","options":["A) 편향 증가, 분산 감소","B) 편향 감소, 분산 증가","C) 편향 증가, 분산 증가","D) 편향 감소, 분산 감소"],"answerIndex":1,"explanation":"모형 복잡도가 증가하면 데이터를 더 잘 학습하여 편향은 감소하지만, 노이즈까지 학습할 위험이 커져 분산이 증가한다. 이것이 편향-분산 트레이드오프이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C006"]},{"id":"S3_P7_Q013","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 절차 수립","subtopic":"분석모형 구축 절차","question":"총 오차(Total Error) = 편향² + 분산 + X에서 X는 무엇인가?","options":["A) 표본 오차","B) 불가약 오차(Irreducible Error)","C) 과대적합 오차","D) 정규화 오차"],"answerIndex":1,"explanation":"총 오차 = 편향² + 분산 + 불가약 오차이다. 불가약 오차는 데이터 자체의 노이즈에서 발생하며 어떤 모형으로도 줄일 수 없다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C006"]},{"id":"S3_P7_Q014","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"분석 도구 선정","question":"다음 중 R 언어의 특징으로 올바르지 않은 것은?","options":["A) 오픈소스 통계 프로그래밍 언어이다","B) CRAN을 통해 다양한 패키지를 제공한다","C) 범용 프로그래밍 언어로 웹 개발에 주로 사용된다","D) 통계 분석과 시각화에 강점이 있다"],"answerIndex":2,"explanation":"R은 통계 분석과 시각화에 특화된 언어이며, 범용 웹 개발 언어가 아니다. 웹 개발을 포함한 범용 프로그래밍에는 Python이 더 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C007"]},{"id":"S3_P7_Q015","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"분석 도구 선정","question":"Hadoop과 비교했을 때 Spark의 가장 큰 장점은?","options":["A) 디스크 기반 처리로 안정성이 높다","B) 인메모리 처리로 반복 연산 속도가 빠르다","C) SQL만 지원하여 사용이 간편하다","D) 단일 서버에서만 동작하여 관리가 쉽다"],"answerIndex":1,"explanation":"Spark는 인메모리(In-Memory) 처리를 통해 Hadoop의 MapReduce 대비 반복 연산에서 크게 빠른 속도를 보인다. Hadoop은 디스크 기반 처리로 안정적이나 속도가 느리다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C007"]},{"id":"S3_P7_Q016","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"데이터 분할","question":"데이터를 학습/검증/테스트로 분할할 때, 검증(Validation) 세트의 주요 용도는?","options":["A) 모형의 최종 성능을 평가한다","B) 하이퍼파라미터를 튜닝하고 모형을 선택한다","C) 모형의 파라미터를 학습한다","D) 데이터 전처리 방법을 결정한다"],"answerIndex":1,"explanation":"검증 세트는 하이퍼파라미터 튜닝과 모형 선택에 사용한다. 학습 세트는 파라미터 학습, 테스트 세트는 최종 성능 평가에 사용한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C008"]},{"id":"S3_P7_Q017","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"데이터 분할","question":"다음 중 Data Leakage에 대한 설명으로 가장 적절한 것은?","options":["A) 학습 데이터가 부족하여 모형 성능이 낮아지는 현상","B) 테스트 세트 정보가 학습 과정에 유입되어 성능이 과대평가되는 현상","C) 데이터가 외부로 유출되는 보안 사고","D) 모형의 파라미터가 수렴하지 않는 현상"],"answerIndex":1,"explanation":"Data Leakage는 테스트 데이터 또는 미래 정보가 학습에 사용되어 성능이 실제보다 과대평가되는 문제이다. 실제 운영 시 성능이 급격히 떨어지는 원인이 된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C008"]},{"id":"S3_P7_Q018","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"데이터 분할","question":"K-Fold 교차 검증에서 K=10일 때의 설명으로 올바른 것은?","options":["A) 데이터를 10개 폴드로 나누고 10번 반복하여 각각 1개 폴드를 검증에 사용한다","B) 데이터를 10개 폴드로 나누고 1번만 검증을 수행한다","C) 10개의 서로 다른 모형을 동시에 학습한다","D) 전체 데이터의 10%만 학습에 사용한다"],"answerIndex":0,"explanation":"10-Fold CV는 데이터를 10개 폴드로 나눈 뒤 10번 반복하여 매번 1개 폴드를 검증에, 나머지 9개를 학습에 사용한다. 10개 성능의 평균이 최종 성능이 된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C009"]},{"id":"S3_P7_Q019","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"데이터 분할","question":"LOOCV(Leave-One-Out Cross-Validation)의 특징으로 올바르지 않은 것은?","options":["A) K-Fold에서 K=n(데이터 수)인 특수한 경우이다","B) 편향이 낮고 분산이 높다","C) 연산량이 매우 적어 대규모 데이터에 적합하다","D) 매 반복에서 1개 데이터만 검증에 사용한다"],"answerIndex":2,"explanation":"LOOCV는 n번 반복해야 하므로 연산량이 매우 크다. 대규모 데이터에는 적합하지 않다. 편향은 낮지만 분산이 높은 것이 특징이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C009"]},{"id":"S3_P7_Q020","subject":"빅데이터 모델링","part":"분석모형 설계","section":"분석 환경 구축","subtopic":"데이터 분할","question":"시계열 데이터를 분할할 때 주의해야 할 점으로 가장 적절한 것은?","options":["A) 무작위로 섞어서 분할해야 균형 잡힌 학습이 가능하다","B) 시간 순서를 유지하여 분할해야 미래 정보 유출을 방지할 수 있다","C) 층화 추출을 적용하여 각 기간의 비율을 동일하게 해야 한다","D) 테스트 세트를 가장 오래된 데이터로 구성해야 한다"],"answerIndex":1,"explanation":"시계열 데이터는 시간 순서를 유지하여 과거 데이터로 학습하고 미래 데이터로 검증해야 한다. 무작위 분할 시 미래 정보가 학습에 유입되는 Data Leakage가 발생한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P7_C010"]},{"id":"S3_P8_Q001","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"회귀분석","question":"다중 회귀분석에서 독립변수를 추가했을 때 항상 증가하는 값은?","options":["A) 조정된 R²","B) R²(결정계수)","C) F 통계량","D) 잔차 제곱합"],"answerIndex":1,"explanation":"R²는 독립변수를 추가하면 항상 증가하거나 같다(감소 불가). 따라서 다중 회귀에서는 변수 수를 보정한 조정된 R²를 사용해야 모형의 진정한 설명력을 평가할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C001"]},{"id":"S3_P8_Q002","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"회귀분석","question":"다음 중 회귀분석의 기본 가정이 아닌 것은?","options":["A) 독립변수와 종속변수의 선형 관계","B) 잔차의 정규성","C) 잔차의 등분산성","D) 독립변수 간 높은 상관관계"],"answerIndex":3,"explanation":"독립변수 간 높은 상관관계는 다중공선성 문제로 오히려 회귀분석의 가정을 위반한다. 기본 가정은 선형성, 독립성, 등분산성, 정규성(잔차)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C001","S3_P8_C002"]},{"id":"S3_P8_Q003","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"회귀분석","question":"VIF(분산팽창인자)가 10 이상일 때 의미하는 것은?","options":["A) 모형의 설명력이 높다","B) 심각한 다중공선성이 존재한다","C) 잔차의 정규성이 확보되었다","D) 과소적합이 발생하고 있다"],"answerIndex":1,"explanation":"VIF 4 이상이면 주의, 10 이상이면 심각한 다중공선성으로 판단한다. 다중공선성이 존재하면 회귀계수 추정이 불안정해지므로 변수 제거나 정규화 등의 조치가 필요하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C002"]},{"id":"S3_P8_Q004","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"로지스틱 회귀분석","question":"로지스틱 회귀분석에서 파라미터 추정에 사용하는 방법은?","options":["A) 최소제곱법(OLS)","B) 최대우도추정법(MLE)","C) 경사하강법만 사용","D) 주성분 분석"],"answerIndex":1,"explanation":"로지스틱 회귀는 종속변수가 이진이므로 OLS를 사용할 수 없고, 최대우도추정법(MLE)으로 파라미터를 추정한다. 이는 선형 회귀(OLS)와의 핵심 차이이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C003"]},{"id":"S3_P8_Q005","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"로지스틱 회귀분석","question":"오즈비(Odds Ratio)가 2.5인 독립변수에 대한 해석으로 올바른 것은?","options":["A) 해당 변수가 1단위 증가하면 사건 발생 확률이 2.5%p 증가한다","B) 해당 변수가 1단위 증가하면 사건 발생 오즈가 2.5배가 된다","C) 해당 변수가 1단위 증가하면 사건 발생 확률이 2.5배가 된다","D) 해당 변수는 종속변수와 관련이 없다"],"answerIndex":1,"explanation":"오즈비(OR) 2.5는 해당 변수가 1단위 증가할 때 오즈(성공확률/실패확률)가 2.5배 증가함을 의미한다. 확률 자체가 2.5배가 되는 것이 아니라 오즈가 2.5배이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C003"]},{"id":"S3_P8_Q006","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"의사결정나무","question":"CART 알고리즘에서 분류 기준으로 사용하는 불순도 측도는?","options":["A) 정보이득(Information Gain)","B) 엔트로피(Entropy)","C) 지니 지수(Gini Index)","D) 카이제곱 통계량"],"answerIndex":2,"explanation":"CART는 지니 지수, C4.5/C5.0은 정보이득(엔트로피 기반), CHAID는 카이제곱을 사용한다. 이 알고리즘-불순도 매칭은 매우 중요한 출제 포인트이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C004"]},{"id":"S3_P8_Q007","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"의사결정나무","question":"의사결정나무에서 과대적합을 방지하기 위한 기법은?","options":["A) 부트스트래핑","B) 가지치기(Pruning)","C) 특성 스케일링","D) 원-핫 인코딩"],"answerIndex":1,"explanation":"가지치기(Pruning)는 과도하게 성장한 트리의 불필요한 가지를 제거하여 과대적합을 방지한다. 사전 가지치기(깊이 제한 등)와 사후 가지치기(성장 후 제거)가 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C004"]},{"id":"S3_P8_Q008","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"인공신경망","question":"다음 활성화 함수 중 기울기 소실(Vanishing Gradient) 문제를 완화하기 위해 도입된 것은?","options":["A) Sigmoid","B) Tanh","C) ReLU","D) Softmax"],"answerIndex":2,"explanation":"ReLU(max(0,x))는 양수 영역에서 기울기가 1로 일정하여 시그모이드/tanh의 기울기 소실 문제를 완화한다. Softmax는 다중 분류 출력층에 사용되는 함수이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C005"]},{"id":"S3_P8_Q009","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"인공신경망","question":"인공신경망에서 오차를 출력층에서 입력층 방향으로 전파하며 가중치를 갱신하는 알고리즘은?","options":["A) 순전파(Forward Propagation)","B) 역전파(Backpropagation)","C) 경사상승법(Gradient Ascent)","D) 볼츠만 학습(Boltzmann Learning)"],"answerIndex":1,"explanation":"역전파(Backpropagation)는 출력층의 오차를 입력층 방향으로 전파하며 경사하강법으로 각 층의 가중치를 갱신한다. 순전파는 입력에서 출력 방향으로 계산하는 과정이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C005"]},{"id":"S3_P8_Q010","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"서포트벡터머신","question":"SVM에서 초평면(Hyperplane) 결정에 직접 관여하는 데이터 포인트는?","options":["A) 이상값(Outlier)","B) 서포트 벡터(Support Vector)","C) 중심점(Centroid)","D) 모든 학습 데이터"],"answerIndex":1,"explanation":"서포트 벡터는 초평면에 가장 가까운 데이터 포인트로, 이 점들만이 초평면의 위치와 방향을 결정한다. 나머지 데이터는 초평면 결정에 영향을 주지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C006"]},{"id":"S3_P8_Q011","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"서포트벡터머신","question":"SVM에서 비선형 데이터를 분류하기 위해 사용하는 기법은?","options":["A) 가지치기(Pruning)","B) 부트스트래핑(Bootstrapping)","C) 커널 트릭(Kernel Trick)","D) 드롭아웃(Dropout)"],"answerIndex":2,"explanation":"커널 트릭은 데이터를 고차원 공간으로 매핑하여 선형 분리가 가능하게 한다. 실제로 고차원 변환을 하지 않고 커널 함수로 내적만 계산하여 효율적이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C006"]},{"id":"S3_P8_Q012","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"연관성분석","question":"연관규칙 A→B에서 향상도(Lift)가 1일 때의 의미는?","options":["A) A와 B는 양의 연관관계이다","B) A와 B는 음의 연관관계이다","C) A와 B는 서로 독립이다","D) A가 B의 원인이다"],"answerIndex":2,"explanation":"향상도(Lift) = 1이면 A와 B는 통계적으로 독립이다. Lift > 1이면 양의 연관, Lift < 1이면 음의 연관관계이다. 연관관계는 인과관계를 의미하지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C007"]},{"id":"S3_P8_Q013","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"연관성분석","question":"연관규칙에서 신뢰도(Confidence)의 올바른 정의는?","options":["A) P(A∩B)","B) P(A∩B) / P(A)","C) P(A∩B) / P(B)","D) P(B|A) / P(B)"],"answerIndex":1,"explanation":"신뢰도(Confidence) = P(B|A) = P(A∩B)/P(A)로, A를 구매한 사람 중 B도 구매한 비율이다. A는 지지도, D는 향상도에 해당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C007"]},{"id":"S3_P8_Q014","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"군집분석","question":"K-평균 군집분석의 한계점으로 올바르지 않은 것은?","options":["A) K를 사전에 지정해야 한다","B) 이상값에 민감하다","C) 비구형 군집을 잘 탐지하지 못한다","D) 대규모 데이터에 적용이 불가능하다"],"answerIndex":3,"explanation":"K-평균은 계산이 효율적이어서 대규모 데이터에도 적용 가능하다. 단, K 사전 지정, 이상값 민감, 구형 군집 가정이 한계이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C008"]},{"id":"S3_P8_Q015","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"군집분석","question":"DBSCAN에서 eps 반경 내에 minPts 이상의 이웃을 가진 데이터 포인트를 무엇이라 하는가?","options":["A) 경계 포인트(Border Point)","B) 노이즈 포인트(Noise Point)","C) 핵심 포인트(Core Point)","D) 중심점(Centroid)"],"answerIndex":2,"explanation":"핵심 포인트(Core Point)는 eps 반경 내에 minPts 이상의 이웃을 가진 점이다. 경계 포인트는 핵심 포인트의 이웃이지만 자체는 핵심이 아닌 점, 노이즈는 어디에도 속하지 않는 점이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C009"]},{"id":"S3_P8_Q016","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"범주형 자료 분석","question":"카이제곱 검정의 적용이 부적절한 경우는?","options":["A) 두 범주형 변수의 독립성을 검정할 때","B) 관측 빈도와 기대 빈도의 적합도를 검정할 때","C) 기대빈도가 5 미만인 셀이 전체의 20%를 초과할 때","D) 대규모 표본에서 범주형 변수를 분석할 때"],"answerIndex":2,"explanation":"기대빈도가 5 미만인 셀이 20%를 초과하면 카이제곱 검정의 근사가 부정확해진다. 이 경우 피셔 정확 검정(Fisher's Exact Test)을 사용해야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C010"]},{"id":"S3_P8_Q017","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"다변량 분석","question":"주성분분석(PCA)에서 주성분의 수를 결정할 때 사용하는 카이저 규칙의 기준은?","options":["A) 고유값 > 0인 주성분을 선택","B) 고유값 > 1인 주성분을 선택","C) 누적 분산 비율 > 50%까지 선택","D) 가장 큰 고유값 1개만 선택"],"answerIndex":1,"explanation":"카이저 규칙은 고유값(Eigenvalue)이 1보다 큰 주성분을 선택하는 기준이다. 고유값 1은 원래 변수 1개의 설명력과 동일하므로 이보다 큰 설명력을 가진 주성분만 의미가 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C011"]},{"id":"S3_P8_Q018","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"다변량 분석","question":"PCA와 요인분석의 차이로 올바른 것은?","options":["A) PCA는 잠재요인을 추출하고 요인분석은 분산을 최대화한다","B) PCA는 분산 최대화가 목적이고 요인분석은 잠재 구조 탐색이 목적이다","C) PCA는 지도학습이고 요인분석은 비지도학습이다","D) 두 방법은 동일한 결과를 산출한다"],"answerIndex":1,"explanation":"PCA는 데이터의 분산을 최대화하는 방향으로 차원을 축소하고, 요인분석은 관측변수 뒤의 잠재요인(Latent Factor)을 발견하는 것이 목적이다. 두 방법 모두 비지도학습이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C011"]},{"id":"S3_P8_Q019","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"시계열 분석","question":"ARIMA(p,d,q) 모형에서 d가 의미하는 것은?","options":["A) 자기회귀(AR) 차수","B) 이동평균(MA) 차수","C) 차분(Differencing) 횟수","D) 계절성 주기"],"answerIndex":2,"explanation":"ARIMA(p,d,q)에서 p는 AR 차수, d는 정상성 확보를 위한 차분 횟수, q는 MA 차수이다. d=1이면 1차 차분을 수행한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C012"]},{"id":"S3_P8_Q020","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"시계열 분석","question":"시계열에서 정상성(Stationarity)을 확인하기 위한 검정은?","options":["A) 카이제곱 검정","B) ADF 검정(Augmented Dickey-Fuller)","C) F 검정","D) 샤피로-윌크 검정"],"answerIndex":1,"explanation":"ADF 검정은 단위근(Unit Root) 존재 여부를 검정하여 정상성을 확인한다. 귀무가설은 '단위근 존재(비정상)'이며, 기각하면 정상 시계열로 판단한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C012"]},{"id":"S3_P8_Q021","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"베이지안 기법","question":"베이즈 정리에서 P(A|B)를 구하기 위해 필요하지 않은 것은?","options":["A) 사전확률 P(A)","B) 우도 P(B|A)","C) 주변확률 P(B)","D) 조건부 분산 Var(A|B)"],"answerIndex":3,"explanation":"베이즈 정리: P(A|B) = P(B|A)×P(A)/P(B). 사전확률 P(A), 우도 P(B|A), 주변확률 P(B)가 필요하다. 조건부 분산은 베이즈 정리에 직접 사용되지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C013"]},{"id":"S3_P8_Q022","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"베이지안 기법","question":"나이브 베이즈(Naive Bayes) 분류기에서 '나이브'의 의미는?","options":["A) 학습 데이터가 적어도 사용 가능하다","B) 모든 특성(Feature)이 조건부 독립이라고 가정한다","C) 사전확률이 균등하다고 가정한다","D) 연속형 데이터만 처리 가능하다"],"answerIndex":1,"explanation":"'나이브(Naive)'는 모든 특성이 서로 조건부 독립이라는 강한 가정에서 유래한다. 실제로 독립이 아닌 경우에도 실용적으로 잘 작동하는 경우가 많다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C013"]},{"id":"S3_P8_Q023","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"딥러닝 분석","question":"이미지 분류에 주로 사용되며 합성곱 층과 풀링 층으로 구성된 신경망은?","options":["A) RNN","B) LSTM","C) CNN","D) GAN"],"answerIndex":2,"explanation":"CNN(합성곱 신경망)은 합성곱 층으로 공간적 특징을 추출하고 풀링 층으로 차원을 축소하여 이미지 분류에 특화되어 있다. RNN/LSTM은 순차 데이터, GAN은 생성 모형이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C014"]},{"id":"S3_P8_Q024","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"딥러닝 분석","question":"RNN의 장기 의존성 문제(기울기 소실)를 해결하기 위해 고안된 구조는?","options":["A) CNN","B) LSTM","C) Autoencoder","D) K-Means"],"answerIndex":1,"explanation":"LSTM(Long Short-Term Memory)은 셀 상태와 게이트(입력·망각·출력) 구조를 통해 RNN의 장기 의존성 문제(기울기 소실)를 해결한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C014"]},{"id":"S3_P8_Q025","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"딥러닝 분석","question":"학습 시 일부 뉴런을 무작위로 비활성화하여 과대적합을 방지하는 기법은?","options":["A) 배치 정규화(Batch Normalization)","B) 드롭아웃(Dropout)","C) 전이학습(Transfer Learning)","D) 가중치 초기화(Weight Initialization)"],"answerIndex":1,"explanation":"드롭아웃은 학습 시 뉴런을 무작위로 비활성화하여 특정 뉴런에 대한 과도한 의존을 방지한다. 배치 정규화는 학습 안정화, 전이학습은 사전 학습 모형 재활용 기법이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C015"]},{"id":"S3_P8_Q026","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비정형 데이터 분석","question":"TF-IDF에서 IDF(역문서 빈도)가 높은 단어의 특징은?","options":["A) 모든 문서에서 자주 등장하는 일반적인 단어이다","B) 특정 문서에만 등장하는 희귀한 단어이다","C) 불용어(Stopword)에 해당하는 단어이다","D) 문서 길이에 비례하여 증가하는 단어이다"],"answerIndex":1,"explanation":"IDF는 해당 단어가 포함된 문서 수의 역수(log)이므로, 적은 문서에만 등장하는 단어일수록 IDF가 높다. 반대로 모든 문서에 등장하는 단어(a, the 등)는 IDF가 낮다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C016"]},{"id":"S3_P8_Q027","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비정형 데이터 분석","question":"다음 중 단어를 벡터 공간에 매핑하여 의미적 유사성을 표현하는 기법은?","options":["A) Bag of Words(BoW)","B) TF-IDF","C) Word2Vec","D) 도수분포표"],"answerIndex":2,"explanation":"Word2Vec은 단어를 밀집 벡터로 표현하여 의미적으로 유사한 단어가 벡터 공간에서 가까이 위치한다. BoW와 TF-IDF는 희소 벡터 기반으로 의미적 유사성을 직접 반영하지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C016"]},{"id":"S3_P8_Q028","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"앙상블 분석","question":"다음 중 배깅(Bagging) 기법의 대표적인 알고리즘은?","options":["A) AdaBoost","B) XGBoost","C) 랜덤 포레스트","D) GBM"],"answerIndex":2,"explanation":"랜덤 포레스트는 배깅(부트스트랩 샘플 기반 병렬 학습)에 특성의 무작위 선택을 추가한 앙상블 기법이다. AdaBoost, XGBoost, GBM은 모두 부스팅 기법이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C017"]},{"id":"S3_P8_Q029","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"앙상블 분석","question":"앙상블 기법에서 배깅(Bagging)이 주로 감소시키는 오차 유형은?","options":["A) 편향(Bias)","B) 분산(Variance)","C) 불가약 오차","D) 표본 오차"],"answerIndex":1,"explanation":"배깅은 여러 모형의 예측을 평균/다수결로 결합하여 분산을 감소시킨다. 부스팅은 이전 모형의 오류를 보정하여 편향을 감소시킨다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C017"]},{"id":"S3_P8_Q030","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"앙상블 분석","question":"부스팅(Boosting) 기법의 특징으로 올바르지 않은 것은?","options":["A) 이전 모형의 오류를 보정하는 방향으로 순차 학습한다","B) 주로 편향을 감소시킨다","C) 각 모형이 독립적으로 병렬 학습된다","D) AdaBoost, GBM, XGBoost가 대표적이다"],"answerIndex":2,"explanation":"부스팅은 이전 모형의 결과를 기반으로 순차적으로 학습하므로 병렬 학습이 아니다. 병렬 학습은 배깅의 특징이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C017"]},{"id":"S3_P8_Q031","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비모수 통계","question":"독립 2그룹의 중앙값 차이를 검정할 때, t검정의 비모수 대안은?","options":["A) 윌콕슨 부호순위 검정","B) 만-위트니 U 검정","C) 크루스칼-왈리스 검정","D) 프리드만 검정"],"answerIndex":1,"explanation":"만-위트니 U 검정은 독립 2그룹 비교에서 t검정의 비모수 대안이다. 윌콕슨은 대응 표본, 크루스칼-왈리스는 3그룹 이상(ANOVA 대안), 프리드만은 반복측정 ANOVA 대안이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C018"]},{"id":"S3_P8_Q032","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비모수 통계","question":"다음 중 비모수 검정의 장점으로 올바른 것은?","options":["A) 모수 검정보다 검정력이 항상 높다","B) 모집단의 분포에 대한 가정이 필요하지 않다","C) 연속형 데이터에만 적용할 수 있다","D) 표본 크기가 클 때만 사용 가능하다"],"answerIndex":1,"explanation":"비모수 검정의 최대 장점은 모집단 분포에 대한 가정이 불필요하다는 것이다. 순서형 데이터에도 적용 가능하지만, 일반적으로 모수 검정보다 검정력은 낮다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C018"]},{"id":"S3_P8_Q033","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"회귀분석","question":"라쏘(Lasso) 회귀의 특징으로 올바른 것은?","options":["A) L2 규제를 사용하며 계수를 0에 가깝게 축소한다","B) L1 규제를 사용하며 일부 계수를 정확히 0으로 만든다","C) 규제 없이 최소제곱법만 사용한다","D) L1과 L2를 동시에 사용한다"],"answerIndex":1,"explanation":"라쏘(Lasso)는 L1 규제로 일부 회귀계수를 정확히 0으로 만들어 변수 선택 효과가 있다. L2는 릿지, L1+L2는 엘라스틱넷이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C021"]},{"id":"S3_P8_Q034","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"시계열 분석","question":"홀트-윈터스(Holt-Winters) 방법이 단순 지수평활과 다른 점은?","options":["A) 추세와 계절성을 모두 고려한다","B) 차분을 사용하여 정상성을 확보한다","C) AR 모형만 사용한다","D) 이상값을 자동으로 제거한다"],"answerIndex":0,"explanation":"홀트-윈터스(삼중 지수평활)는 수준+추세+계절성을 모두 고려한다. 단순 지수평활은 수준만, 홀트 방법(이중)은 수준+추세를 고려한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C020"]},{"id":"S3_P8_Q035","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"다변량 분석","question":"PCA(주성분분석)와 LDA(선형판별분석)의 차이로 올바른 것은?","options":["A) PCA는 지도학습, LDA는 비지도학습이다","B) PCA는 분산 최대화, LDA는 클래스 분리 최대화가 목적이다","C) PCA는 분류에 사용되고 LDA는 차원축소에만 사용된다","D) 두 방법 모두 종속변수가 필요하다"],"answerIndex":1,"explanation":"PCA는 비지도학습으로 전체 분산을 최대화하는 방향으로 차원을 축소하고, LDA는 지도학습으로 클래스 간 분리를 최대화하는 방향으로 차원을 축소한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S3_P8_C011","S3_P8_C019"]},{"id":"S4_P9_Q001","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"혼동행렬에서 정밀도(Precision)의 올바른 공식은?","options":["A) TP / (TP + FN)","B) TP / (TP + FP)","C) TN / (TN + FP)","D) (TP + TN) / (TP + FP + FN + TN)"],"answerIndex":1,"explanation":"정밀도 = TP/(TP+FP)로 양성으로 예측한 것 중 실제 양성의 비율이다. A는 재현율, C는 특이도, D는 정확도이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C001"]},{"id":"S4_P9_Q002","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"실제 양성 중 양성으로 올바르게 예측한 비율을 나타내는 지표는?","options":["A) 정밀도(Precision)","B) 특이도(Specificity)","C) 재현율(Recall)","D) 정확도(Accuracy)"],"answerIndex":2,"explanation":"재현율(Recall, 민감도) = TP/(TP+FN)으로 실제 양성 중 양성으로 올바르게 예측한 비율이다. 정밀도는 양성 예측 중 실제 양성 비율이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C001"]},{"id":"S4_P9_Q003","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"F1 Score에 대한 설명으로 올바른 것은?","options":["A) 정밀도와 재현율의 산술평균이다","B) 정밀도와 재현율의 조화평균이다","C) 정확도와 특이도의 기하평균이다","D) TP와 TN의 합계를 전체로 나눈 값이다"],"answerIndex":1,"explanation":"F1 Score = 2×(Precision×Recall)/(Precision+Recall)로 정밀도와 재현율의 조화평균이다. 조화평균은 두 값 중 하나가 낮으면 크게 하락하므로 두 지표의 균형을 반영한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C001"]},{"id":"S4_P9_Q004","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"ROC 곡선의 x축과 y축으로 올바른 것은?","options":["A) x축: Precision, y축: Recall","B) x축: FPR(1-특이도), y축: TPR(민감도)","C) x축: Recall, y축: Precision","D) x축: TPR, y축: FPR"],"answerIndex":1,"explanation":"ROC 곡선은 x축에 FPR(1-특이도 = FP/(FP+TN)), y축에 TPR(민감도 = TP/(TP+FN))을 배치한다. A/C는 PR 곡선에 해당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C002"]},{"id":"S4_P9_Q005","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"AUC 값이 0.5일 때의 의미는?","options":["A) 완벽한 분류 성능","B) 매우 우수한 분류 성능","C) 랜덤 분류기 수준의 성능","D) 분류가 불가능한 상태"],"answerIndex":2,"explanation":"AUC = 0.5는 랜덤으로 분류하는 것과 같은 수준이다. AUC = 1.0이면 완벽한 분류, AUC < 0.5이면 랜덤보다 못한 분류(라벨이 뒤바뀐 가능성)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C002"]},{"id":"S4_P9_Q006","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"다음 회귀 평가 지표 중 이상값에 가장 민감한 것은?","options":["A) MAE","B) MSE","C) MAPE","D) 중앙값 절대 오차"],"answerIndex":1,"explanation":"MSE는 오차를 제곱하므로 큰 오차에 더 큰 패널티를 부여한다. 따라서 이상값에 가장 민감하다. MAE는 절대값을 사용하므로 MSE보다 이상값에 덜 민감하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C003"]},{"id":"S4_P9_Q007","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"RMSE와 MSE의 관계로 올바른 것은?","options":["A) RMSE = MSE²","B) RMSE = √MSE","C) RMSE = MSE / n","D) RMSE = log(MSE)"],"answerIndex":1,"explanation":"RMSE = √MSE이다. MSE에 제곱근을 취함으로써 원래 데이터와 같은 단위로 변환되어 직관적 해석이 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C003"]},{"id":"S4_P9_Q008","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"분석모형 진단","question":"더빈-왓슨(Durbin-Watson) 통계량이 2에 가까울 때의 의미는?","options":["A) 심각한 양의 자기상관이 존재한다","B) 심각한 음의 자기상관이 존재한다","C) 잔차 간 자기상관이 없다","D) 이분산성이 존재한다"],"answerIndex":2,"explanation":"더빈-왓슨 통계량은 0~4 범위이며, 2에 가까우면 자기상관 없음, 0에 가까우면 양의 자기상관, 4에 가까우면 음의 자기상관을 의미한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C004"]},{"id":"S4_P9_Q009","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"분석모형 진단","question":"잔차(Residual) vs 예측값 산점도에서 깔때기 형태(분산이 점차 증가)가 관찰될 때 위반되는 가정은?","options":["A) 선형성","B) 독립성","C) 등분산성","D) 정규성"],"answerIndex":2,"explanation":"깔때기 형태는 예측값이 커질수록 잔차의 분산이 증가하는 이분산성(Heteroscedasticity)을 나타내며 등분산성 가정을 위반한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C004"]},{"id":"S4_P9_Q010","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"교차 검증","question":"홀드아웃(Hold-out) 검증과 비교했을 때 K-Fold 교차 검증의 장점은?","options":["A) 계산 비용이 더 적다","B) 데이터 분할에 따른 변동이 작아 성능 추정이 안정적이다","C) 학습에 사용하는 데이터가 더 적다","D) 항상 더 높은 정확도를 보장한다"],"answerIndex":1,"explanation":"K-Fold CV는 K번 반복하여 평균을 내므로 단 한 번의 분할에 의존하는 홀드아웃보다 성능 추정이 안정적이다. 단 계산 비용은 K배로 증가한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C005"]},{"id":"S4_P9_Q011","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"모수 유의성 검정","question":"회귀분석에서 개별 회귀계수의 유의성을 검정할 때 사용하는 검정은?","options":["A) F검정","B) t검정","C) 카이제곱 검정","D) ADF 검정"],"answerIndex":1,"explanation":"개별 회귀계수의 유의성은 t검정(H₀: βᵢ=0)으로 검정한다. F검정은 모형 전체의 유의성을 검정하며, 카이제곱은 범주형 변수, ADF는 정상성 검정에 사용한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C006"]},{"id":"S4_P9_Q012","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"모수 유의성 검정","question":"AIC와 BIC를 이용한 모형 비교에서 올바른 설명은?","options":["A) AIC와 BIC 값이 클수록 좋은 모형이다","B) BIC는 AIC보다 변수 수에 대한 패널티가 약하다","C) AIC와 BIC 값이 작을수록 좋은 모형이다","D) AIC와 BIC는 모형의 적합도만 평가한다"],"answerIndex":2,"explanation":"AIC/BIC는 적합도(낮은 오차)와 복잡도(변수 수) 패널티를 동시에 고려하며, 값이 작을수록 좋다. BIC가 AIC보다 변수 수에 대한 패널티가 더 강하여 더 간결한 모형을 선호한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C006"]},{"id":"S4_P9_Q013","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"적합도 검정","question":"호스머-렘쇼(Hosmer-Lemeshow) 검정에서 p-value가 0.85일 때의 해석은?","options":["A) 모형이 적합하지 않다","B) 모형이 데이터를 잘 설명한다","C) 다중공선성이 존재한다","D) 과대적합이 발생했다"],"answerIndex":1,"explanation":"호스머-렘쇼 검정의 귀무가설은 '모형이 적합하다'이므로 p-value가 크면(유의하지 않으면) 귀무가설을 기각하지 못하여 모형이 적합하다고 판단한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C007"]},{"id":"S4_P9_Q014","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"과대적합 방지","question":"다음 중 과대적합(Overfitting) 방지 기법이 아닌 것은?","options":["A) 정규화(Regularization)","B) 드롭아웃(Dropout)","C) 조기 종료(Early Stopping)","D) 특성 스케일링(Feature Scaling)"],"answerIndex":3,"explanation":"특성 스케일링(표준화, 정규화)은 변수 간 스케일 차이를 조정하는 전처리 기법이며, 직접적인 과대적합 방지 기법이 아니다. 나머지는 모두 과대적합 방지에 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C008"]},{"id":"S4_P9_Q015","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"과대적합 방지","question":"학습 곡선에서 학습 오차는 낮고 검증 오차가 높아 두 곡선의 갭이 클 때 진단은?","options":["A) 과소적합(Underfitting)","B) 과대적합(Overfitting)","C) 최적 상태","D) 데이터 부족"],"answerIndex":1,"explanation":"학습 오차가 낮고 검증 오차가 높으면(갭이 크면) 과대적합이다. 모형이 학습 데이터에만 과도하게 적합하고 새로운 데이터에는 일반화하지 못하는 상태이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C008","S4_P9_C014"]},{"id":"S4_P9_Q016","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"매개변수 최적화","question":"그리드 서치(Grid Search)의 단점으로 가장 적절한 것은?","options":["A) 최적 조합을 찾을 수 없다","B) 하이퍼파라미터 조합 수가 많으면 계산 비용이 급격히 증가한다","C) 무작위 탐색이므로 결과가 불안정하다","D) 연속형 하이퍼파라미터에 적용할 수 없다"],"answerIndex":1,"explanation":"그리드 서치는 모든 조합을 탐색하므로 하이퍼파라미터와 후보 값이 많으면 조합 수가 기하급수적으로 증가하여 비용이 매우 커진다(차원의 저주).","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C009"]},{"id":"S4_P9_Q017","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"매개변수 최적화","question":"다음 하이퍼파라미터 튜닝 방법 중 이전 평가 결과를 활용하여 유망한 영역을 집중 탐색하는 것은?","options":["A) 그리드 서치","B) 랜덤 서치","C) 베이지안 최적화","D) 수동 튜닝"],"answerIndex":2,"explanation":"베이지안 최적화는 대리 모형(Surrogate Model)을 사용하여 이전 평가 결과를 반영하고, 유망한 하이퍼파라미터 영역을 집중적으로 탐색한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C009"]},{"id":"S4_P9_Q018","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"분석모형 융합","question":"앙상블에서 소프트 투표(Soft Voting)와 하드 투표(Hard Voting)의 차이는?","options":["A) 소프트 투표는 다수결, 하드 투표는 확률 평균","B) 소프트 투표는 확률 평균, 하드 투표는 다수결","C) 두 방법에 차이가 없다","D) 소프트 투표는 회귀에, 하드 투표는 분류에 사용한다"],"answerIndex":1,"explanation":"하드 투표는 각 모형의 예측 클래스로 다수결을 하고, 소프트 투표는 각 모형의 예측 확률을 평균내어 가장 높은 확률의 클래스를 선택한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C010"]},{"id":"S4_P9_Q019","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"분석모형 융합","question":"스태킹(Stacking) 앙상블에서 메타 모형의 역할은?","options":["A) 원본 데이터를 직접 학습한다","B) 1단계 모형들의 예측을 입력으로 받아 최종 예측을 생성한다","C) 데이터를 전처리하는 역할만 한다","D) 각 모형의 가중치를 랜덤으로 배정한다"],"answerIndex":1,"explanation":"스태킹에서 메타 모형(2단계)은 1단계 모형들의 예측값을 입력 특성으로 사용하여 최종 예측을 생성한다. 메타 모형은 단순한 모형을 사용하는 것이 과대적합 방지에 유리하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C010"]},{"id":"S4_P9_Q020","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"최종모형 선정","question":"오캄의 면도날(Occam's Razor) 원칙을 모형 선정에 적용한 것으로 올바른 것은?","options":["A) 항상 가장 복잡한 모형을 선택한다","B) 성능이 비슷하면 더 단순한 모형을 선택한다","C) 학습 데이터가 많을수록 좋은 모형이다","D) 변수가 많을수록 좋은 모형이다"],"answerIndex":1,"explanation":"오캄의 면도날은 '불필요한 복잡성을 피하라'는 원칙이다. 성능이 비슷하면 더 단순한 모형이 일반화에 유리하고 해석·유지보수도 용이하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C011"]},{"id":"S4_P9_Q021","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"클래스 불균형(1%:99%) 상황에서 모든 데이터를 다수 클래스로 예측해도 정확도가 99%가 나온다. 이때 더 적절한 평가 지표는?","options":["A) 정확도(Accuracy)","B) F1 Score","C) 표본 크기","D) R²(결정계수)"],"answerIndex":1,"explanation":"불균형 데이터에서 정확도는 다수 클래스를 모두 맞추면 높게 나오므로 의미가 없다. F1 Score는 정밀도와 재현율의 조화평균으로 소수 클래스의 예측 성능을 반영한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C012"]},{"id":"S4_P9_Q022","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","question":"질병 진단 모형에서 '실제 환자를 놓치지 않는 것'이 가장 중요할 때 중시해야 할 지표는?","options":["A) 정밀도(Precision)","B) 특이도(Specificity)","C) 재현율(Recall)","D) 정확도(Accuracy)"],"answerIndex":2,"explanation":"재현율(민감도) = TP/(TP+FN)은 실제 환자 중 올바르게 진단한 비율이다. 환자를 놓치면(FN) 치명적이므로 재현율을 높이는 것이 중요하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C012"]},{"id":"S4_P9_Q023","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"매개변수 최적화","question":"학습률(Learning Rate)이 너무 클 때 나타나는 현상은?","options":["A) 수렴이 느려진다","B) 지역 최솟값에 빠진다","C) 최솟값을 지나쳐 발산한다","D) 항상 전역 최솟값에 도달한다"],"answerIndex":2,"explanation":"학습률이 너무 크면 가중치 갱신 폭이 커서 최솟값을 지나쳐 발산한다. 너무 작으면 수렴이 느리거나 지역 최솟값에 빠질 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C013"]},{"id":"S4_P9_Q024","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"과대적합 방지","question":"조기 종료(Early Stopping)에서 patience 파라미터의 역할은?","options":["A) 학습률의 크기를 결정한다","B) 검증 성능 미개선 허용 횟수를 설정한다","C) 드롭아웃 비율을 결정한다","D) 배치 크기를 결정한다"],"answerIndex":1,"explanation":"patience는 검증 성능이 개선되지 않는 에포크를 몇 번까지 허용할지 설정하는 값이다. patience 횟수만큼 미개선이 계속되면 학습을 중단한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C014"]},{"id":"S4_P9_Q025","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"최종모형 선정","question":"최종 모형 선정 시 고려해야 할 사항으로 가장 거리가 먼 것은?","options":["A) 예측 성능","B) 해석 가능성","C) 모형의 코드 줄 수","D) 일반화 성능"],"answerIndex":2,"explanation":"모형의 코드 줄 수는 모형 선정과 직접적 관련이 없다. 예측 성능, 해석 가능성, 일반화 성능, 연산 비용, 유지보수 용이성이 핵심 고려 사항이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P9_C011"]},{"id":"S4_P10_Q001","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","question":"다음 중 해석이 어려운 Black-box 모형에 해당하는 것은?","options":["A) 선형 회귀","B) 의사결정나무","C) 딥러닝","D) 로지스틱 회귀"],"answerIndex":2,"explanation":"딥러닝은 복잡한 은닉층 구조로 인해 해석이 어려운 Black-box 모형이다. 선형 회귀, 의사결정나무, 로지스틱 회귀는 결과 해석이 상대적으로 용이한 White-box 모형이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C001"]},{"id":"S4_P10_Q002","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","question":"LIME(Local Interpretable Model-agnostic Explanations)의 특징으로 올바른 것은?","options":["A) 전역적으로 모형 전체를 해석한다","B) 개별 예측에 대해 국소적 대리모형으로 해석한다","C) 의사결정나무에만 적용 가능하다","D) 게임이론의 Shapley Value를 기반으로 한다"],"answerIndex":1,"explanation":"LIME은 개별 예측 근처에서 단순한 대리모형(예: 선형 모형)을 학습하여 국소적으로 해석한다. Shapley Value 기반은 SHAP이며, LIME은 모형에 독립적(model-agnostic)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C001"]},{"id":"S4_P10_Q003","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","question":"특정 변수의 값을 랜덤으로 섞었을 때 모형 성능이 얼마나 하락하는지로 측정하는 변수 중요도는?","options":["A) 지니 중요도","B) 순열 중요도(Permutation Importance)","C) 정보이득","D) 상관계수"],"answerIndex":1,"explanation":"순열 중요도는 특정 변수의 값을 랜덤으로 섞은 후 성능 하락 정도로 해당 변수의 중요도를 측정한다. 모형에 독립적이라는 장점이 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C002"]},{"id":"S4_P10_Q004","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"비즈니스 기여도 평가","question":"리프트 차트에서 리프트 값이 1일 때의 의미는?","options":["A) 모형이 완벽하게 예측한다","B) 모형이 랜덤 분류와 동일한 성능이다","C) 모형이 전혀 예측하지 못한다","D) 모형의 정확도가 100%이다"],"answerIndex":1,"explanation":"리프트=1이면 모형 사용 시와 랜덤 선택 시의 효과가 동일하다. 리프트가 1보다 클수록 모형이 랜덤 대비 효과적임을 의미한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C003","S4_P10_C013"]},{"id":"S4_P10_Q005","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"비즈니스 기여도 평가","question":"분석 프로젝트의 경제적 효과를 측정하는 지표로 (이익-비용)/비용으로 계산되는 것은?","options":["A) KPI","B) ROI","C) AUC","D) F1 Score"],"answerIndex":1,"explanation":"ROI(투자수익률) = (이익 - 비용) / 비용으로, 분석 프로젝트에 투입한 비용 대비 얻은 이익을 나타낸다. KPI는 핵심성과지표로 성과 측정 기준이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C003"]},{"id":"S4_P10_Q006","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"시공간 시각화","question":"지역별 데이터 값을 색상 농도로 표현하는 지도 시각화 기법은?","options":["A) 버블 맵","B) 코로플레스 맵(Choropleth Map)","C) 네트워크 그래프","D) 트리맵"],"answerIndex":1,"explanation":"코로플레스 맵은 지역(행정구역 등)별 값을 색상 농도(짙기)로 표현하는 기법이다. 버블 맵은 크기가 다른 원, 네트워크는 연결 관계, 트리맵은 면적 비례 표현이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C004"]},{"id":"S4_P10_Q007","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"관계 시각화","question":"개체 간의 연결 구조를 노드와 엣지로 시각화하는 기법은?","options":["A) 히스토그램","B) 산점도","C) 네트워크 그래프","D) 박스플롯"],"answerIndex":2,"explanation":"네트워크 그래프는 노드(개체)와 엣지(관계)로 연결 구조를 시각화한다. 소셜 네트워크, 웹 링크 구조, 거래 관계 등에 활용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C005"]},{"id":"S4_P10_Q008","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"관계 시각화","question":"다차원 데이터의 각 변수를 평행한 축으로 배치하여 데이터 패턴을 탐색하는 시각화 기법은?","options":["A) 산점도 행렬","B) 평행좌표(Parallel Coordinates)","C) 히트맵","D) 방사형 차트"],"answerIndex":1,"explanation":"평행좌표는 각 변수를 평행한 수직축으로 배치하고 데이터 포인트를 선으로 연결하여 다차원 데이터의 패턴과 클러스터를 탐색한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C005"]},{"id":"S4_P10_Q009","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"비교 시각화","question":"계층적 데이터의 구성 비율을 면적 비례로 표현하는 시각화 기법은?","options":["A) 워터폴 차트","B) 파이 차트","C) 트리맵(Treemap)","D) 막대 그래프"],"answerIndex":2,"explanation":"트리맵은 계층적 데이터를 중첩된 직사각형의 면적 비례로 표현한다. 파이 차트는 단일 수준의 비율만 표현 가능하고, 트리맵은 여러 계층을 동시에 표현할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C006"]},{"id":"S4_P10_Q010","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"비교 시각화","question":"여러 변수의 값을 동시에 비교하기 위해 다각형 형태로 표현하는 차트는?","options":["A) 막대 그래프","B) 방사형 차트(Radar Chart)","C) 산점도","D) 히스토그램"],"answerIndex":1,"explanation":"방사형 차트(레이더 차트)는 여러 변수를 방사형 축으로 배치하고 값을 연결하여 다각형으로 표현한다. 여러 대상의 다변량 특성을 직관적으로 비교할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C006"]},{"id":"S4_P10_Q011","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"인포그래픽","question":"에드워드 터프티(Edward Tufte)가 강조한 시각화 원칙은?","options":["A) 3D 효과를 적극 활용한다","B) 데이터 잉크 비율을 최대화한다","C) 가능한 많은 색상을 사용한다","D) 장식적 요소로 시각적 흥미를 높인다"],"answerIndex":1,"explanation":"터프티는 차트에서 데이터를 표현하는 잉크(Data-Ink)의 비율을 최대화하고 불필요한 장식(Chartjunk)을 줄여야 한다고 강조했다. 3D 효과나 과도한 장식은 왜곡을 유발한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C007"]},{"id":"S4_P10_Q012","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"인포그래픽","question":"다음 중 인포그래픽의 유형이 아닌 것은?","options":["A) 통계형","B) 타임라인형","C) 프로세스형","D) 히스토그램형"],"answerIndex":3,"explanation":"인포그래픽의 주요 유형은 통계형, 타임라인형, 프로세스형, 비교형, 지리형이다. 히스토그램은 데이터 시각화 차트의 한 종류이지 인포그래픽 유형이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C007"]},{"id":"S4_P10_Q013","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 전개","question":"사기 탐지처럼 즉시 예측 결과가 필요한 서비스에 적합한 처리 방식은?","options":["A) 배치 처리(Batch Processing)","B) 실시간 처리(Real-time Processing)","C) 수동 처리","D) 오프라인 처리"],"answerIndex":1,"explanation":"실시간 처리는 요청 즉시 예측을 반환하므로 사기 탐지, 이상 감지 등 즉각적 의사결정이 필요한 경우에 적합하다. 배치 처리는 주기적 대량 처리에 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C008"]},{"id":"S4_P10_Q014","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 전개","question":"ML 모형의 개발·배포·모니터링 파이프라인을 자동화하는 실천 방법은?","options":["A) DevOps","B) MLOps","C) DataOps","D) GitOps"],"answerIndex":1,"explanation":"MLOps는 ML 모형의 전체 생명주기(개발→배포→모니터링→재학습)를 자동화하고 관리하는 실천 방법이다. DevOps의 ML 특화 버전으로 이해할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C008"]},{"id":"S4_P10_Q015","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석결과 활용 시나리오 개발","question":"고객 이탈 예측 모형의 분석 결과를 비즈니스에 활용하는 방법으로 가장 적절한 것은?","options":["A) 이탈 확률이 높은 고객에게 리텐션 프로모션을 제공한다","B) 이탈 확률이 낮은 고객에게만 서비스를 제공한다","C) 모든 고객에게 동일한 마케팅을 적용한다","D) 이탈 확률이 높은 고객의 데이터를 삭제한다"],"answerIndex":0,"explanation":"이탈 예측 모형의 핵심 활용은 이탈 위험 고객을 사전에 식별하고 타겟팅된 리텐션 프로모션을 제공하여 이탈을 방지하는 것이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C009"]},{"id":"S4_P10_Q016","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 모니터링","question":"시간이 지남에 따라 입력 데이터의 분포가 변화하는 현상은?","options":["A) 개념 드리프트(Concept Drift)","B) 데이터 드리프트(Data Drift)","C) 과대적합","D) 과소적합"],"answerIndex":1,"explanation":"데이터 드리프트는 입력 데이터의 통계적 분포가 시간에 따라 변화하는 현상이다. 개념 드리프트는 입력과 출력 간의 관계 자체가 변하는 것으로 더 심각한 문제이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C010"]},{"id":"S4_P10_Q017","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 모니터링","question":"개념 드리프트(Concept Drift)에 대한 설명으로 올바른 것은?","options":["A) 입력 데이터의 분포만 변화한다","B) 입력과 출력 간의 관계 자체가 변화한다","C) 모형의 코드에 버그가 발생하는 것이다","D) 학습 데이터의 양이 줄어드는 것이다"],"answerIndex":1,"explanation":"개념 드리프트는 입력(X)과 출력(Y) 간의 관계(P(Y|X))가 시간에 따라 변하는 현상이다. 데이터 드리프트(입력 분포 변화)보다 더 근본적인 문제이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C010"]},{"id":"S4_P10_Q018","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 리모델링","question":"기존 모형과 신규 모형의 성능을 실제 운영 환경에서 비교하는 방법은?","options":["A) 교차 검증","B) 홀드아웃 검증","C) A/B 테스트","D) 잔차 분석"],"answerIndex":2,"explanation":"A/B 테스트는 실제 운영 환경에서 기존 모형(A)과 신규 모형(B)을 동시에 운영하여 성능을 비교하는 방법이다. 교차 검증과 홀드아웃은 오프라인 평가 방법이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C011"]},{"id":"S4_P10_Q019","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 리모델링","question":"모형 리모델링이 필요한 상황이 아닌 것은?","options":["A) 모형 성능 지표가 지속적으로 하락할 때","B) 데이터 드리프트가 감지되었을 때","C) 비즈니스 요구사항이 변경되었을 때","D) 모형의 학습 시간이 짧을 때"],"answerIndex":3,"explanation":"학습 시간이 짧은 것은 리모델링의 이유가 아니다. 성능 하락, 드리프트 감지, 비즈니스 요구사항 변경이 리모델링의 주요 트리거이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C011"]},{"id":"S4_P10_Q020","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"시공간 시각화","question":"시간에 따른 데이터의 추세와 변화를 가장 효과적으로 표현하는 기본적인 시각화 기법은?","options":["A) 파이 차트","B) 라인 차트(Line Chart)","C) 막대 그래프","D) 트리맵"],"answerIndex":1,"explanation":"라인 차트는 시간축을 따라 연속적인 선으로 추세를 표현하므로 시계열 데이터에 가장 기본적이고 효과적인 시각화이다. 파이 차트는 비율, 막대는 범주 비교에 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C012"]},{"id":"S4_P10_Q021","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","question":"SHAP(SHapley Additive exPlanations)의 이론적 기반은?","options":["A) 베이즈 정리","B) 게임이론의 Shapley Value","C) 중심극한정리","D) 최소제곱법"],"answerIndex":1,"explanation":"SHAP는 게임이론의 Shapley Value를 기반으로 각 변수가 개별 예측에 얼마나 기여했는지를 공정하게 분배한다. 전역적·국소적 해석이 모두 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C001","S4_P10_C002"]},{"id":"S4_P10_Q022","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 모니터링","question":"AI 모형의 의사결정 과정을 투명하게 하여 신뢰성과 책임성을 확보하는 접근은?","options":["A) AutoML","B) XAI(Explainable AI)","C) MLOps","D) DataOps"],"answerIndex":1,"explanation":"XAI(설명 가능한 AI)는 AI의 의사결정 과정과 근거를 사람이 이해할 수 있도록 투명하게 하는 접근이다. LIME, SHAP 등의 기법이 XAI에 포함된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C014"]},{"id":"S4_P10_Q023","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"비즈니스 기여도 평가","question":"누적 이익 차트(Cumulative Gains Chart)에서 상위 20%를 선택했을 때 전체 양성의 60%를 포착했다면, 이에 대한 해석으로 올바른 것은?","options":["A) 모형의 정확도가 60%이다","B) 상위 20% 대상만 타겟팅해도 양성 고객의 60%를 확보할 수 있다","C) 전체 고객의 60%가 양성이다","D) 모형의 재현율이 20%이다"],"answerIndex":1,"explanation":"누적 이익 차트에서 상위 20%에서 양성 60% 포착은 '전체가 아닌 상위 20%만 타겟팅해도 양성 대상의 60%를 확보'할 수 있다는 의미로 비즈니스 효율성을 나타낸다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C013"]},{"id":"S4_P10_Q024","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 전개","question":"다음 중 배치 처리(Batch Processing)가 적합한 사례는?","options":["A) 실시간 사기 거래 탐지","B) 매일 새벽 추천 시스템 업데이트","C) 챗봇의 즉시 응답 생성","D) 자율주행 차량의 실시간 판단"],"answerIndex":1,"explanation":"매일 새벽 추천 시스템 업데이트는 대량의 데이터를 주기적으로 처리하는 배치 처리에 적합하다. 나머지는 즉각적 응답이 필요한 실시간 처리 사례이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C008"]},{"id":"S4_P10_Q025","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 리모델링","question":"모형 버전 관리(Model Versioning)의 가장 큰 장점은?","options":["A) 모형의 학습 속도가 빨라진다","B) 문제 발생 시 이전 버전으로 롤백할 수 있다","C) 데이터 드리프트를 자동으로 방지한다","D) 모형의 정확도가 자동으로 향상된다"],"answerIndex":1,"explanation":"모형 버전 관리는 각 모형의 버전을 체계적으로 관리하여 신규 모형에 문제가 발생했을 때 안전하게 이전 버전으로 롤백할 수 있게 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S4_P10_C011"]}];

/* ===== Storage ===== */
const STOR_PROGRESS='bda_progress', STOR_WRONG='bda_wrong', STOR_MOCK='bda_mock_history', STOR_DARK='bda_dark', STOR_BOOKMARKS='bda_bookmarks', STOR_STUDIED='bda_studied_today';
function loadProgress(){try{return JSON.parse(localStorage.getItem(STOR_PROGRESS))||{};}catch{return {};}}
function saveProgress(p){localStorage.setItem(STOR_PROGRESS,JSON.stringify(p));}
function loadWrong(){try{return JSON.parse(localStorage.getItem(STOR_WRONG))||[];}catch{return [];}}
function saveWrong(w){localStorage.setItem(STOR_WRONG,JSON.stringify(w));}
function loadMockHistory(){try{return JSON.parse(localStorage.getItem(STOR_MOCK))||[];}catch{return [];}}
function saveMockHistory(h){localStorage.setItem(STOR_MOCK,JSON.stringify(h.slice(-10)));}
function loadBookmarks(){try{return JSON.parse(localStorage.getItem(STOR_BOOKMARKS))||[];}catch{return [];}}
function saveBookmarks(b){localStorage.setItem(STOR_BOOKMARKS,JSON.stringify(b));}
function isBookmarked(id){return loadBookmarks().includes(id);}
function toggleBookmark(id){
  let bm=loadBookmarks();
  if(bm.includes(id)) bm=bm.filter(x=>x!==id); else bm.push(id);
  saveBookmarks(bm); render();
}
function getStudiedToday(){
  try{
    const d=JSON.parse(localStorage.getItem(STOR_STUDIED)||'{}');
    const today=new Date().toISOString().slice(0,10);
    if(d.date!==today) return 0;
    return d.count||0;
  }catch{return 0;}
}
function incStudiedToday(){
  const today=new Date().toISOString().slice(0,10);
  let d;
  try{d=JSON.parse(localStorage.getItem(STOR_STUDIED)||'{}');}catch{d={};}
  if(d.date!==today){d={date:today,count:0};}
  d.count++;
  localStorage.setItem(STOR_STUDIED,JSON.stringify(d));
}

/* ===== Modal System ===== */
let modalResolve = null;
function showModal(title, message, buttons) {
  return new Promise(resolve => {
    modalResolve = resolve;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalMsg').textContent = message;
    const actions = document.getElementById('modalActions');
    actions.innerHTML = '';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'modal-btn modal-btn-' + (b.style || 'cancel');
      btn.textContent = b.label;
      btn.onclick = () => { closeModal(); resolve(b.value); };
      actions.appendChild(btn);
    });
    requestAnimationFrame(() => {
      document.getElementById('modalOverlay').classList.add('show');
      document.getElementById('modalSheet').classList.add('show');
    });
  });
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalSheet').classList.remove('show');
  if (modalResolve) { modalResolve(null); modalResolve = null; }
}

/* ===== Utility ===== */
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function getConceptsFor(subj,part,level){
  let cs=APP_CONCEPTS.filter(c=>c.subject===subj);
  if(part)cs=cs.filter(c=>c.part===part);
  if(level&&level!=='all')cs=cs.filter(c=>c.level===level);
  return cs;
}
function getQuizzesFor(part,level){
  let qs=APP_QUIZZES.filter(q=>q.part===part);
  if(level&&level!=='all')qs=qs.filter(q=>q.level===level);
  return qs;
}
function getSubjectForPart(part){return SUBJECTS.find(s=>s.parts.includes(part));}
function getSubjectByName(name){return SUBJECTS.find(s=>s.name===name);}
function fmtTime(sec){return String(Math.floor(sec/60)).padStart(2,'0')+':'+String(sec%60).padStart(2,'0');}
function getPartProgress(part){
  const prog=loadProgress();const qs=APP_QUIZZES.filter(q=>q.part===part);
  if(!qs.length)return 0;
  let c=0;qs.forEach(q=>{if(prog[q.id]===true)c++;});
  return Math.round(c/qs.length*100);
}
function getSubjectProgress(subj){
  const prog=loadProgress();const qs=APP_QUIZZES.filter(q=>q.subject===subj.name);
  if(!qs.length)return 0;
  let c=0;qs.forEach(q=>{if(prog[q.id]===true)c++;});
  return Math.round(c/qs.length*100);
}

function chevronSVG(){return '<svg viewBox="0 0 8 13" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M1 1l5.5 5.5L1 12"/></svg>';}
function searchSVG(){return '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="7" cy="7" r="5"/><path d="M11 11l3.5 3.5"/></svg>';}
function starSVG(filled){return filled?'<svg viewBox="0 0 24 24" fill="#FF9500" stroke="none" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>':'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="22" height="22"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';}
function checkSVG(){return '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M3 8l3.5 3.5L13 5"/></svg>';}
function xSVG(){return '<svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M4 4l8 8M12 4l-8 8"/></svg>';}

function progressRingHTML(pct, color, size) {
  size = size || 48;
  const inner = size - 10;
  return '<div class="progress-ring" style="width:'+size+'px;height:'+size+'px;background:conic-gradient('+color+' '+(pct*3.6)+'deg, var(--divider) 0deg);border-radius:50%">' +
    '<div class="progress-ring-inner" style="width:'+inner+'px;height:'+inner+'px;background:var(--card)">'+pct+'%</div></div>';
}

/* ===== Debounced Search ===== */
let searchTimeout = null;
function handleSearch(val) {
  if(searchTimeout) clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => {
    state.searchQuery = val;
    render();
  }, 300);
}

/* ===== Tab Switching ===== */
function switchTab(tab) {
  state.tab = tab;
  if(tab==='home') state.page='home';
  else if(tab==='concept'){if(state.page!=='conceptView') state.page='conceptList';}
  else if(tab==='quiz'){if(state.page!=='quizView') state.page='quizList';}
  else if(tab==='wrong') state.page='wrong';
  else if(tab==='more'){state.morePage=null; state.page='more';}
  updateTabs(); render();
}
function updateTabs(){
  document.querySelectorAll('.tab-item').forEach(el=>{
    el.classList.toggle('active',el.dataset.tab===state.tab);
  });
}

/* ===== Render ===== */
const app = document.getElementById('app');
function render(){
  const renderers = {
    home:renderHome, conceptList:renderConceptList, conceptView:renderConceptView,
    quizList:renderQuizList, quizView:renderQuizView, wrong:renderWrong,
    mock:renderMock, mockResult:renderMockResult, more:renderMore,
    dashboard:renderDashboard, bookmarks:renderBookmarks, examInfo:renderExamInfo
  };
  (renderers[state.page]||renderHome)();
  app.scrollTo(0,0);
  updateTabs();
  // Update top bar
  const titleMap = {home:'빅분기 필기',conceptList:'개념 학습',conceptView:'개념',quizList:'퀴즈',quizView:'퀴즈',wrong:'오답노트',mock:'모의고사',mockResult:'결과',more:'더보기',dashboard:'대시보드',bookmarks:'북마크',examInfo:'시험 정보'};
  document.getElementById('topBarTitle').textContent = titleMap[state.page]||'빅분기 필기';
}

/* ===== HOME ===== */

      h+='<div style="flex:1;min-width:0"><div style="font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">'+esc(c.title)+'</div>';
      h+='<div style="font-size:13px;color:var(--text2)">'+esc(c.part)+'</div></div>';

  // Quick Stats

  h+='<div class="stat-card"><div class="stat-value">'+totalCorrect+'<span style="font-size:13px;color:var(--text2);font-weight:400">/'+totalQ+'</span></div><div class="stat-label">완료 문제</div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:var(--wrong)">'+wrongs.length+'</div><div class="stat-label">오답 문제</div></div>';
  h+='<div class="stat-card"><div class="stat-value" style="color:var(--s2)">'+studied+'</div><div class="stat-label">오늘 학습</div></div>';
  h+='</div>';

  // Subject Cards
  h+='<p class="section-header">과목별 학습</p>';
  h+='<div style="display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:24px">';
  SUBJECTS.forEach(s=>{
    const pct=getSubjectProgress(s);
    const cCount=APP_CONCEPTS.filter(c=>c.subject===s.name).length;
    const qCount=APP_QUIZZES.filter(q=>q.subject===s.name).length;
    h+='<div class="subj-card" onclick="goToSubject(\''+s.name.replace(/'/g,"\\'")+'\')">';
    h+='<div class="subj-accent" style="background:'+s.bgColor+'"></div>';
    h+='<div style="display:flex;justify-content:space-between;align-items:flex-start">';
    h+='<div><h3>'+s.name.replace('빅데이터 ','')+'</h3>';
    h+='<div class="subj-meta">개념 '+cCount+' · 퀴즈 '+qCount+'</div></div>';
    h+=progressRingHTML(pct,s.bgColor,44);
    h+='</div>';
    h+='<div class="progress-bar"><div class="progress-fill" style="width:'+pct+'%;background:'+s.bgColor+'"></div></div>';
    h+='</div>';
  });
  h+='</div>';

  // Mock Exam CTA
  h+='<div class="cta-card" onclick="startMock()">';
  h+='<div><div style="font-size:17px;font-weight:600">모의고사 시작</div>';
  h+='<div style="font-size:13px;color:var(--text2);margin-top:2px">실전처럼 80문제, 120분</div></div>';
  h+='<div style="width:40px;height:40px;border-radius:50%;background:var(--s1-bg);display:flex;align-items:center;justify-content:center">';
  h+='<svg viewBox="0 0 24 24" fill="none" stroke="var(--s1)" stroke-width="2" width="20" height="20"><path d="M5 3l14 9-14 9V3z"/></svg></div></div>';

  // Part list
  h+='<p class="section-header">파트별 학습</p>';

    h+='<p style="font-size:13px;font-weight:600;color:'+s.bgColor+';padding:12px 4px 6px">'+s.name+'</p>';
    h+='<div class="card-group">';
    s.parts.forEach(p=>{
      const pct=getPartProgress(p);
      const qc=APP_QUIZZES.filter(q=>q.part===p).length;
      h+='<div class="list-item" style="gap:14px">';
      h+='<div style="flex:1;min-width:0">';
      h+='<div style="font-weight:500;font-size:15px;margin-bottom:4px">'+p+'</div>';
      h+='<div style="display:flex;align-items:center;gap:8px">';

      h+='<span style="font-size:12px;color:var(--text2)">'+pct+'%</span></div></div>';

      h+='<button class="btn btn-xs btn-tinted" onclick="event.stopPropagation();startPartQuiz(\''+p.replace(/'/g,"\\'")+'\')">퀴즈</button>';
      h+='</div></div>';

    h+='</div>';

  h+='</div>';
  app.innerHTML=h;
}

function goToSubject(name){
  const s=getSubjectByName(name);
  if(s){state.tab='concept';startConceptStudy(s.name,s.parts[0]);}
}

/* ===== CONCEPT LIST ===== */

/* ===== CONCEPT VIEW ===== */
function startConceptStudy(subj,part){
  state.page='conceptView'; state.tab='concept';
  state.conceptSubject=subj; state.conceptPart=part; state.conceptIdx=0; state.conceptLevel='all';
  updateTabs(); render();
}

function renderConceptView(){
  const concepts=getConceptsFor(state.conceptSubject,state.conceptPart,state.conceptLevel);
  const subj=getSubjectByName(state.conceptSubject);
  const allParts=subj?subj.parts:[];
  const c=concepts[state.conceptIdx];

  let h='<div class="page-enter">';

  // Part chips
  h+='<div class="chip-wrap" style="margin-bottom:12px">';
  allParts.forEach(p=>{
    h+='<div class="chip '+(state.conceptPart===p?'active':'')+'" onclick="switchConceptPart(\''+p.replace(/'/g,"\\'")+'\')">'+p+'</div>';
  });
  h+='</div>';

  // Level filter
  h+='<div style="display:flex;gap:8px;margin-bottom:16px;align-items:center">';
  ['all','core','advanced'].forEach(l=>{
    const label=l==='all'?'전체':l==='core'?'핵심':'심화';
    h+='<button class="btn btn-xs '+(state.conceptLevel===l?'btn-primary':'btn-secondary')+'" onclick="setConceptLevel(\''+l+'\')">'+label+'</button>';
  });
  h+='<span style="margin-left:auto;font-size:13px;color:var(--text2)">'+concepts.length+'개</span></div>';

  if(!c){
    h+='<div class="card-group"><div class="empty-state">';
    h+='<h3>개념 없음</h3><p>해당 조건의 개념이 없습니다.</p></div></div>';
    h+='</div>';
    app.innerHTML=h;
    return;
  }

  // Card
  h+='<div class="card-group" style="padding:24px" id="conceptCard">';
  h+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;gap:8px">';
  h+='<div style="flex:1"><div style="font-size:20px;font-weight:600;line-height:1.4;margin-bottom:6px">'+esc(c.title)+'</div>';
  h+='<div style="font-size:13px;color:var(--text2)">'+esc(c.section)+' > '+esc(c.subtopic)+'</div></div>';
  h+='<button class="bookmark-btn '+(isBookmarked(c.id)?'active':'')+'" onclick="toggleBookmark(\''+c.id+'\')">'+starSVG(isBookmarked(c.id))+'</button>';
  h+='</div>';

  h+='<div style="display:flex;gap:6px;margin-bottom:16px">';
  h+='<span class="badge '+(c.level==='core'?'badge-core':'badge-adv')+'">'+(c.level==='core'?'핵심':'심화')+'</span>';
  if(c.verificationStatus==='law_check') h+='<span class="badge badge-law">법령확인필요</span>';
  h+='</div>';

  h+='<div class="concept-content" style="margin-bottom:20px">'+esc(c.content)+'</div>';

  if(c.examTip){
    h+='<div class="exam-tip" style="border-left-color:'+(subj?subj.bgColor:'var(--s1)')+';background:var('+(subj?subj.bgVar:'--s1-bg')+')">';
    h+='<strong>시험 TIP</strong><p>'+esc(c.examTip)+'</p></div>';
  }

  if(c.keywords&&c.keywords.length){
    h+='<div style="margin-top:16px"><div style="font-size:13px;font-weight:600;color:var(--text2);margin-bottom:8px">키워드</div>';
    c.keywords.forEach(k=>{h+='<span class="keyword-tag">'+esc(k)+'</span>';});
    h+='</div>';
  }
  h+='</div>';

  // Navigation
  h+='<div class="nav-bottom">';
  h+='<button class="btn btn-sm btn-secondary" '+(state.conceptIdx<=0?'disabled style="opacity:0.4"':'')+' onclick="conceptNav(-1)">이전</button>';
  h+='<span style="font-size:13px;color:var(--text2);font-variant-numeric:tabular-nums">'+(state.conceptIdx+1)+' / '+concepts.length+'</span>';
  h+='<button class="btn btn-sm btn-primary" '+(state.conceptIdx>=concepts.length-1?'disabled style="opacity:0.4"':'')+' onclick="conceptNav(1)">다음</button>';
  h+='</div>';
  h+='<p class="swipe-hint" style="margin-top:8px">스와이프하여 이동</p>';
  h+='</div>';
  app.innerHTML=h;
  setupSwipe('conceptCard',()=>conceptNav(1),()=>conceptNav(-1));
}

function switchConceptPart(p){state.conceptPart=p;state.conceptIdx=0;render();}
function setConceptLevel(l){state.conceptLevel=l;state.conceptIdx=0;render();}
function conceptNav(dir){
  const concepts=getConceptsFor(state.conceptSubject,state.conceptPart,state.conceptLevel);
  const newIdx=state.conceptIdx+dir;
  if(newIdx<0||newIdx>=concepts.length)return;
  state.conceptIdx=newIdx;render();
}
function goToConcept(cid){
  const c=APP_CONCEPTS.find(x=>x.id===cid);if(!c)return;
  state.tab='concept';state.page='conceptView';
  state.conceptSubject=c.subject;state.conceptPart=c.part;state.conceptLevel='all';
  const concepts=getConceptsFor(c.subject,c.part,'all');
  state.conceptIdx=Math.max(0,concepts.findIndex(x=>x.id===cid));
  updateTabs();render();
}

/* ===== QUIZ LIST ===== */
function renderQuizList(){
  let h='<div class="page-enter">';
  h+='<div class="large-title">퀴즈</div>';
  SUBJECTS.forEach(s=>{
    h+='<p class="section-header" style="color:'+s.bgColor+'">'+s.name+'</p>';
    h+='<div class="card-group">';
    s.parts.forEach(p=>{

      h+='<div style="display:flex;align-items:center;gap:8px;margin-top:4px">';
      h+='<div style="flex:1;max-width:80px;height:4px;background:var(--divider);border-radius:2px;overflow:hidden"><div style="height:100%;width:'+pct+'%;background:'+s.bgColor+';border-radius:2px"></div></div>';
      h+='<span style="font-size:12px;color:var(--text2)">'+pct+'% ('+qc+')</span></div></div>';

    h+='</div>';
