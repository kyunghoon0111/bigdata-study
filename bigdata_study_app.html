계층적 군집분석","content":"K-평균(K-Means)은 K개 중심점을 초기화하고, 데이터를 가장 가까운 중심점에 할당한 뒤, 중심점을 재계산하는 과정을 수렴까지 반복한다. K를 사전에 지정해야 하며 엘보우 방법(Elbow Method)이나 실루엣 계수로 최적 K를 결정한다. 계층적 군집분석은 병합(Agglomerative, 상향식)과 분할(Divisive, 하향식)로 나뉘며 덴드로그램(Dendrogram)으로 시각화한다. 거리 측도: 유클리드, 맨해튼, 코사인 유사도.","keywords":["K-평균","계층적 군집","덴드로그램","엘보우 방법","실루엣 계수"],"level":"core","examTip":"K-평균은 K를 미리 지정, 계층적 군집은 K 사전 지정 불필요(덴드로그램에서 결정). K-평균은 이상값에 민감하고 구형 군집에 적합하다는 한계가 빈출.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C009","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"군집분석","title":"DBSCAN과 밀도 기반 군집분석","content":"DBSCAN(Density-Based Spatial Clustering of Applications with Noise)은 밀도 기반 군집 알고리즘이다. eps(이웃 반경)와 minPts(최소 이웃 수)를 파라미터로 사용한다. 핵심 포인트(Core Point): eps 내 minPts 이상의 이웃, 경계 포인트(Border Point): 핵심 포인트의 이웃이지만 자체는 핵심 아님, 노이즈 포인트: 어디에도 속하지 않음. K-평균과 달리 K를 사전에 지정하지 않으며 비구형 군집과 노이즈 처리에 강하다.","keywords":["DBSCAN","밀도 기반","eps","minPts","핵심 포인트","노이즈"],"level":"core","examTip":"DBSCAN vs K-평균 비교가 빈출: DBSCAN은 K 사전 지정 불필요, 비구형 군집 가능, 노이즈 자동 탐지. 단 밀도가 다른 군집이 섞여 있으면 성능이 떨어진다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C010","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"범주형 자료 분석","title":"카이제곱 검정과 피셔 정확 검정","content":"카이제곱 적합도 검정은 관측 빈도가 기대 빈도와 일치하는지 검정한다. 카이제곱 독립성 검정은 교차표에서 두 범주형 변수의 독립 여부를 검정한다. 검정통계량 χ² = Σ(관측빈도-기대빈도)²/기대빈도이다. 기대빈도가 5 미만인 셀이 20%를 초과하면 카이제곱 검정의 신뢰도가 떨어지며 피셔 정확 검정(Fisher's Exact Test)을 사용한다.","keywords":["카이제곱 검정","적합도 검정","독립성 검정","피셔 정확 검정","기대빈도"],"level":"core","examTip":"카이제곱 검정의 적용 조건(기대빈도 5 이상)이 빈출. 적합도 검정(하나의 변수) vs 독립성 검정(두 변수)의 구분도 중요. 기대빈도 공식 = (행합계×열합계)/전체합계.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C011","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"다변량 분석","title":"주성분분석(PCA)과 요인분석","content":"주성분분석(PCA)은 분산이 최대인 방향으로 새로운 축(주성분)을 만들어 차원을 축소하는 비지도 기법이다. 주성분은 서로 직교(독립)하며, 고유값(Eigenvalue)이 클수록 설명력이 크다. 요인분석(Factor Analysis)은 관측변수 뒤에 숨겨진 잠재요인(Latent Factor)을 추출하며, 변수 간 공분산 구조를 설명한다. PCA는 분산 극대화가 목적이고, 요인분석은 잠재 구조 탐색이 목적이라는 차이가 있다.","keywords":["PCA","주성분분석","요인분석","고유값","차원축소","잠재요인"],"level":"core","examTip":"PCA vs 요인분석: PCA는 '분산 최대화 차원축소', 요인분석은 '잠재 구조 탐색'. PCA 주성분 수 결정은 고유값 > 1 기준(카이저 규칙) 또는 스크리 도표로 결정.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C012","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"시계열 분석","title":"시계열 분석의 구성요소와 ARIMA","content":"시계열의 구성요소: 추세(Trend, 장기적 방향), 계절성(Seasonality, 주기적 패턴), 순환(Cycle, 비규칙적 장기 변동), 불규칙(Irregular, 랜덤 변동). 정상성(Stationarity)은 평균과 분산이 시간에 따라 일정한 성질이며 ADF 검정(Augmented Dickey-Fuller)으로 확인한다. ARIMA(p,d,q): AR(p, 자기회귀) + I(d, 차분) + MA(q, 이동평균). 비정상 시계열은 차분(Differencing)으로 정상화한 뒤 ARIMA를 적용한다.","keywords":["시계열","추세","계절성","정상성","ARIMA","차분","ADF 검정"],"level":"core","examTip":"ARIMA(p,d,q)에서 p=AR 차수, d=차분 횟수, q=MA 차수. 정상성 확보를 위한 차분이 d이다. ACF가 천천히 감소하면 비정상, PACF로 AR 차수를 결정한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C013","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"베이지안 기법","title":"베이즈 정리와 나이브 베이즈 분류","content":"베이즈 정리: P(A|B) = P(B|A)×P(A)/P(B). 사전확률 P(A)에 우도 P(B|A)를 결합하여 사후확률 P(A|B)를 계산한다. 나이브 베이즈(Naive Bayes) 분류기는 특성 간 조건부 독립을 가정하여 계산을 단순화한다. 텍스트 분류(스팸 필터링 등)에서 높은 성능을 보인다. '나이브'는 특성 간 독립이라는 강한 가정에서 유래하며, 실제로 독립이 아니어도 실용적으로 잘 작동하는 경우가 많다.","keywords":["베이즈 정리","사전확률","사후확률","우도","나이브 베이즈"],"level":"core","examTip":"베이즈 정리 공식과 사전확률→사후확률 업데이트 구조가 빈출. 나이브 베이즈의 '나이브'는 '특성 간 조건부 독립 가정'이라는 점을 반드시 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C014","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"딥러닝 분석","title":"딥러닝의 주요 구조","content":"딥러닝은 은닉층이 2개 이상인 심층 신경망이다. CNN(합성곱 신경망)은 합성곱 층(Convolution)과 풀링 층(Pooling)으로 이미지의 공간적 특징을 추출하며 이미지 분류에 특화되어 있다. RNN(순환 신경망)은 순차 데이터를 처리하며 은닉 상태를 통해 이전 정보를 기억한다. LSTM(Long Short-Term Memory)은 RNN의 장기 의존성 문제(기울기 소실)를 셀 상태와 게이트 구조로 해결한다.","keywords":["딥러닝","CNN","RNN","LSTM","합성곱","풀링"],"level":"core","examTip":"CNN=이미지, RNN=순차 데이터(시계열·텍스트). RNN의 기울기 소실 문제를 LSTM이 해결한다. CNN의 합성곱→풀링→완전연결 구조도 기억하라.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C015","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"딥러닝 분석","title":"딥러닝 학습 기법","content":"경사하강법(Gradient Descent)의 변형: 배치(Batch, 전체 데이터), 미니배치(Mini-batch, 일부), 확률적(SGD, 1개). 옵티마이저: Adam(적응적 학습률+모멘텀), RMSprop, Adagrad. 드롭아웃(Dropout)은 학습 시 일부 뉴런을 무작위로 비활성화하여 과대적합을 방지한다. 배치 정규화(Batch Normalization)는 층 입력을 정규화하여 학습을 안정화한다. 전이학습(Transfer Learning)은 사전 학습된 모형을 새 문제에 활용하는 기법이다.","keywords":["SGD","Adam","드롭아웃","배치 정규화","전이학습","옵티마이저"],"level":"advanced","examTip":"드롭아웃은 '과대적합 방지', 배치 정규화는 '학습 안정화'로 구분. Adam은 현재 가장 많이 쓰이는 옵티마이저로 '적응적 학습률'이 핵심.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C016","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비정형 데이터 분석","title":"텍스트 마이닝과 자연어 처리","content":"텍스트 마이닝은 비정형 텍스트에서 유의미한 정보를 추출하는 기법이다. 전처리: 토큰화(Tokenization), 불용어 제거(Stopword Removal), 어간 추출(Stemming), 표제어 추출(Lemmatization). 표현 방법: BoW(Bag of Words), TF-IDF(단어 빈도-역문서 빈도), Word2Vec(단어 임베딩). TF-IDF는 특정 문서에서 자주 등장하지만 전체 문서에서는 드문 단어에 높은 가중치를 부여한다.","keywords":["텍스트 마이닝","토큰화","TF-IDF","Word2Vec","BoW","불용어"],"level":"core","examTip":"TF-IDF에서 TF(단어 빈도)는 높을수록, IDF(역문서 빈도)는 해당 단어가 드문 문서일수록 가중치가 높다. BoW vs Word2Vec: BoW는 순서 무시, Word2Vec은 의미적 유사성을 벡터로 표현.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C017","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"앙상블 분석","title":"앙상블 학습: 배깅, 부스팅, 스태킹","content":"앙상블(Ensemble)은 여러 모형을 결합하여 단일 모형보다 나은 성능을 얻는 기법이다. 배깅(Bagging, Bootstrap Aggregating): 부트스트랩 샘플로 여러 모형을 병렬 학습 후 다수결/평균으로 결합. 랜덤 포레스트는 배깅+특성 무작위 선택의 대표적 알고리즘이다. 부스팅(Boosting): 이전 모형의 오류를 보정하는 방향으로 순차 학습. AdaBoost, GBM, XGBoost, LightGBM이 대표적이다. 스태킹(Stacking): 여러 모형의 예측을 새로운 모형의 입력으로 사용한다.","keywords":["앙상블","배깅","부스팅","랜덤 포레스트","XGBoost","스태킹"],"level":"core","examTip":"배깅은 '분산 감소'(병렬), 부스팅은 '편향 감소'(순차). 랜덤 포레스트=배깅+변수 랜덤 선택. XGBoost는 정규화가 포함된 부스팅으로 과대적합 방지에 유리.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C018","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비모수 통계","title":"비모수 검정의 종류와 특징","content":"비모수 검정(Nonparametric Test)은 모집단 분포에 대한 가정이 없는 검정이다. 정규성 가정이 위배되거나 순서형 데이터에 사용한다. 만-위트니 U 검정(독립 2그룹, t검정의 비모수 대안), 윌콕슨 부호순위 검정(대응 2그룹), 크루스칼-왈리스 검정(독립 3그룹 이상, ANOVA의 비모수 대안), 스피어만/켄달 상관(비모수 상관분석)이 대표적이다. 비모수 검정은 검정력이 모수 검정보다 낮지만 가정이 적어 범용적이다.","keywords":["비모수 검정","만-위트니 U","윌콕슨","크루스칼-왈리스","순서형 데이터"],"level":"core","examTip":"모수 검정과의 매칭이 빈출: 독립 2그룹 t검정↔만-위트니 U, 대응 t검정↔윌콕슨, ANOVA↔크루스칼-왈리스. 비모수는 '분포 가정 없음'이 최대 장점.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C019","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"다변량 분석","title":"판별분석과 다차원척도법","content":"판별분석(Discriminant Analysis)은 집단 간 차이를 최대화하는 판별함수를 찾아 새로운 데이터의 소속 집단을 예측하는 기법이다. 선형판별분석(LDA)은 집단 간 분산/집단 내 분산 비를 최대화한다. 다차원척도법(MDS)은 개체 간 유사성/비유사성을 저차원 공간에 시각화하는 기법이다. 대응분석(Correspondence Analysis)은 범주형 변수 간 관계를 저차원 공간에서 시각적으로 탐색한다.","keywords":["판별분석","LDA","다차원척도법","MDS","대응분석"],"level":"advanced","examTip":"LDA(판별분석)는 차원축소와 분류를 동시에 수행하며 PCA와 자주 비교된다. PCA는 비지도(분산 최대화), LDA는 지도(클래스 분리 최대화)라는 점이 핵심 차이.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C020","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"시계열 분석","title":"지수평활법과 분해법","content":"지수평활법(Exponential Smoothing)은 최근 데이터에 더 큰 가중치를 부여하여 예측하는 기법이다. 단순 지수평활(추세·계절성 없음), 이중 지수평활(홀트 방법, 추세 포함), 삼중 지수평활(홀트-윈터스 방법, 추세+계절성 포함)이 있다. 시계열 분해법은 시계열을 추세, 계절, 잔차로 분리하며, 가법 모형(Y=T+S+R)과 승법 모형(Y=T×S×R)으로 나뉜다.","keywords":["지수평활법","홀트","홀트-윈터스","시계열 분해","가법 모형","승법 모형"],"level":"core","examTip":"단순/이중/삼중 지수평활의 차이: 단순=수준만, 이중=수준+추세, 삼중=수준+추세+계절성. 가법 모형은 계절 변동 폭이 일정할 때, 승법 모형은 변동 폭이 커질 때 사용.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C021","subject":"빅데이터 모델링","part":"분석기법 적용","section":"분석기법","subtopic":"회귀분석","title":"정규화 회귀: 릿지, 라쏘, 엘라스틱넷","content":"정규화(Regularization)는 모형 복잡도에 패널티를 부여하여 과대적합을 방지한다. 릿지 회귀(Ridge, L2)는 가중치 제곱합에 패널티를 부여하며 계수를 0에 가깝게 축소하지만 0으로 만들지는 않는다. 라쏘 회귀(Lasso, L1)는 가중치 절대값 합에 패널티를 부여하며 일부 계수를 정확히 0으로 만들어 변수 선택 효과가 있다. 엘라스틱넷(Elastic Net)은 L1+L2를 결합한 방법이다.","keywords":["정규화","릿지","라쏘","엘라스틱넷","L1","L2","과대적합"],"level":"core","examTip":"릿지(L2)=계수 축소(0으로 안 만듦), 라쏘(L1)=계수를 0으로(변수 선택). 이 핵심 차이가 매우 빈출. 엘라스틱넷은 두 장점을 결합한 것으로 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S3_P8_C022","subject":"빅데이터 모델링","part":"분석기법 적용","section":"고급 분석기법","subtopic":"비정형 데이터 분석","title":"감성분석과 토픽모델링","content":"감성분석(Sentiment Analysis)은 텍스트에서 긍정/부정/중립의 감성을 판별하는 기법이다. 사전 기반 방법(감성 사전 활용)과 머신러닝 기반 방법(라벨 데이터로 학습)이 있다. 토픽모델링(Topic Modeling)은 문서 집합에서 잠재 주제를 발견하는 비지도학습 기법이다. LDA(Latent Dirichlet Allocation)가 대표적이며, 각 문서는 여러 토픽의 혼합, 각 토픽은 여러 단어의 확률분포로 표현된다.","keywords":["감성분석","토픽모델링","LDA","Latent Dirichlet Allocation"],"level":"advanced","examTip":"토픽모델링의 LDA(Latent Dirichlet Allocation)와 판별분석의 LDA(Linear Discriminant Analysis)는 약어가 같지만 완전히 다른 기법이다. 문맥에 따라 구분할 것.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C001","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","title":"분류 모형 평가: 혼동행렬","content":"혼동행렬(Confusion Matrix)은 분류 모형의 예측 결과를 실제값과 비교하여 TP(참양성), FP(거짓양성), FN(거짓음성), TN(참음성)으로 정리한 표이다. 정확도(Accuracy) = (TP+TN)/(TP+FP+FN+TN), 정밀도(Precision) = TP/(TP+FP), 재현율(Recall, 민감도) = TP/(TP+FN), 특이도(Specificity) = TN/(TN+FP). F1 Score = 2×(Precision×Recall)/(Precision+Recall)로 정밀도와 재현율의 조화평균이다.","keywords":["혼동행렬","정확도","정밀도","재현율","F1 Score","민감도","특이도"],"level":"core","examTip":"정밀도 vs 재현율 혼동 주의. 정밀도는 '양성 예측 중 실제 양성 비율', 재현율은 '실제 양성 중 양성 예측 비율'. 불균형 데이터에서 정확도만으로 평가하면 안 된다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C002","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","title":"ROC 곡선과 AUC","content":"ROC(Receiver Operating Characteristic) 곡선은 임계값 변화에 따른 TPR(재현율, 민감도)과 FPR(1-특이도)의 관계를 나타낸 곡선이다. AUC(Area Under the Curve)는 ROC 곡선 아래 면적으로 0~1 범위이며, 1에 가까울수록 좋은 분류 성능이다. AUC = 0.5는 랜덤 분류기 수준, AUC = 1.0은 완벽한 분류기이다. 불균형 데이터에서는 PR 곡선(Precision-Recall Curve)이 ROC보다 더 유의미할 수 있다.","keywords":["ROC","AUC","TPR","FPR","PR 곡선","임계값"],"level":"core","examTip":"ROC의 x축=FPR(1-특이도), y축=TPR(민감도)을 정확히 기억. AUC 0.5=랜덤, 0.7~0.8=양호, 0.8~0.9=우수, 0.9+=매우 우수로 해석한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C003","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","title":"회귀 모형 평가 지표","content":"MSE(Mean Squared Error) = Σ(실제-예측)²/n으로 큰 오차에 더 큰 패널티를 부여한다. RMSE = √MSE로 원래 단위와 같아 해석이 용이하다. MAE(Mean Absolute Error) = Σ|실제-예측|/n으로 이상값에 덜 민감하다. MAPE(Mean Absolute Percentage Error)는 백분율 오차로 스케일 독립적 비교가 가능하다. R²(결정계수)는 모형의 설명력으로 1에 가까울수록 좋다.","keywords":["MSE","RMSE","MAE","MAPE","R²"],"level":"core","examTip":"MSE vs MAE: MSE는 이상값에 민감(제곱), MAE는 덜 민감(절대값). RMSE는 MSE에 루트를 씌워 원래 단위로 해석 가능. MAPE는 0이 있는 데이터에 사용 불가(0으로 나누기).","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C004","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"분석모형 진단","title":"잔차 분석과 모형 진단","content":"잔차(Residual) = 실제값 - 예측값이다. 잔차 분석은 회귀 모형의 가정 충족 여부를 확인한다. 잔차 vs 예측값 산점도: 무작위 분포면 등분산성 충족, 패턴이 있으면 비선형성 또는 이분산성. 잔차의 정규성: Q-Q 도표, 샤피로-윌크 검정으로 확인. 잔차의 독립성: 더빈-왓슨(Durbin-Watson) 검정으로 자기상관을 확인하며, 값이 2에 가까우면 자기상관 없음을 의미한다.","keywords":["잔차 분석","등분산성","정규성","더빈-왓슨","Q-Q 도표","자기상관"],"level":"core","examTip":"더빈-왓슨 통계량: 0~4 범위, 2에 가까우면 자기상관 없음, 0에 가까우면 양의 자기상관, 4에 가까우면 음의 자기상관. 이 해석이 빈출된다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C005","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"교차 검증","title":"교차 검증을 통한 모형 평가","content":"교차 검증(Cross-Validation)은 데이터를 여러 번 분할하여 학습·평가를 반복함으로써 모형의 일반화 성능을 안정적으로 추정하는 방법이다. K-Fold CV는 K개 폴드로 나누어 K번 평가 후 평균 성능을 산출한다. 홀드아웃(Hold-out)은 한 번만 분할하므로 분할에 따른 변동이 크다. 반복 교차 검증(Repeated CV)은 K-Fold를 여러 번 반복하여 더 안정적인 추정을 제공한다. 중첩 교차 검증(Nested CV)은 모형 선택과 성능 평가를 분리하여 편향 없는 평가를 가능하게 한다.","keywords":["교차 검증","K-Fold","홀드아웃","반복 교차 검증","중첩 교차 검증"],"level":"core","examTip":"홀드아웃은 간단하지만 불안정, K-Fold는 안정적. 중첩 CV는 바깥 루프(성능 평가)와 안쪽 루프(하이퍼파라미터 튜닝)를 분리하는 구조이다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C006","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"모수 유의성 검정","title":"회귀계수의 유의성 검정","content":"회귀분석에서 개별 회귀계수의 유의성은 t검정으로 확인한다. 귀무가설: βᵢ = 0 (해당 변수는 종속변수에 영향 없음). t통계량 = β̂ᵢ / SE(β̂ᵢ)이며, p-value가 유의수준보다 작으면 해당 계수가 통계적으로 유의하다. 모형 전체의 유의성은 F검정으로 확인하며, 귀무가설은 '모든 회귀계수가 0'이다. AIC(Akaike Information Criterion)와 BIC(Bayesian IC)는 모형의 적합도와 복잡도를 함께 고려하며 값이 작을수록 좋다.","keywords":["t검정","F검정","p-value","AIC","BIC","회귀계수 유의성"],"level":"core","examTip":"개별 계수는 t검정, 모형 전체는 F검정. AIC vs BIC: BIC가 변수 수에 대해 더 강한 패널티를 부여하므로 더 간결한 모형을 선호한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C007","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"적합도 검정","title":"적합도 검정과 모형 비교","content":"적합도 검정은 모형이 데이터를 얼마나 잘 설명하는지를 평가한다. 카이제곱 적합도 검정은 관측 빈도와 기대 빈도의 차이를 검정한다. 로지스틱 회귀에서 호스머-렘쇼(Hosmer-Lemeshow) 검정은 예측 확률과 실제 발생률의 일치도를 평가하며, p-value가 크면(유의하지 않으면) 모형이 적합하다고 판단한다. 이탈도(Deviance)는 로지스틱 회귀의 적합도 측도로, 포화 모형 대비 적합 모형의 차이를 나타낸다.","keywords":["적합도 검정","호스머-렘쇼","이탈도","카이제곱 적합도"],"level":"core","examTip":"호스머-렘쇼 검정에서 p-value가 '크면' 적합, '작으면' 부적합이라는 해석 방향이 일반 가설검정과 반대라는 점에 주의. 귀무가설이 '모형 적합'이기 때문이다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C008","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"과대적합 방지","title":"과대적합 방지 기법","content":"과대적합(Overfitting)은 학습 데이터에 과도하게 적합하여 새로운 데이터에 대한 일반화 성능이 떨어지는 현상이다. 방지 기법: ①정규화(Regularization, L1/L2 패널티) ②조기 종료(Early Stopping, 검증 성능 하락 시 학습 중단) ③드롭아웃(Dropout, 뉴런 비활성화) ④데이터 증강(Data Augmentation) ⑤교차 검증 ⑥가지치기(의사결정나무) ⑦앙상블(배깅). 학습 곡선에서 학습 오차와 검증 오차의 갭이 크면 과대적합을 의심한다.","keywords":["과대적합","정규화","조기 종료","드롭아웃","데이터 증강","학습 곡선"],"level":"core","examTip":"과대적합 징후: 학습 오차↓ 검증 오차↑ (갭 증가). 과소적합 징후: 학습 오차↑ 검증 오차↑ (둘 다 높음). 학습 곡선 해석이 빈출된다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C009","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"매개변수 최적화","title":"하이퍼파라미터 튜닝 방법","content":"그리드 서치(Grid Search)는 모든 하이퍼파라미터 조합을 탐색하여 최적 조합을 찾는다. 조합 수가 많으면 비용이 급격히 증가한다. 랜덤 서치(Random Search)는 무작위로 조합을 샘플링하여 효율적으로 탐색하며, 같은 시간 내 더 넓은 범위를 탐색할 수 있다. 베이지안 최적화(Bayesian Optimization)는 이전 평가 결과를 활용하여 유망한 영역을 집중 탐색한다. 일반적으로 랜덤 서치가 그리드 서치보다 효율적이다.","keywords":["그리드 서치","랜덤 서치","베이지안 최적화","하이퍼파라미터 튜닝"],"level":"core","examTip":"그리드 서치는 '철저하지만 느림', 랜덤 서치는 '효율적이고 고차원에서 유리'. 베이지안 최적화는 '이전 결과를 반영하여 지능적 탐색'이라는 차이를 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C010","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"분석모형 융합","title":"모형 융합과 앙상블 전략","content":"모형 융합(Model Fusion)은 여러 이질적 모형의 예측을 결합하여 성능을 향상시키는 전략이다. 투표(Voting): 하드 투표(다수결), 소프트 투표(확률 평균). 가중 평균(Weighted Average): 각 모형의 성능에 따라 가중치를 부여하여 결합. 스태킹(Stacking): 1단계 모형들의 예측을 2단계 메타 모형의 입력으로 사용. 블렌딩(Blending): 스태킹의 간소화 버전으로 검증 세트 예측만 메타 모형에 사용한다.","keywords":["모형 융합","투표","가중 평균","스태킹","블렌딩","메타 모형"],"level":"core","examTip":"하드 투표는 다수결(클래스), 소프트 투표는 확률 평균으로 구분. 스태킹에서 메타 모형은 단순한 모형(로지스틱 회귀 등)을 사용하는 것이 과대적합 방지에 유리하다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C011","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"최종모형 선정","title":"최종 모형 선정 기준","content":"최종 모형 선정 시 고려 사항: ①예측 성능(정확도, AUC, RMSE 등) ②해석 가능성(Interpretability, 비즈니스 의사결정에 설명 가능한가) ③일반화 성능(교차 검증 결과) ④연산 비용(학습·추론 시간) ⑤유지보수 용이성. 오캄의 면도날(Occam's Razor) 원칙: 성능이 비슷하면 더 단순한 모형을 선택한다. AIC/BIC는 적합도와 복잡도를 동시에 고려하여 모형 비교에 활용한다.","keywords":["모형 선정","해석 가능성","오캄의 면도날","일반화 성능","AIC","BIC"],"level":"core","examTip":"오캄의 면도날: '불필요하게 복잡한 모형을 피하라'. 성능이 비슷하면 단순한 모형이 일반화에 유리하다. AIC/BIC 값이 작을수록 좋은 모형이다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C012","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 평가","subtopic":"평가 지표","title":"불균형 데이터에서의 평가 지표","content":"클래스 불균형(예: 사기 탐지 1% vs 정상 99%) 상황에서 정확도(Accuracy)는 다수 클래스를 모두 맞추기만 해도 높게 나오므로 부적절하다. 적절한 지표: 정밀도(Precision), 재현율(Recall), F1 Score, AUC-ROC, PR-AUC, Cohen's Kappa. 재현율(민감도)은 실제 양성을 놓치지 않는 것이 중요한 경우(질병 진단, 사기 탐지), 정밀도는 거짓 양성을 줄이는 것이 중요한 경우(스팸 필터)에 더 중요하다.","keywords":["불균형 데이터","정밀도","재현율","F1 Score","PR-AUC","Cohen's Kappa"],"level":"core","examTip":"불균형 데이터에서 정확도만 사용하면 안 된다는 점이 매우 빈출. 질병 진단→재현율 중시(놓치면 위험), 스팸 필터→정밀도 중시(정상 메일 차단 방지)로 맥락에 따라 지표를 선택.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C013","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"매개변수 최적화","title":"학습률과 경사하강법 변형","content":"학습률(Learning Rate)은 가중치 갱신 크기를 결정하는 하이퍼파라미터이다. 학습률이 너무 크면 최솟값을 지나쳐 발산하고, 너무 작으면 수렴이 느리거나 지역 최솟값(Local Minimum)에 빠진다. 학습률 스케줄링(Learning Rate Scheduling)은 학습 진행에 따라 학습률을 조정하는 기법이다. 모멘텀(Momentum)은 이전 갱신 방향의 관성을 반영하여 진동을 줄이고 수렴을 가속한다.","keywords":["학습률","지역 최솟값","학습률 스케줄링","모멘텀","경사하강법"],"level":"core","examTip":"학습률이 너무 크면 '발산', 너무 작으면 '느린 수렴·지역 최솟값'. 이 트레이드오프가 빈출. 모멘텀은 '관성'으로 진동 감소+수렴 가속 효과를 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P9_C014","subject":"빅데이터 결과해석","part":"분석모형 평가 및 개선","section":"분석모형 개선","subtopic":"과대적합 방지","title":"조기 종료와 학습 곡선 분석","content":"조기 종료(Early Stopping)는 학습 과정에서 검증 세트의 성능을 모니터링하다가 성능이 더 이상 개선되지 않으면 학습을 중단하는 기법이다. patience 파라미터로 성능 미개선 허용 횟수를 설정한다. 학습 곡선(Learning Curve)은 학습 에포크에 따른 학습/검증 오차를 시각화한 것이다. 학습 오차 < 검증 오차이고 갭이 크면 과대적합, 학습 오차와 검증 오차가 모두 높으면 과소적합이다.","keywords":["조기 종료","Early Stopping","patience","학습 곡선","에포크"],"level":"core","examTip":"조기 종료는 '검증 성능이 악화되기 시작하는 시점에서 멈추는 것'이다. 학습 곡선 해석: 두 곡선이 수렴하면서 모두 낮으면 이상적 상태.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C001","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","title":"모형 해석의 개념과 중요성","content":"모형 해석(Model Interpretability)은 모형이 어떤 근거로 예측을 내렸는지 사람이 이해할 수 있도록 설명하는 것이다. 해석 가능한 모형(White-box): 선형 회귀, 로지스틱 회귀, 의사결정나무. 해석이 어려운 모형(Black-box): 딥러닝, 랜덤 포레스트, SVM. 사후 해석 기법으로 LIME(Local Interpretable Model-agnostic Explanations)과 SHAP(SHapley Additive exPlanations)이 있다. 금융·의료 등 고위험 분야에서는 해석 가능성이 특히 중요하다.","keywords":["모형 해석","White-box","Black-box","LIME","SHAP","해석 가능성"],"level":"core","examTip":"White-box(선형 회귀, 의사결정나무) vs Black-box(딥러닝, 앙상블) 구분이 빈출. SHAP는 게임이론의 Shapley Value 기반, LIME은 국소적 대리모형 기반이라는 차이를 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C002","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"분석모형 해석","title":"변수 중요도와 기여도 분석","content":"변수 중요도(Feature Importance)는 각 변수가 모형의 예측에 얼마나 기여하는지를 나타낸다. 트리 기반 모형: 노드 분할 시 불순도 감소량으로 측정. 순열 중요도(Permutation Importance): 특정 변수를 랜덤 섞었을 때 성능 하락 정도로 측정하며 모형에 독립적이다. 부분 의존도 그림(PDP, Partial Dependence Plot)은 특정 변수와 예측값의 관계를 시각화한다. SHAP Value는 각 변수의 기여도를 개별 예측 단위로 분해한다.","keywords":["변수 중요도","순열 중요도","PDP","SHAP Value","불순도 감소"],"level":"core","examTip":"트리 기반 중요도는 '불순도 감소', 순열 중요도는 '변수 섞기 후 성능 하락'으로 측정 방식이 다르다. 순열 중요도는 모형에 독립적(model-agnostic)이라는 점이 장점.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C003","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"비즈니스 기여도 평가","title":"분석 결과의 비즈니스 가치 평가","content":"분석 결과의 비즈니스 기여도는 모형의 예측이 실제 비즈니스 성과에 얼마나 기여하는지를 평가한다. ROI(투자수익률) = (이익 - 비용) / 비용으로 분석 프로젝트의 경제적 효과를 측정한다. 리프트 차트(Lift Chart)는 모형 사용 시 랜덤 대비 얼마나 나은 성과를 보이는지 시각화한다. 이익 차트(Profit Chart)는 임계값에 따른 실제 비즈니스 이익을 나타낸다. KPI(핵심성과지표) 개선율로 분석의 실질적 영향을 정량화한다.","keywords":["ROI","리프트 차트","이익 차트","KPI","비즈니스 기여도"],"level":"core","examTip":"리프트 차트에서 리프트 값이 높을수록 모형이 효과적. 리프트=1이면 랜덤과 동일. 비즈니스 관점에서 '통계적 유의성'과 '실질적 유의성'을 구분해야 한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C004","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"시공간 시각화","title":"시공간 데이터 시각화","content":"시공간 시각화는 시간과 공간 정보를 동시에 표현하는 기법이다. 코로플레스 맵(Choropleth Map)은 지역별 데이터 값을 색상 농도로 표현한다. 버블 맵(Bubble Map)은 지도 위에 크기가 다른 원으로 데이터 크기를 표현한다. 히트맵(Heatmap)은 격자 형태로 밀도나 강도를 색상으로 표현한다. 시간축 추가 시 애니메이션이나 슬라이더로 시간 변화를 표현할 수 있다.","keywords":["코로플레스 맵","버블 맵","히트맵","시공간 시각화"],"level":"core","examTip":"코로플레스 맵은 '지역별 색상 농도'로 구분. 단점으로 넓은 지역이 시각적으로 과대 표현되는 문제(면적 왜곡)가 있다는 점이 출제될 수 있다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C005","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"관계 시각화","title":"관계 시각화 기법","content":"산점도(Scatter Plot)는 두 연속형 변수 간의 관계를 점으로 표현한다. 산점도 행렬(Scatter Plot Matrix)은 여러 변수 쌍의 산점도를 격자로 배치한다. 네트워크 그래프(Network Graph)는 노드(개체)와 엣지(관계)로 연결 구조를 시각화한다. 상관행렬 히트맵은 변수 간 상관계수를 색상으로 표현한다. 평행좌표(Parallel Coordinates)는 다차원 데이터를 평행한 축으로 배치하여 패턴을 탐색한다.","keywords":["산점도","네트워크 그래프","상관행렬","평행좌표","산점도 행렬"],"level":"core","examTip":"산점도=두 연속형 변수, 네트워크 그래프=개체 간 연결 관계, 평행좌표=다차원 데이터의 패턴 탐색. 시각화 유형과 적합한 데이터 유형의 매칭이 출제된다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C006","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"비교 시각화","title":"비교 시각화 기법","content":"막대 그래프(Bar Chart)는 범주별 값을 비교하는 가장 기본적인 비교 시각화이다. 그룹 막대(Grouped Bar)는 범주 내 하위 그룹을 비교하고, 누적 막대(Stacked Bar)는 전체 내 구성 비율을 보여준다. 방사형 차트(Radar Chart)는 여러 변수를 동시에 비교하며 다각형의 형태로 특성을 비교한다. 트리맵(Treemap)은 계층적 데이터를 면적 비례로 표현한다. 워터폴 차트(Waterfall Chart)는 값의 누적 증감을 단계적으로 표현한다.","keywords":["막대 그래프","방사형 차트","트리맵","워터폴 차트","누적 막대"],"level":"core","examTip":"트리맵은 '계층적 데이터의 비율 비교', 방사형 차트는 '다변량 동시 비교'에 적합. 막대 그래프에서 그룹 막대 vs 누적 막대의 차이도 구분할 것.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C007","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"인포그래픽","title":"인포그래픽의 유형과 원칙","content":"인포그래픽(Infographic)은 정보와 데이터를 시각적으로 전달하는 콘텐츠이다. 유형: 통계형(데이터 중심), 타임라인형(시간 흐름), 프로세스형(절차·단계), 비교형(대상 비교), 지리형(지역 기반). 디자인 원칙: ①명확한 메시지 전달 ②데이터 잉크 비율 극대화(에드워드 터프티) ③시각적 위계(중요도에 따른 크기·색상) ④거짓말을 하지 않는 시각화(왜곡 금지). 대시보드는 여러 시각화를 한 화면에 배치하여 실시간 모니터링에 사용한다.","keywords":["인포그래픽","데이터 잉크 비율","대시보드","에드워드 터프티","시각적 위계"],"level":"core","examTip":"에드워드 터프티의 '데이터 잉크 비율' 개념이 빈출: 차트에서 데이터를 표현하는 잉크의 비율을 최대화하고 불필요한 장식을 줄여야 한다. 3D 차트는 왜곡을 유발하므로 지양.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C008","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 전개","title":"모형 전개(Deployment)와 서빙","content":"모형 전개(Deployment)는 개발된 분석 모형을 실제 운영 환경에 배포하여 활용하는 과정이다. 배치 처리(Batch Processing)는 대량의 데이터를 주기적으로 처리하며, 실시간 처리(Real-time Processing)는 요청 즉시 예측을 반환한다. API 서빙(REST API)으로 모형을 서비스로 제공하며, 엣지 배포(Edge Deployment)는 디바이스에서 직접 추론한다. MLOps는 ML 모형의 개발·배포·모니터링 파이프라인을 자동화하는 실천 방법이다.","keywords":["모형 전개","배치 처리","실시간 처리","API 서빙","MLOps","엣지 배포"],"level":"core","examTip":"배치 vs 실시간: 배치는 주기적 대량 처리(추천 시스템 업데이트 등), 실시간은 즉시 응답(사기 탐지 등). 사용 사례에 따라 선택한다는 점이 중요.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C009","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석결과 활용 시나리오 개발","title":"분석 결과 활용 시나리오","content":"분석 결과 활용 시나리오는 모형의 예측을 비즈니스 의사결정에 연결하는 구체적 방안이다. 고객 이탈 예측: 이탈 확률 높은 고객에게 리텐션 프로모션 제공. 사기 탐지: 실시간 거래 모니터링으로 이상 거래 차단. 수요 예측: 재고 최적화 및 공급망 관리. 추천 시스템: 개인화된 상품·콘텐츠 추천. 시나리오 개발 시 비즈니스 임팩트, 구현 가능성, 리스크를 함께 평가해야 한다.","keywords":["활용 시나리오","고객 이탈 예측","사기 탐지","수요 예측","추천 시스템"],"level":"core","examTip":"분석 결과를 '비즈니스 액션'으로 연결하는 것이 핵심. 단순히 모형을 만드는 것이 아니라 '누가, 언제, 어떤 의사결정에 활용하는가'를 정의해야 한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C010","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 모니터링","title":"모형 모니터링과 성능 관리","content":"모형 모니터링은 배포된 모형의 성능을 지속적으로 추적하는 활동이다. 모형 드리프트(Model Drift)는 시간이 지남에 따라 모형 성능이 저하되는 현상이다. 데이터 드리프트(Data Drift): 입력 데이터의 분포가 변화. 개념 드리프트(Concept Drift): 입력과 출력 간의 관계 자체가 변화. 모니터링 지표: 예측 정확도 추이, 입력 데이터 분포 변화, 예측 분포 변화. 성능 저하 감지 시 모형 재학습(Retraining)이 필요하다.","keywords":["모형 모니터링","데이터 드리프트","개념 드리프트","모형 드리프트","재학습"],"level":"core","examTip":"데이터 드리프트(입력 분포 변화) vs 개념 드리프트(입출력 관계 변화) 구분이 빈출. 개념 드리프트가 더 심각하며 모형 재학습이 필수적이다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C011","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 리모델링","title":"모형 리모델링과 생명주기 관리","content":"모형 리모델링(Remodeling)은 성능이 저하된 모형을 새로운 데이터나 알고리즘으로 갱신하는 과정이다. 리모델링 트리거: 성능 지표의 지속적 하락, 데이터/개념 드리프트 감지, 비즈니스 요구사항 변경. 리모델링 방법: ①기존 모형에 새 데이터로 재학습(Incremental Learning) ②새 모형으로 완전 교체 ③앙상블로 기존·신규 모형 결합. A/B 테스트로 기존 모형과 신규 모형의 성능을 비교한 뒤 전환한다. 모형 버전 관리(Model Versioning)로 롤백이 가능하도록 한다.","keywords":["리모델링","A/B 테스트","모형 버전 관리","증분 학습","재학습 트리거"],"level":"core","examTip":"A/B 테스트는 '기존 vs 신규 모형'을 실제 환경에서 비교하는 가장 신뢰할 수 있는 방법이다. 모형 버전 관리는 문제 발생 시 이전 버전으로 롤백할 수 있게 한다.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C012","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 시각화","subtopic":"시공간 시각화","title":"시계열 시각화 기법","content":"라인 차트(Line Chart)는 시간에 따른 데이터의 추세와 변화를 연속적인 선으로 표현하는 가장 기본적인 시계열 시각화이다. 영역 차트(Area Chart)는 라인 차트 아래를 채워 누적 변화를 강조한다. 캔들스틱 차트(Candlestick Chart)는 금융 데이터의 시가·종가·고가·저가를 표현한다. 스파크라인(Sparkline)은 작은 공간에 추세를 간결하게 보여주는 미니 차트이다.","keywords":["라인 차트","영역 차트","캔들스틱","스파크라인","시계열 시각화"],"level":"core","examTip":"시계열 데이터에는 라인 차트가 가장 기본이자 효과적이다. 캔들스틱은 금융 특화, 스파크라인은 대시보드의 공간 절약용이라는 용도 차이를 구분.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C013","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 해석","subtopic":"비즈니스 기여도 평가","title":"리프트 차트와 이익 곡선","content":"리프트 차트(Lift Chart)는 모형 사용 시 랜덤 모형 대비 얼마나 더 효과적인지를 시각화한다. 전체 데이터를 예측 확률 순으로 정렬하고 상위 N%를 선택했을 때의 효과를 나타낸다. 리프트 = 모형 적중률 / 전체 적중률이며, 상위 구간에서 리프트가 높을수록 좋은 모형이다. 이익 곡선(Profit Curve)은 각 임계값에서의 실제 비즈니스 이익을 계산하여 최적 임계값을 결정하는 데 사용한다. 누적 이익 차트(Cumulative Gains Chart)는 상위 N%에서 양성 클래스를 얼마나 포착하는지 보여준다.","keywords":["리프트 차트","이익 곡선","누적 이익 차트","임계값 최적화"],"level":"core","examTip":"리프트 차트에서 대각선은 랜덤 모형, 곡선이 대각선 위에 있을수록 좋은 모형. '상위 10%에서 리프트 3.0' = 랜덤 대비 3배 효과적이라는 해석을 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"},{"id":"S4_P10_C014","subject":"빅데이터 결과해석","part":"분석결과 해석 및 활용","section":"분석결과 활용","subtopic":"분석모형 모니터링","title":"모형 공정성과 윤리적 고려사항","content":"모형 공정성(Fairness)은 분석 모형이 특정 집단(성별, 인종, 연령 등)에 대해 차별적 예측을 하지 않는지 평가하는 것이다. 편향의 원인: 학습 데이터의 편향, 변수 선택의 편향, 라벨링의 편향. 공정성 지표: 인구통계적 동등성(Demographic Parity), 균등 기회(Equalized Opportunity). 설명 가능한 AI(XAI, Explainable AI)는 AI의 의사결정 과정을 투명하게 하여 신뢰성과 책임성을 확보하는 접근이다.","keywords":["모형 공정성","편향","XAI","설명 가능한 AI","인구통계적 동등성"],"level":"advanced","examTip":"AI 윤리·공정성은 최근 중요도가 높아지는 주제. 데이터 편향→모형 편향→차별적 결과의 연쇄를 이해하고, XAI가 이를 해결하기 위한 접근이라는 맥락을 기억.","verificationStatus":"verified","verifiedAt":"2026-03-15","sourceType":"general"}];

const APP_QUIZZES = [{"id":"S1_P1_Q001","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터의 특징","question":"다음 중 빅데이터의 특성인 5V에 해당하지 않는 것은?","options":["A) Volume(규모)","B) Velocity(속도)","C) Validity(유효성)","D) Veracity(정확성)"],"answerIndex":2,"explanation":"5V는 Volume, Velocity, Variety, Veracity, Value이다. Validity(유효성)는 5V에 포함되지 않는다. Veracity는 데이터의 정확성·신뢰성을 의미하므로 Validity와 혼동하지 않아야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C001"]},{"id":"S1_P1_Q002","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터의 특징","question":"다음 중 반정형 데이터에 해당하는 것은?","options":["A) 관계형 데이터베이스 테이블","B) JSON 파일","C) 동영상 파일","D) 음성 녹음 파일"],"answerIndex":1,"explanation":"JSON은 일정한 구조(키-값 쌍)를 가지지만 고정된 스키마가 없으므로 반정형 데이터이다. A는 정형 데이터, C와 D는 비정형 데이터이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C002"]},{"id":"S1_P1_Q003","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터의 특징","question":"빅데이터의 3V에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) Volume은 데이터의 크기와 양을 의미한다","B) Velocity는 데이터의 생성·수집·처리 속도를 의미한다","C) Variety는 데이터의 정확성과 신뢰성을 의미한다","D) Variety는 정형, 반정형, 비정형 등 다양한 유형을 의미한다"],"answerIndex":2,"explanation":"Variety는 데이터의 다양성(유형의 다양성)을 의미한다. 데이터의 정확성·신뢰성은 Veracity(5V에서 추가)에 해당한다. C는 Veracity의 설명을 Variety에 잘못 적용한 것이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C001"]},{"id":"S1_P1_Q004","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터의 가치","question":"빅데이터의 가치에 대한 설명으로 가장 적절한 것은?","options":["A) 빅데이터의 가치는 수집한 데이터의 양에 비례한다","B) 빅데이터의 핵심 가치는 분석을 통한 인사이트 도출과 의사결정 지원에 있다","C) 빅데이터는 실시간 처리 기술 자체가 핵심 가치이다","D) 빅데이터의 가치는 하드웨어 인프라 규모에 의해 결정된다"],"answerIndex":1,"explanation":"빅데이터의 핵심 가치는 데이터의 양이나 기술 자체가 아니라 분석을 통해 비즈니스 인사이트를 도출하고 의사결정을 지원하는 데 있다. A, C, D는 기술·인프라 중심의 관점으로 핵심 가치를 잘못 설명하고 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C003"]},{"id":"S1_P1_Q005","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터의 가치","question":"빅데이터 활용 시 위기 요인에 해당하지 않는 것은?","options":["A) 사생활 침해","B) 책임 원칙 훼손","C) 데이터 오용","D) 데이터 표준화"],"answerIndex":3,"explanation":"빅데이터 활용의 3대 위기 요인은 사생활 침해, 책임 원칙 훼손, 데이터 오용이다. 데이터 표준화는 데이터 품질 관리를 위한 긍정적 활동이지 위기 요인이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C004"]},{"id":"S1_P1_Q006","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"데이터 산업의 이해","question":"데이터 산업 가치사슬의 순서로 가장 적절한 것은?","options":["A) 생산 → 유통 → 수집 → 활용","B) 수집 → 생산 → 가공 → 유통","C) 생산 → 수집·저장 → 가공·분석 → 유통·활용","D) 가공 → 수집 → 분석 → 생산"],"answerIndex":2,"explanation":"데이터 가치사슬은 생산 → 수집·저장 → 가공·분석 → 유통·활용의 순서로 구성된다. 데이터가 먼저 생산되고, 수집·저장된 후, 가공·분석을 거쳐 최종적으로 유통·활용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C005"]},{"id":"S1_P1_Q007","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"데이터 산업의 이해","question":"다음 중 마이데이터에 대한 설명으로 가장 적절한 것은?","options":["A) 기업이 고객 데이터를 수집·분석하여 마케팅에 활용하는 것","B) 개인이 자신의 데이터를 주도적으로 관리·활용하는 것","C) 정부가 공공데이터를 개방하여 민간에 제공하는 것","D) 기업 간 데이터를 교환하는 B2B 데이터 거래를 의미하는 것"],"answerIndex":1,"explanation":"마이데이터는 개인이 자신의 데이터에 대한 권리를 행사하여 주도적으로 관리·활용하는 개념이다. A는 CRM/마케팅, C는 공공데이터 개방, D는 데이터 거래의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C006"]},{"id":"S1_P1_Q008","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터 조직 및 인력","question":"빅데이터 분석 조직의 유형 중 집중형 조직에 대한 설명으로 가장 적절한 것은?","options":["A) 각 사업부에 분석 인력을 배치하여 현업 적합성을 높인다","B) 전담 분석 조직이 전사 분석을 수행하여 일관성을 확보한다","C) 외부 전문 업체에 분석을 위탁하는 구조이다","D) 프로젝트별로 임시 분석팀을 구성하는 방식이다"],"answerIndex":1,"explanation":"집중형 조직은 독립적인 전담 분석 조직이 전사의 분석 업무를 수행하는 구조이다. A는 분산형, C는 아웃소싱, D는 프로젝트형 조직의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C007"]},{"id":"S1_P1_Q009","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터 조직 및 인력","question":"다음 중 데이터 엔지니어의 주요 역할로 가장 적절한 것은?","options":["A) 비즈니스 인사이트 도출을 위한 탐색적 분석 수행","B) 데이터 파이프라인 구축 및 인프라 관리","C) 머신러닝 모델 설계 및 비즈니스 문제 해결","D) 데이터 거버넌스 정책 수립 및 품질 관리"],"answerIndex":1,"explanation":"데이터 엔지니어는 데이터 수집·저장·처리를 위한 파이프라인 구축과 인프라 관리를 담당한다. A는 데이터 분석가, C는 데이터 사이언티스트, D는 데이터 스튜어드의 역할이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C008"]},{"id":"S1_P1_Q010","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터 플랫폼","question":"하둡(Hadoop) 에코시스템에서 RDBMS와 HDFS 간 데이터 전송을 담당하는 도구는?","options":["A) Hive","B) Flume","C) Sqoop","D) Oozie"],"answerIndex":2,"explanation":"Sqoop은 RDBMS와 HDFS 간 대용량 데이터 전송(Import/Export)을 위한 도구이다. Hive는 SQL 인터페이스, Flume은 로그 수집, Oozie는 워크플로 관리 도구이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C009"]},{"id":"S1_P1_Q011","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터 플랫폼","question":"다음 중 하둡의 분산 파일 시스템인 HDFS에 대한 설명으로 적절하지 않은 것은?","options":["A) 대용량 파일을 블록 단위로 분할하여 분산 저장한다","B) 네임노드(NameNode)가 메타데이터를 관리한다","C) 데이터 수정(update)이 자유롭게 가능하다","D) 데이터 복제를 통해 장애 내성(fault tolerance)을 확보한다"],"answerIndex":2,"explanation":"HDFS는 한 번 쓰고 여러 번 읽는(Write Once, Read Many) 구조로 데이터의 수정(update)을 지원하지 않는다. 추가(append)만 가능하다. A, B, D는 HDFS의 올바른 특성이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C009"]},{"id":"S1_P1_Q012","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터 플랫폼","question":"다음 중 NoSQL 데이터베이스 유형과 대표 제품의 매칭으로 올바르지 않은 것은?","options":["A) Key-Value — Redis","B) Document — MongoDB","C) Column-Family — Neo4j","D) Graph — Neo4j"],"answerIndex":2,"explanation":"Column-Family 유형의 대표 제품은 Cassandra, HBase이다. Neo4j는 Graph 유형의 데이터베이스이다. C에서 Column-Family와 Neo4j를 잘못 매칭하고 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C010"]},{"id":"S1_P1_Q013","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터 플랫폼","question":"Apache Spark에 대한 설명으로 가장 적절한 것은?","options":["A) 디스크 기반 처리로 MapReduce보다 안정적이다","B) 인메모리 기반 처리로 MapReduce보다 빠르며 배치·실시간·ML을 지원한다","C) RDBMS와 HDFS 간 데이터 전송을 위한 도구이다","D) 로그 데이터 수집에 특화된 도구이다"],"answerIndex":1,"explanation":"Spark는 인메모리(In-Memory) 기반 분산 처리 프레임워크로 MapReduce보다 빠른 처리가 가능하다. 배치, 실시간(스트리밍), 머신러닝(MLlib) 등을 지원한다. C는 Sqoop, D는 Flume의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C010"]},{"id":"S1_P1_Q014","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터와 인공지능","question":"인공지능(AI), 머신러닝(ML), 딥러닝(DL)의 관계로 올바른 것은?","options":["A) ML ⊃ AI ⊃ DL","B) AI ⊃ ML ⊃ DL","C) DL ⊃ ML ⊃ AI","D) AI = ML = DL"],"answerIndex":1,"explanation":"AI가 가장 넓은 개념이고, ML은 AI의 하위 분야, DL은 ML의 하위 분야이다. 따라서 포함 관계는 AI ⊃ ML ⊃ DL이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C011"]},{"id":"S1_P1_Q015","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터와 인공지능","question":"다음 중 비지도학습에 해당하는 것은?","options":["A) 스팸 메일 분류","B) 주택 가격 예측","C) 고객 군집화(클러스터링)","D) 이미지 인식"],"answerIndex":2,"explanation":"군집화(클러스터링)는 레이블 없이 데이터의 유사성을 기반으로 그룹을 나누는 비지도학습이다. 스팸 메일 분류(A)와 이미지 인식(D)은 레이블이 있는 지도학습(분류), 주택 가격 예측(B)은 지도학습(회귀)에 해당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C012"]},{"id":"S1_P1_Q016","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터와 인공지능","question":"강화학습에 대한 설명으로 가장 적절한 것은?","options":["A) 정답 레이블이 있는 데이터로 학습하는 방법이다","B) 데이터의 숨겨진 구조를 발견하는 학습 방법이다","C) 환경과 상호작용하며 보상을 최대화하는 방향으로 학습하는 방법이다","D) 신경망의 은닉층을 깊게 쌓아 학습하는 방법이다"],"answerIndex":2,"explanation":"강화학습은 에이전트가 환경과 상호작용하면서 보상(reward)을 최대화하도록 최적의 행동 정책을 학습하는 방법이다. A는 지도학습, B는 비지도학습, D는 딥러닝의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C012"]},{"id":"S1_P1_Q017","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 법·제도","question":"데이터 3법 개정(2020년)의 핵심 내용으로 가장 적절하지 않은 것은?","options":["A) 개인정보보호위원회로 감독 기능 일원화","B) 가명정보 개념 도입 및 데이터 이용 활성화","C) 정보통신망법을 개인정보 보호의 독립 기관으로 강화","D) 데이터 활용과 보호의 균형 도모"],"answerIndex":2,"explanation":"데이터 3법 개정으로 정보통신망법의 개인정보 관련 조항이 개인정보보호법으로 이관되었다. 정보통신망법이 독립 기관으로 강화된 것이 아니라 오히려 개인정보 보호 기능은 개인정보보호법으로 통합되었다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C013"]},{"id":"S1_P1_Q018","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 법·제도","question":"가명정보에 대한 설명으로 가장 적절한 것은?","options":["A) 개인정보보호법의 적용을 받지 않는다","B) 추가 정보 없이는 특정 개인을 식별할 수 없도록 처리한 정보이다","C) 상업적 마케팅 목적으로 자유롭게 활용할 수 있다","D) 원래의 개인정보와 동일한 수준의 동의가 필요하다"],"answerIndex":1,"explanation":"가명정보는 추가 정보의 사용·결합 없이는 특정 개인을 알아볼 수 없도록 처리한 정보이다. 개인정보보호법의 적용을 받으며(A 오류), 통계·연구·공익적 기록보존 목적에 한해 동의 없이 활용 가능하다(C 오류). 별도 동의 없이 활용 가능하므로 D도 오류이다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C014"]},{"id":"S1_P1_Q019","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 법·제도","question":"다음 중 개인정보, 가명정보, 익명정보에 대한 설명으로 올바르지 않은 것은?","options":["A) 익명정보는 개인정보보호법의 적용 대상이 아니다","B) 가명정보는 통계·연구·공익적 기록보존 목적으로 활용 가능하다","C) 가명정보는 개인정보에 해당하지 않으므로 안전조치 의무가 없다","D) 개인정보는 살아있는 개인에 관한 식별 가능한 정보이다"],"answerIndex":2,"explanation":"가명정보는 여전히 '개인정보'에 해당하므로 안전조치 의무가 적용된다. 개인정보보호법 적용 대상 외인 것은 '익명정보'이다. C가 가명정보를 개인정보가 아니라고 서술한 것은 오류이다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C014"]},{"id":"S1_P1_Q020","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 활용","question":"가명정보 결합에 대한 설명으로 가장 적절한 것은?","options":["A) 개별 기관이 자체적으로 가명정보를 결합할 수 있다","B) 결합전문기관을 통해서만 결합이 가능하다","C) 결합된 데이터는 별도 심사 없이 자유롭게 반출 가능하다","D) 가명정보 결합은 상업적 목적에만 허용된다"],"answerIndex":1,"explanation":"가명정보 결합은 반드시 결합전문기관을 통해서만 가능하다. 개별 기관의 자체 결합은 허용되지 않으며(A 오류), 반출 시 반출심사위원회의 승인이 필요하다(C 오류). 통계·연구·공익적 목적에 한하며 상업적 목적만은 아니다(D 오류).","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C015"]},{"id":"S1_P1_Q021","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 활용","question":"다음 중 정보주체의 권리에 해당하지 않는 것은?","options":["A) 개인정보 열람권","B) 개인정보 정정·삭제권","C) 개인정보 수집 의무권","D) 개인정보 처리정지권"],"answerIndex":2,"explanation":"정보주체는 열람권, 정정·삭제권, 처리정지권, 동의 철회권 등의 '권리'를 가진다. '수집 의무권'이라는 개념은 존재하지 않으며, 수집은 정보처리자의 행위이지 정보주체의 권리가 아니다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C016"]},{"id":"S1_P1_Q022","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 활용","question":"개인정보 전송 요구권(데이터 이동권)에 대한 설명으로 가장 적절한 것은?","options":["A) 개인정보처리자가 다른 기관에 자유롭게 개인정보를 전송할 수 있는 권리이다","B) 정보주체가 자신의 개인정보를 기계 판독 가능한 형태로 다른 사업자에게 전송을 요구할 수 있는 권리이다","C) 정부가 공공데이터를 민간에 의무적으로 전송해야 하는 것이다","D) 해외 사업자에게만 적용되는 권리이다"],"answerIndex":1,"explanation":"개인정보 전송 요구권은 정보주체가 자신의 개인정보를 기계 판독 가능한 형태로 본인 또는 다른 사업자에게 전송해 줄 것을 요구할 수 있는 권리이다. 마이데이터 정책과 관련이 깊다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C016"]},{"id":"S1_P1_Q023","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 개요 및 활용","subtopic":"빅데이터 조직 및 인력","question":"빅데이터 분석 조직의 혼합형(하이브리드) 구조에 대한 설명으로 가장 적절한 것은?","options":["A) 전사 분석 CoE 없이 각 사업부에만 분석 인력을 배치한다","B) 외부 컨설팅 조직에 분석을 전량 위탁한다","C) 전사 분석 CoE와 사업부 분석팀을 병행 운영한다","D) 프로젝트 종료 시 조직을 해체하는 구조이다"],"answerIndex":2,"explanation":"혼합형(하이브리드) 조직은 전사 CoE(Center of Excellence)가 분석 표준과 방법론을 관리하고, 각 사업부에도 분석팀을 두어 현업 밀착형 분석을 수행하는 병행 구조이다. A는 분산형의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C007"]},{"id":"S1_P1_Q024","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"빅데이터 플랫폼","question":"다음 중 하둡 에코시스템 구성요소와 역할의 매칭으로 올바른 것은?","options":["A) Hive — 실시간 로그 수집","B) Flume — SQL 기반 데이터 질의","C) Oozie — 워크플로 스케줄링 및 관리","D) HBase — 관계형 데이터베이스 연동"],"answerIndex":2,"explanation":"Oozie는 하둡 작업의 워크플로 스케줄링 및 관리를 담당한다. Hive는 SQL 기반 질의(A와 B 바뀜), Flume은 로그 수집, HBase는 NoSQL 데이터베이스(관계형이 아님)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P1_C009"]},{"id":"S1_P1_Q025","subject":"빅데이터 분석 기획","part":"빅데이터의 이해","section":"빅데이터 기술 및 제도","subtopic":"개인정보 법·제도","question":"개인정보 처리 원칙에 해당하지 않는 것은?","options":["A) 목적 제한의 원칙","B) 최소 수집의 원칙","C) 무제한 보유의 원칙","D) 안전성 확보의 원칙"],"answerIndex":2,"explanation":"개인정보 처리 원칙에는 목적 제한, 최소 수집, 정확성 보장, 안전성 확보 등이 있다. '무제한 보유'는 원칙에 반하며, 개인정보는 목적 달성 후 지체 없이 파기해야 한다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P1_C016"]},{"id":"S1_P2_Q001","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 로드맵 설정","question":"분석 성숙도 모델의 단계 순서로 올바른 것은?","options":["A) 활용기 → 도입기 → 확산기 → 최적화기","B) 도입기 → 활용기 → 확산기 → 최적화기","C) 도입기 → 확산기 → 활용기 → 최적화기","D) 최적화기 → 확산기 → 활용기 → 도입기"],"answerIndex":1,"explanation":"분석 성숙도 모델은 도입기 → 활용기 → 확산기 → 최적화기 순서로 발전한다. 도입기에서 분석을 시작하고, 최적화기에서 전사적으로 자동화·최적화된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C001"]},{"id":"S1_P2_Q002","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 로드맵 설정","question":"분석 과제 우선순위 평가에서 'Quick Win'에 해당하는 과제는?","options":["A) 시급성 낮고 난이도 높은 과제","B) 시급성 높고 난이도 높은 과제","C) 시급성 높고 난이도 낮은 과제","D) 시급성 낮고 난이도 낮은 과제"],"answerIndex":2,"explanation":"Quick Win은 전략적 중요도(시급성)가 높으면서 구현 난이도가 낮아 빠르게 성과를 낼 수 있는 과제이다. B는 중장기 과제에 해당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C002"]},{"id":"S1_P2_Q003","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 로드맵 설정","question":"분석 로드맵 수립 시 고려사항으로 가장 적절하지 않은 것은?","options":["A) 분석 과제의 우선순위","B) 적용 범위와 분석 난이도","C) 분석 도구의 가격만을 기준으로 선정","D) 조직의 현재 분석 성숙도 수준"],"answerIndex":2,"explanation":"분석 로드맵은 우선순위, 적용 범위, 난이도, 조직 성숙도 등을 종합적으로 고려하여 수립한다. 분석 도구의 가격만으로 판단하는 것은 적절하지 않다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C001","S1_P2_C002"]},{"id":"S1_P2_Q004","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 문제 정의","question":"하향식(Top-Down) 분석 접근법의 절차로 올바른 것은?","options":["A) 데이터 탐색 → 인사이트 발견 → 비즈니스 적용","B) 문제 탐색 → 문제 정의 → 해결방안 탐색 → 타당성 검토","C) 모델링 → 데이터 준비 → 평가 → 배포","D) 표본 추출 → 탐색 → 변환 → 모델링 → 평가"],"answerIndex":1,"explanation":"하향식 접근법은 비즈니스 목표에서 출발하여 문제 탐색 → 문제 정의 → 해결방안 탐색 → 타당성 검토의 순서로 진행한다. A는 상향식, D는 SEMMA 방법론의 절차이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C003"]},{"id":"S1_P2_Q005","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 문제 정의","question":"상향식(Bottom-Up) 분석 접근법에 대한 설명으로 가장 적절한 것은?","options":["A) 비즈니스 목표에서 출발하여 분석 과제를 도출한다","B) 기존 데이터에서 출발하여 인사이트를 발견한 후 비즈니스 적용을 검토한다","C) 경영진의 지시에 따라 분석 과제를 수행한다","D) 외부 컨설팅 모델을 그대로 적용한다"],"answerIndex":1,"explanation":"상향식(Bottom-Up) 접근법은 기존에 보유한 데이터를 탐색하며 패턴이나 인사이트를 발견하고, 이를 비즈니스에 적용하는 방식이다. A는 하향식(Top-Down) 접근법의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C003"]},{"id":"S1_P2_Q006","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"분석 문제 정의","question":"분석 과제 도출 기법 중 업무 프로세스 데이터를 분석하여 비효율을 발견하는 기법은?","options":["A) 벤치마킹","B) 프로세스 마이닝","C) 브레인스토밍","D) SWOT 분석"],"answerIndex":1,"explanation":"프로세스 마이닝은 실제 업무 프로세스에서 생성된 이벤트 로그 데이터를 분석하여 프로세스의 병목, 비효율, 편차를 발견하는 기법이다. 벤치마킹은 외부 사례 참조이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C004"]},{"id":"S1_P2_Q007","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"CRISP-DM 방법론의 첫 번째 단계는?","options":["A) 데이터 이해","B) 비즈니스 이해","C) 데이터 준비","D) 모델링"],"answerIndex":1,"explanation":"CRISP-DM은 비즈니스 이해 → 데이터 이해 → 데이터 준비 → 모델링 → 평가 → 배포의 6단계이다. 비즈니스 이해에서 시작하는 것이 CRISP-DM의 핵심 특징이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C005"]},{"id":"S1_P2_Q008","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"다음 중 KDD 프로세스의 단계 순서로 올바른 것은?","options":["A) 선택 → 전처리 → 변환 → 데이터마이닝 → 해석/평가","B) 비즈니스 이해 → 데이터 이해 → 모델링 → 평가 → 배포","C) 표본추출 → 탐색 → 변환 → 모델링 → 평가","D) 전처리 → 선택 → 해석 → 변환 → 마이닝"],"answerIndex":0,"explanation":"KDD는 Selection(선택) → Preprocessing(전처리) → Transformation(변환) → Data Mining(데이터마이닝) → Interpretation/Evaluation(해석/평가)의 5단계이다. B는 CRISP-DM, C는 SEMMA의 순서이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C005"]},{"id":"S1_P2_Q009","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"SEMMA 방법론에 대한 설명으로 가장 적절한 것은?","options":["A) 비즈니스 이해에서 시작하는 산업 표준 방법론이다","B) SAS에서 개발한 방법론으로 Sample → Explore → Modify → Model → Assess 순서이다","C) 5단계로 구성되며 데이터 선택에서 시작한다","D) 구글이 개발한 빅데이터 전용 방법론이다"],"answerIndex":1,"explanation":"SEMMA는 SAS(통계 소프트웨어)에서 개발한 방법론으로 Sample(표본추출) → Explore(탐색) → Modify(변환) → Model(모델링) → Assess(평가)의 5단계이다. A는 CRISP-DM, C는 KDD의 설명에 가깝다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C005"]},{"id":"S1_P2_Q010","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"탐색적 데이터 분석(EDA)에 대한 설명으로 가장 적절한 것은?","options":["A) 사전 가설을 통계적으로 검증하는 분석이다","B) 가설 없이 데이터를 탐색하며 패턴을 발견하는 분석이다","C) 머신러닝 모델의 성능을 평가하는 분석이다","D) 실험 설계에 기반한 인과관계 분석이다"],"answerIndex":1,"explanation":"EDA(Exploratory Data Analysis)는 사전 가설 없이 데이터를 시각화·요약하여 패턴, 이상치, 분포 등을 탐색하는 분석이다. A는 확인적 데이터 분석(CDA)의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C006"]},{"id":"S1_P2_Q011","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"다음 중 분석 모형 선정 시 고려사항으로 가장 적절하지 않은 것은?","options":["A) 데이터의 양과 차원","B) 모형의 해석 가능성","C) 분석 담당자의 연봉","D) 모형의 성능과 비용"],"answerIndex":2,"explanation":"분석 모형 선정 시 데이터 특성, 해석 가능성, 성능, 비용 등을 고려한다. 분석 담당자의 연봉은 모형 선정의 직접적인 기준이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C006"]},{"id":"S1_P2_Q012","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"데이터 확보 계획","question":"데이터 확보 방법에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) 내부 데이터는 ERP, CRM, 로그 등에서 확보할 수 있다","B) 외부 데이터는 공공데이터, SNS, 크롤링 등으로 수집한다","C) 크롤링으로 수집한 데이터는 저작권·개인정보 법적 이슈가 없다","D) 데이터 거래소를 통해 데이터를 구매할 수 있다"],"answerIndex":2,"explanation":"크롤링으로 수집한 데이터도 저작권, 개인정보보호법 등 법적 이슈가 발생할 수 있다. 웹사이트의 robots.txt, 이용약관, 개인정보 포함 여부를 반드시 확인해야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C007"]},{"id":"S1_P2_Q013","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"데이터 확보 계획","question":"다음 중 데이터 품질 평가 요소에 해당하지 않는 것은?","options":["A) 완전성(Completeness)","B) 정확성(Accuracy)","C) 복잡성(Complexity)","D) 일관성(Consistency)"],"answerIndex":2,"explanation":"데이터 품질 평가 요소는 완전성, 정확성, 일관성, 적시성, 유효성, 유일성 등이다. 복잡성(Complexity)은 데이터 품질 평가 요소가 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C008"]},{"id":"S1_P2_Q014","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"데이터 확보 계획","question":"'Garbage In, Garbage Out(GIGO)'의 의미로 가장 적절한 것은?","options":["A) 데이터 양이 적으면 분석 결과도 적다","B) 품질이 낮은 데이터를 입력하면 분석 결과도 신뢰할 수 없다","C) 비정형 데이터는 분석에 사용할 수 없다","D) 데이터 저장 비용이 높으면 분석 비용도 높아진다"],"answerIndex":1,"explanation":"GIGO는 '쓰레기 데이터를 넣으면 쓰레기 결과가 나온다'는 의미로, 데이터 품질이 분석 결과의 품질을 결정한다는 원칙이다. 데이터 양이나 비용의 문제가 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C008"]},{"id":"S1_P2_Q015","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"데이터 확보 계획","question":"데이터 품질 요소 중 '적시성(Timeliness)'의 의미로 가장 적절한 것은?","options":["A) 데이터에 결측치가 없는 정도","B) 데이터가 실제 값과 일치하는 정도","C) 데이터가 필요한 시점에 사용 가능한 정도","D) 데이터 간 모순이 없는 정도"],"answerIndex":2,"explanation":"적시성(Timeliness)은 데이터가 필요한 시점에 적시에 활용 가능한 정도를 의미한다. A는 완전성, B는 정확성, D는 일관성의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C008"]},{"id":"S1_P2_Q016","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"분석 절차 및 작업 계획","question":"WBS(Work Breakdown Structure)에 대한 설명으로 가장 적절한 것은?","options":["A) 데이터를 분류하는 알고리즘이다","B) 프로젝트를 작업 단위로 분해한 계층적 구조이다","C) 데이터 품질을 평가하는 프레임워크이다","D) 분석 모델의 성능을 비교하는 도구이다"],"answerIndex":1,"explanation":"WBS는 프로젝트 관리 기법으로, 전체 프로젝트를 관리 가능한 작업 단위(Work Package)로 분해한 계층적 구조이다. 데이터 분석이나 모델 평가 도구가 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C009"]},{"id":"S1_P2_Q017","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"분석 절차 및 작업 계획","question":"데이터 분석 프로젝트에서 가장 많은 시간이 소요되는 단계는?","options":["A) 모델링","B) 데이터 준비(전처리)","C) 평가","D) 배포"],"answerIndex":1,"explanation":"데이터 분석 프로젝트에서 데이터 준비(수집, 정제, 변환 등)가 전체 시간의 약 60~80%를 차지한다. 모델링은 10~20% 정도이다. 데이터 준비의 비중을 과소평가하는 실수에 주의.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C009"]},{"id":"S1_P2_Q018","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"분석 절차 및 작업 계획","question":"분석 거버넌스에 대한 설명으로 가장 적절한 것은?","options":["A) 특정 분석 도구를 선정하는 과정이다","B) 조직의 분석 활동을 체계적으로 관리하기 위한 표준·정책·조직·프로세스 체계이다","C) 머신러닝 모델을 학습시키는 기법이다","D) 데이터를 시각화하여 보고하는 절차이다"],"answerIndex":1,"explanation":"분석 거버넌스는 조직의 분석 활동 전반을 체계적으로 관리하기 위한 표준, 정책, 조직 구조, 프로세스의 총체적 관리 체계이다. 특정 도구나 기법이 아닌 관리 체계이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C010"]},{"id":"S1_P2_Q019","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석방안수립","subtopic":"데이터 분석 방안","question":"다음 중 CRISP-DM 방법론의 6단계에 포함되지 않는 것은?","options":["A) 비즈니스 이해","B) 데이터 준비","C) 표본 추출(Sampling)","D) 배포(Deployment)"],"answerIndex":2,"explanation":"CRISP-DM은 비즈니스 이해 → 데이터 이해 → 데이터 준비 → 모델링 → 평가 → 배포의 6단계이다. 표본 추출(Sampling)은 SEMMA 방법론의 첫 번째 단계이며, CRISP-DM에는 독립 단계로 포함되지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C005"]},{"id":"S1_P2_Q020","subject":"빅데이터 분석 기획","part":"데이터분석 계획","section":"분석 작업 계획","subtopic":"분석 절차 및 작업 계획","question":"분석 마스터 플랜에 포함되는 내용으로 가장 적절하지 않은 것은?","options":["A) 분석 과제 정의","B) 분석 로드맵","C) 거버넌스 체계","D) 서버 하드웨어 조립 매뉴얼"],"answerIndex":3,"explanation":"분석 마스터 플랜은 전사 분석 전략의 최상위 문서로 분석 과제 정의, 로드맵, 거버넌스 체계를 포함한다. 서버 하드웨어 조립 매뉴얼은 인프라 운영 영역이지 분석 전략 문서에 포함되지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P2_C010"]},{"id":"S1_P3_Q001","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 수집","question":"ETL과 ELT의 차이에 대한 설명으로 가장 적절한 것은?","options":["A) ETL은 적재 후 변환, ELT는 변환 후 적재이다","B) ETL은 변환 후 적재, ELT는 적재 후 변환이다","C) ETL과 ELT는 동일한 프로세스이다","D) ETL은 실시간 처리, ELT는 배치 처리 전용이다"],"answerIndex":1,"explanation":"ETL은 Extract → Transform → Load로 변환 후 적재하고, ELT는 Extract → Load → Transform으로 먼저 적재 후 변환한다. A는 둘의 설명이 반대이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C001"]},{"id":"S1_P3_Q002","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 수집","question":"실시간 데이터 수집에 주로 사용되는 도구는?","options":["A) Sqoop","B) Apache Kafka","C) Oozie","D) Hive"],"answerIndex":1,"explanation":"Apache Kafka는 실시간 스트리밍 데이터 수집·전송에 사용되는 분산 메시징 시스템이다. Sqoop은 배치 전송, Oozie는 워크플로 관리, Hive는 SQL 질의 도구이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C001"]},{"id":"S1_P3_Q003","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 수집","question":"다음 중 데이터 수집 방법에 대한 설명으로 적절하지 않은 것은?","options":["A) API를 통해 외부 시스템의 데이터를 수집할 수 있다","B) 로그 데이터는 내부 데이터 소스에 해당한다","C) 웹 크롤링은 법적 제약 없이 자유롭게 사용할 수 있다","D) 공공데이터 포털에서 공개 데이터를 다운로드할 수 있다"],"answerIndex":2,"explanation":"웹 크롤링은 대상 사이트의 이용약관, 저작권법, 개인정보보호법 등 법적 제약을 받는다. robots.txt 준수와 법적 검토가 필요하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C001"]},{"id":"S1_P3_Q004","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 유형 및 속성 파악","question":"다음 중 비율 척도에 해당하는 것은?","options":["A) 혈액형(A, B, O, AB)","B) 학점(A, B, C, D, F)","C) 섭씨 온도(°C)","D) 몸무게(kg)"],"answerIndex":3,"explanation":"비율 척도는 절대 영점이 있어 비율 계산이 가능한 척도이다. 몸무게 0kg은 '무게 없음'을 의미하므로 비율 척도이다. A는 명목, B는 서열, C는 등간 척도(0°C는 '온도 없음'이 아님)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C002"]},{"id":"S1_P3_Q005","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 유형 및 속성 파악","question":"등간 척도와 비율 척도의 가장 핵심적인 차이는?","options":["A) 순서를 매길 수 있는지 여부","B) 범주를 구분할 수 있는지 여부","C) 절대 영점의 존재 여부","D) 평균을 계산할 수 있는지 여부"],"answerIndex":2,"explanation":"등간 척도와 비율 척도 모두 간격이 동일하고 평균 계산이 가능하지만, 비율 척도만 절대 영점이 있어 배수 비교(2배, 3배 등)가 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C002"]},{"id":"S1_P3_Q006","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 유형 및 속성 파악","question":"메타데이터에 대한 설명으로 가장 적절한 것은?","options":["A) 분석 결과를 시각화한 차트이다","B) 데이터에 대한 데이터로 스키마, 생성일, 의미 등의 정보를 포함한다","C) 비정형 데이터만을 가리키는 용어이다","D) 데이터를 암호화하는 기술이다"],"answerIndex":1,"explanation":"메타데이터는 '데이터에 대한 데이터'로, 기술 메타데이터(스키마, 타입), 운영 메타데이터(생성일, 소유자), 비즈니스 메타데이터(의미, 규칙) 등을 포함한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C003"]},{"id":"S1_P3_Q007","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 변환","question":"Min-Max 정규화에 대한 설명으로 가장 적절한 것은?","options":["A) 데이터를 평균 0, 표준편차 1로 변환한다","B) 데이터를 0~1 범위로 변환한다","C) 데이터를 로그 스케일로 변환한다","D) 데이터를 범주형으로 변환한다"],"answerIndex":1,"explanation":"Min-Max 정규화는 (x - min) / (max - min) 공식으로 데이터를 0~1 범위로 변환한다. A는 Z-Score 표준화, C는 로그 변환, D는 이산화(Binning)의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C004"]},{"id":"S1_P3_Q008","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 변환","question":"One-Hot Encoding에 대한 설명으로 가장 적절한 것은?","options":["A) 연속형 변수를 구간으로 나누는 기법이다","B) 범주형 변수의 각 범주를 이진(0/1) 변수로 변환하는 기법이다","C) 데이터를 평균 중심으로 변환하는 기법이다","D) 결측치를 평균값으로 대체하는 기법이다"],"answerIndex":1,"explanation":"One-Hot Encoding은 범주형 변수의 각 범주를 별도의 이진(0 또는 1) 변수로 변환하는 기법이다. 범주가 n개이면 n개의 이진 변수가 생성된다. A는 이산화(Binning)이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C004"]},{"id":"S1_P3_Q009","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 변환","question":"Z-Score 표준화의 결과로 가장 적절한 것은?","options":["A) 모든 값이 0~1 사이로 변환된다","B) 평균이 0, 표준편차가 1이 되도록 변환된다","C) 모든 값이 양수로 변환된다","D) 데이터가 범주형으로 변환된다"],"answerIndex":1,"explanation":"Z-Score 표준화는 (x - 평균) / 표준편차 공식을 사용하여 평균 0, 표준편차 1인 분포로 변환한다. 음수 값도 나올 수 있으므로 0~1 사이나 양수 보장은 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C004"]},{"id":"S1_P3_Q010","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 비식별화","question":"다음 중 비식별 처리 기법이 아닌 것은?","options":["A) 가명처리","B) 총계처리","C) 데이터 마스킹","D) 데이터 복제"],"answerIndex":3,"explanation":"비식별 처리 기법에는 가명처리, 총계처리, 데이터 삭제, 데이터 범주화, 데이터 마스킹 등이 있다. 데이터 복제는 데이터를 복사하는 것이지 비식별 처리 기법이 아니다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C005"]},{"id":"S1_P3_Q011","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 비식별화","question":"k-익명성(k-Anonymity)에 대한 설명으로 가장 적절한 것은?","options":["A) 민감 속성 값이 k가지 이상의 다양성을 가져야 한다","B) 동일한 준식별자 조합을 가진 레코드가 최소 k개 이상이어야 한다","C) 데이터를 k개의 그룹으로 군집화하는 기법이다","D) 민감 속성의 분포 차이가 k 이하이어야 한다"],"answerIndex":1,"explanation":"k-익명성은 같은 준식별자(Quasi-Identifier) 조합을 가진 레코드가 최소 k개 이상 존재하도록 하여 개인 식별을 어렵게 만드는 모델이다. A는 l-다양성, D는 t-근접성의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C005"]},{"id":"S1_P3_Q012","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 비식별화","question":"l-다양성(l-Diversity)이 k-익명성의 한계를 보완하는 방식은?","options":["A) 준식별자의 수를 줄인다","B) 같은 그룹 내 민감 속성 값이 l가지 이상 다양하도록 보장한다","C) 데이터를 완전히 삭제한다","D) 절대 영점을 설정하여 비식별화한다"],"answerIndex":1,"explanation":"k-익명성은 동일 그룹 내 민감 속성이 모두 같은 값이면 추론이 가능하다는 한계가 있다. l-다양성은 이를 보완하여 같은 그룹 내 민감 속성이 최소 l가지 이상의 다른 값을 가지도록 보장한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C005"]},{"id":"S1_P3_Q013","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 비식별화","question":"가명정보에 대한 설명으로 올바르지 않은 것은?","options":["A) 개인정보보호법상 개인정보에 해당한다","B) 통계·연구·공익적 기록보존 목적으로 활용 가능하다","C) 안전조치 의무가 면제된다","D) 재식별 시도는 금지된다"],"answerIndex":2,"explanation":"가명정보는 개인정보에 해당하므로 안전조치 의무가 적용된다. 안전조치가 면제되는 것은 익명정보이다. A, B, D는 올바른 설명이다.","level":"core","verificationStatus":"law_check","relatedConceptIds":["S1_P3_C006"]},{"id":"S1_P3_Q014","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 품질 검증","question":"데이터 프로파일링에 대한 설명으로 가장 적절한 것은?","options":["A) 데이터의 오류를 수정하는 과정이다","B) 데이터의 구조, 분포, 이상치, 패턴을 자동으로 분석하는 진단 기법이다","C) 데이터를 시각화하여 대시보드로 만드는 과정이다","D) 데이터베이스의 인덱스를 최적화하는 기법이다"],"answerIndex":1,"explanation":"데이터 프로파일링은 데이터의 현황(구조, 분포, 이상치, 결측치 등)을 자동으로 분석·진단하는 기법이다. 오류 수정은 데이터 클렌징이 담당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C007"]},{"id":"S1_P3_Q015","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 품질 검증","question":"DQM(Data Quality Management)에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) 데이터 품질을 지속적으로 관리하는 체계이다","B) PDCA 순환 구조로 운영된다","C) 일회성 진단 후 종료되는 프로젝트이다","D) 데이터 거버넌스와 연계하여 관리한다"],"answerIndex":2,"explanation":"DQM은 일회성이 아니라 품질 정책 수립 → 진단 → 개선 → 모니터링의 PDCA 순환 구조로 지속적으로 운영되는 관리 체계이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C008"]},{"id":"S1_P3_Q016","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 적재","question":"CDC(Change Data Capture)에 대한 설명으로 가장 적절한 것은?","options":["A) 전체 데이터를 매번 새로 적재하는 방식이다","B) 원천 데이터의 변경분만 캡처하여 적재하는 방식이다","C) 데이터를 압축하여 저장하는 기술이다","D) 실시간 데이터를 시각화하는 도구이다"],"answerIndex":1,"explanation":"CDC는 원천 데이터베이스의 변경(Insert, Update, Delete)분만 캡처하여 타겟 시스템에 반영하는 방식으로, 전체 데이터를 매번 적재하는 것보다 효율적이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C009"]},{"id":"S1_P3_Q017","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 적재","question":"배치 적재와 실시간 적재의 비교로 올바르지 않은 것은?","options":["A) 배치 적재는 일정 주기로 대량 데이터를 한꺼번에 처리한다","B) 실시간 적재는 데이터 발생 즉시 처리한다","C) 배치 적재가 실시간 적재보다 항상 더 빠르다","D) 실시간 적재에는 Kafka, Spark Streaming 등이 사용된다"],"answerIndex":2,"explanation":"배치 적재는 대량 데이터를 효율적으로 처리하지만, 개별 데이터의 처리 지연(latency)은 실시간 적재보다 크다. '항상 더 빠르다'는 잘못된 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C009"]},{"id":"S1_P3_Q018","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 적재","question":"Apache Airflow에 대한 설명으로 가장 적절한 것은?","options":["A) 실시간 스트리밍 데이터 처리 엔진이다","B) DAG 기반의 워크플로 관리 및 스케줄링 도구이다","C) 분산 파일 시스템이다","D) NoSQL 데이터베이스이다"],"answerIndex":1,"explanation":"Airflow는 DAG(Directed Acyclic Graph, 방향 비순환 그래프) 기반으로 작업 간 의존성과 스케줄을 정의·관리하는 워크플로 오케스트레이션 도구이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C010"]},{"id":"S1_P3_Q019","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 저장","question":"데이터 웨어하우스와 데이터 레이크의 차이점으로 가장 적절한 것은?","options":["A) DW는 비정형 데이터 전용, 데이터 레이크는 정형 데이터 전용이다","B) DW는 Schema on Write, 데이터 레이크는 Schema on Read이다","C) DW와 데이터 레이크는 동일한 개념이다","D) 데이터 레이크는 소규모 데이터만 저장한다"],"answerIndex":1,"explanation":"데이터 웨어하우스는 정형 데이터를 사전 정의된 스키마로 저장(Schema on Write)하고, 데이터 레이크는 원본 형태로 저장 후 읽을 때 스키마를 적용(Schema on Read)한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C011"]},{"id":"S1_P3_Q020","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 저장","question":"데이터 마트에 대한 설명으로 가장 적절한 것은?","options":["A) 전사 데이터를 통합 저장하는 대규모 저장소이다","B) 특정 부서나 주제에 맞게 DW에서 추출한 소규모 저장소이다","C) 비정형 데이터를 원본 형태로 저장하는 저장소이다","D) 실시간 스트리밍 데이터 전용 저장소이다"],"answerIndex":1,"explanation":"데이터 마트는 특정 부서, 주제, 분석 목적에 맞게 데이터 웨어하우스에서 추출·가공한 소규모의 주제별 저장소이다. A는 DW, C는 데이터 레이크의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C011"]},{"id":"S1_P3_Q021","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 저장","question":"데이터 레이크하우스에 대한 설명으로 가장 적절한 것은?","options":["A) 데이터 웨어하우스의 다른 이름이다","B) 데이터 레이크의 유연성과 데이터 웨어하우스의 관리 기능을 결합한 아키텍처이다","C) NoSQL 데이터베이스의 일종이다","D) 온프레미스 전용 저장소 구조이다"],"answerIndex":1,"explanation":"데이터 레이크하우스는 데이터 레이크의 유연성(다양한 데이터 형태 저장)과 데이터 웨어하우스의 관리 기능(트랜잭션, 스키마 관리)을 결합한 최신 데이터 저장 아키텍처이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C011"]},{"id":"S1_P3_Q022","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 적재 및 저장","subtopic":"데이터 저장","question":"다음 중 오브젝트 스토리지의 특징으로 가장 적절한 것은?","options":["A) 고성능 I/O가 필요한 데이터베이스에 최적화되어 있다","B) 계층적 디렉토리 구조로 파일을 관리한다","C) 비정형·대용량 데이터 저장에 적합하며 AWS S3가 대표적이다","D) 운영체제 설치 전용 저장소이다"],"answerIndex":2,"explanation":"오브젝트 스토리지는 비정형·대용량 데이터를 플랫한 구조(계층 없이)로 저장하며 확장성이 높다. AWS S3가 대표적이다. A는 블록 스토리지, B는 파일 스토리지(NAS)의 특징이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C012"]},{"id":"S1_P3_Q023","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 유형 및 속성 파악","question":"다음 중 서열 척도에 해당하는 것은?","options":["A) 키(cm)","B) 성별","C) 학점(A, B, C, D, F)","D) 전화번호"],"answerIndex":2,"explanation":"학점은 A > B > C > D > F의 순서(서열)가 있지만 간격이 동일하다고 보장할 수 없으므로 서열 척도이다. A는 비율, B는 명목, D는 명목 척도이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C002"]},{"id":"S1_P3_Q024","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 비식별화","question":"데이터 마스킹에 대한 설명으로 가장 적절한 것은?","options":["A) 데이터를 다른 값으로 완전히 대체하는 기법이다","B) 데이터의 일부를 *, # 등으로 가려 식별을 어렵게 하는 기법이다","C) 데이터를 합계나 평균 등의 통계값으로 변환하는 기법이다","D) 식별 가능한 속성을 완전히 삭제하는 기법이다"],"answerIndex":1,"explanation":"데이터 마스킹은 데이터의 일부를 *, # 등의 기호로 가려서 원본 값을 알기 어렵게 하는 기법이다(예: 010-****-1234). A는 가명처리, C는 총계처리, D는 데이터 삭제에 해당한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C005"]},{"id":"S1_P3_Q025","subject":"빅데이터 분석 기획","part":"데이터 수집 및 저장 계획","section":"데이터 수집 및 전환","subtopic":"데이터 품질 검증","question":"데이터 품질 요소 중 '유일성(Uniqueness)'의 의미로 가장 적절한 것은?","options":["A) 데이터가 누락 없이 존재하는 정도","B) 동일한 데이터가 중복 없이 유일하게 존재하는 정도","C) 데이터가 규칙에 맞는 값인 정도","D) 데이터가 실제 값과 일치하는 정도"],"answerIndex":1,"explanation":"유일성(Uniqueness)은 동일한 데이터가 불필요하게 중복되지 않고 유일하게 존재하는 정도를 의미한다. A는 완전성, C는 유효성, D는 정확성의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S1_P3_C007","S1_P3_C008"]},{"id":"S2_P4_Q001","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 정제","question":"데이터 정제(Data Cleansing)에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) 오류, 불일치, 중복 데이터를 식별·수정·제거하는 과정이다","B) 데이터 전처리의 일부분이다","C) 데이터 정제와 데이터 전처리는 동일한 개념이다","D) 정제가 불완전하면 분석 결과의 신뢰성이 저하된다"],"answerIndex":2,"explanation":"데이터 정제는 전처리의 일부이다. 전처리에는 정제 외에도 변환, 통합, 축소 등 다양한 과정이 포함되므로 정제와 전처리를 동일시할 수 없다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C001"]},{"id":"S2_P4_Q002","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 결측값 처리","question":"결측 메커니즘 중 MCAR(Missing Completely At Random)에 대한 설명으로 가장 적절한 것은?","options":["A) 결측이 관측된 다른 변수에 의존하는 경우","B) 결측이 결측값 자체에 의존하는 경우","C) 결측이 완전 무작위로 발생하여 다른 변수와 무관한 경우","D) 결측이 특정 패턴을 따르는 경우"],"answerIndex":2,"explanation":"MCAR은 결측 발생이 어떤 변수와도 무관하게 완전히 무작위로 발생하는 경우이다. A는 MAR, B는 MNAR의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C002"]},{"id":"S2_P4_Q003","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 결측값 처리","question":"MNAR(Missing Not At Random)에 해당하는 예시로 가장 적절한 것은?","options":["A) 설문 응답 시 컴퓨터 오류로 무작위 결측 발생","B) 소득이 높은 사람이 소득 항목에 미응답하는 경향","C) 성별에 따라 특정 문항의 결측률이 다른 경우","D) 데이터 입력 시 무작위로 발생한 오타"],"answerIndex":1,"explanation":"MNAR은 결측이 결측값 자체에 의존하는 경우이다. 소득이 높을수록 소득 미응답이 많아지는 것은 '미관측된 값(소득) 자체'가 결측에 영향을 미치므로 MNAR이다. C는 MAR, A와 D는 MCAR에 가깝다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C002"]},{"id":"S2_P4_Q004","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 결측값 처리","question":"결측값 처리 방법 중 평균 대체법의 단점으로 가장 적절한 것은?","options":["A) 계산이 복잡하여 시간이 오래 걸린다","B) 데이터의 분산을 과소 추정한다","C) 데이터의 평균이 변경된다","D) 결측값이 있는 행을 삭제한다"],"answerIndex":1,"explanation":"평균 대체법은 모든 결측값을 동일한 평균값으로 채우므로 데이터의 변동성(분산)이 실제보다 줄어들어 과소 추정된다. 평균 자체는 변하지 않는다(C 오류). 삭제는 삭제법이다(D 오류).","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C003"]},{"id":"S2_P4_Q005","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 결측값 처리","question":"다중 대입법(Multiple Imputation)에 대한 설명으로 가장 적절한 것은?","options":["A) 결측값을 하나의 고정된 값으로 대체한다","B) 여러 번 대입하여 불확실성을 반영하므로 단일 대입보다 우수하다","C) 결측값이 있는 행을 모두 삭제한다","D) 결측값을 0으로 채우는 기법이다"],"answerIndex":1,"explanation":"다중 대입법은 결측값에 대해 여러 개의 대입 데이터셋을 생성·분석하고 결과를 통합하여 결측의 불확실성을 반영한다. 단일 대입(평균, 중앙값 등)보다 정확한 추정이 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C003"]},{"id":"S2_P4_Q006","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 이상값 처리","question":"IQR 방식으로 이상값을 판단할 때, 상한 기준은?","options":["A) Q3 + 1.0 × IQR","B) Q3 + 1.5 × IQR","C) Q3 + 2.0 × IQR","D) Q3 + 3.0 × IQR"],"answerIndex":1,"explanation":"IQR 방식에서 이상값 상한은 Q3 + 1.5 × IQR, 하한은 Q1 - 1.5 × IQR이다. IQR = Q3 - Q1이며, 1.5배를 곱한 범위를 벗어나면 이상값으로 판단한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C004"]},{"id":"S2_P4_Q007","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 이상값 처리","question":"이상값을 시각적으로 탐지하는 데 가장 적합한 차트는?","options":["A) 파이 차트","B) 박스플롯","C) 막대 그래프","D) 도넛 차트"],"answerIndex":1,"explanation":"박스플롯은 사분위수와 IQR을 기반으로 데이터의 분포를 표시하며, 수염(Whisker) 밖의 점으로 이상값을 직관적으로 확인할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C004"]},{"id":"S2_P4_Q008","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 이상값 처리","question":"윈저화(Winsorization)에 대한 설명으로 가장 적절한 것은?","options":["A) 이상값을 완전히 삭제하는 기법이다","B) 극단값을 특정 백분위수 값으로 대체하는 기법이다","C) 이상값을 0으로 변환하는 기법이다","D) 이상값을 별도의 데이터셋으로 분리하는 기법이다"],"answerIndex":1,"explanation":"윈저화는 극단값을 삭제하지 않고 특정 백분위수(예: 5th, 95th) 값으로 대체하여 극단값의 영향을 줄이는 기법이다. 삭제와 달리 데이터 손실이 없다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C005"]},{"id":"S2_P4_Q009","subject":"빅데이터 탐색","part":"데이터 전처리","section":"데이터 정제","subtopic":"데이터 이상값 처리","question":"이상값 처리 시 가장 먼저 고려해야 할 사항은?","options":["A) 이상값을 즉시 삭제한다","B) 이상값을 평균으로 대체한다","C) 도메인 지식을 기반으로 실제 오류인지 의미 있는 값인지 판단한다","D) 이상값이 포함된 변수를 제거한다"],"answerIndex":2,"explanation":"이상값은 실제 오류일 수도 있지만 의미 있는 극단적 관측치일 수도 있다. 무조건 삭제하면 중요한 정보를 잃을 수 있으므로 도메인 지식 기반 판단이 선행되어야 한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C005"]},{"id":"S2_P4_Q010","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 선택","question":"변수 선택 방법 중 필터법(Filter Method)에 대한 설명으로 가장 적절한 것은?","options":["A) 모델 성능을 기준으로 변수 조합을 탐색한다","B) 통계적 지표로 변수를 선별하며 모델과 독립적이다","C) 모델 학습 과정에서 변수 선택이 동시에 이루어진다","D) LASSO 정규화를 사용하는 방법이다"],"answerIndex":1,"explanation":"필터법은 상관계수, 카이제곱, 정보이득 등 통계적 지표를 사용하여 변수를 선별하며, 특정 모델에 의존하지 않는다. A는 래퍼법, C와 D는 임베디드법의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C006"]},{"id":"S2_P4_Q011","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 선택","question":"전진선택법(Forward Selection)에 대한 설명으로 가장 적절한 것은?","options":["A) 모든 변수를 포함한 상태에서 하나씩 제거한다","B) 변수 없는 상태에서 가장 유의미한 변수를 하나씩 추가한다","C) 변수를 추가하고 제거하는 과정을 반복한다","D) 모든 가능한 변수 조합을 전수 탐색한다"],"answerIndex":1,"explanation":"전진선택법은 변수가 없는 모델에서 시작하여 모델 성능을 가장 크게 개선하는 변수를 하나씩 추가하는 방법이다. A는 후진제거법, C는 단계적 선택법의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C006"]},{"id":"S2_P4_Q012","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 선택","question":"다중공선성(Multicollinearity) 진단에 사용되는 지표는?","options":["A) AUC","B) VIF","C) RMSE","D) F1-Score"],"answerIndex":1,"explanation":"VIF(Variance Inflation Factor, 분산팽창인자)는 독립변수 간 다중공선성을 진단하는 지표이다. AUC, RMSE, F1-Score는 모델 성능 평가 지표이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C014"]},{"id":"S2_P4_Q013","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 선택","question":"VIF 값이 10 이상인 경우 해석으로 가장 적절한 것은?","options":["A) 모델의 예측 정확도가 매우 높다","B) 심각한 다중공선성이 존재한다","C) 해당 변수가 종속변수에 매우 큰 영향을 미친다","D) 결측값 비율이 높다"],"answerIndex":1,"explanation":"VIF 10 이상은 심각한 다중공선성을 의미한다. 이는 해당 독립변수가 다른 독립변수들에 의해 거의 완벽히 설명될 수 있다는 뜻이며, 회귀계수 추정이 불안정해진다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C014"]},{"id":"S2_P4_Q014","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"차원축소","question":"PCA(주성분분석)에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) 분산을 최대화하는 방향으로 새로운 축을 생성한다","B) 비지도학습 기반의 차원축소 기법이다","C) 지도학습 기반으로 클래스 간 분산을 최대화한다","D) 수행 전 데이터 표준화가 필요하다"],"answerIndex":2,"explanation":"클래스 간 분산을 최대화하는 것은 LDA(선형판별분석)이다. PCA는 레이블(클래스) 정보를 사용하지 않는 비지도학습 기반 차원축소이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C007","S2_P4_C013"]},{"id":"S2_P4_Q015","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"차원축소","question":"PCA에서 적정 주성분 수를 결정하는 데 사용되는 시각화 도구는?","options":["A) 히스토그램","B) 스크리 도표(Scree Plot)","C) 파이 차트","D) 막대 그래프"],"answerIndex":1,"explanation":"스크리 도표(Scree Plot)는 주성분 번호별 고유값을 표시하여 고유값 감소 패턴(엘보우 포인트)으로 적정 주성분 수를 결정하는 데 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C013"]},{"id":"S2_P4_Q016","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"차원축소","question":"LDA(선형판별분석)와 PCA의 가장 핵심적인 차이는?","options":["A) LDA는 비선형, PCA는 선형이다","B) LDA는 지도학습, PCA는 비지도학습 기반이다","C) LDA는 차원 확대, PCA는 차원축소이다","D) LDA는 군집화, PCA는 분류에 사용된다"],"answerIndex":1,"explanation":"PCA는 레이블 없이 전체 분산을 최대화하는 비지도학습이고, LDA는 클래스 레이블을 이용하여 클래스 간 분산을 최대화하는 지도학습 기반 차원축소이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C007"]},{"id":"S2_P4_Q017","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"파생변수 생성","question":"파생변수(Derived Variable)에 대한 설명으로 가장 적절한 것은?","options":["A) 원본 데이터에 이미 존재하는 변수이다","B) 기존 변수를 조합·변환하여 새로 만든 변수이다","C) 결측값을 대체한 변수이다","D) 이상값만 포함하는 변수이다"],"answerIndex":1,"explanation":"파생변수는 기존 변수를 조합(덧셈, 곱셈 등), 변환(로그, 구간화 등), 추출(날짜에서 요일 추출 등)하여 새로 생성한 변수이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C008"]},{"id":"S2_P4_Q018","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"파생변수 생성","question":"특성 공학(Feature Engineering)에 대한 설명으로 가장 적절한 것은?","options":["A) 자동화된 알고리즘으로만 수행되는 과정이다","B) 도메인 지식을 활용하여 모델 성능을 높이는 파생변수를 설계하는 과정이다","C) 변수의 수를 줄이는 차원축소와 동일한 개념이다","D) 결측값을 처리하는 기법이다"],"answerIndex":1,"explanation":"특성 공학은 도메인 지식을 기반으로 원본 데이터에서 의미 있는 특성(파생변수)을 설계하여 모델 성능을 향상시키는 과정이다. 자동화만으로 이루어지지 않으며, 차원축소와는 다른 개념이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C008"]},{"id":"S2_P4_Q019","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 변환","question":"정규화(Normalization)와 표준화(Standardization)의 차이로 가장 적절한 것은?","options":["A) 둘은 동일한 기법이다","B) 정규화는 0~1 범위 변환, 표준화는 평균 0 표준편차 1로 변환한다","C) 정규화는 분포 변환, 표준화는 범위 변환이다","D) 정규화는 범주형 변수, 표준화는 연속형 변수에만 적용한다"],"answerIndex":1,"explanation":"정규화(Min-Max Normalization)는 데이터를 0~1 범위로 변환하고, 표준화(Z-Score Standardization)는 평균 0, 표준편차 1이 되도록 변환한다. 둘 다 연속형 변수에 적용한다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C009"]},{"id":"S2_P4_Q020","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 변환","question":"로그 변환의 주요 목적으로 가장 적절한 것은?","options":["A) 데이터를 0~1 범위로 변환한다","B) 오른쪽으로 치우친 분포를 정규분포에 가깝게 만든다","C) 범주형 변수를 수치로 변환한다","D) 결측값을 대체한다"],"answerIndex":1,"explanation":"로그 변환은 양의 왜도(오른쪽으로 치우친 분포)를 가진 데이터를 정규분포에 가깝게 변환하여 분석의 정확성을 높이는 데 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C009"]},{"id":"S2_P4_Q021","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 변환","question":"레이블 인코딩(Label Encoding)의 단점으로 가장 적절한 것은?","options":["A) 차원이 급증한다","B) 순서가 없는 범주에 적용하면 모델이 크기 관계를 학습할 수 있다","C) 이진 변수만 생성할 수 있다","D) 연속형 변수에만 적용 가능하다"],"answerIndex":1,"explanation":"레이블 인코딩은 범주에 정수(0, 1, 2...)를 부여하므로 순서가 없는 범주(예: 색상)에 적용하면 모델이 숫자의 크기를 의미 있는 것으로 잘못 학습할 수 있다. 차원 급증은 원-핫 인코딩의 단점이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C010"]},{"id":"S2_P4_Q022","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"불균형 데이터 처리","question":"SMOTE에 대한 설명으로 가장 적절한 것은?","options":["A) 다수 클래스의 샘플을 무작위로 제거하는 기법이다","B) 소수 클래스의 샘플을 단순 복제하는 기법이다","C) 소수 클래스 샘플 간 보간으로 합성 샘플을 생성하는 기법이다","D) 비용 함수를 조정하여 불균형을 처리하는 기법이다"],"answerIndex":2,"explanation":"SMOTE는 소수 클래스의 관측치와 KNN 이웃 사이를 선형 보간하여 새로운 합성 샘플을 생성한다. 단순 복제(B)가 아니며, A는 언더샘플링, D는 비용 민감 학습의 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C011","S2_P4_C012"]},{"id":"S2_P4_Q023","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"불균형 데이터 처리","question":"불균형 데이터에서 정확도(Accuracy)가 부적절한 평가 지표인 이유로 가장 적절한 것은?","options":["A) 계산이 너무 복잡하기 때문이다","B) 다수 클래스만 맞혀도 높은 정확도를 얻을 수 있기 때문이다","C) 연속형 데이터에만 사용 가능하기 때문이다","D) 정확도는 회귀 문제에서만 사용되기 때문이다"],"answerIndex":1,"explanation":"불균형 데이터(예: 다수 95%, 소수 5%)에서 모든 샘플을 다수 클래스로 예측해도 정확도가 95%가 되므로, 소수 클래스의 분류 성능을 반영하지 못한다. F1-Score, AUC 등이 더 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C011"]},{"id":"S2_P4_Q024","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 변환","question":"Box-Cox 변환에 대한 설명으로 가장 적절한 것은?","options":["A) 범주형 변수를 수치로 변환하는 기법이다","B) 최적의 변환 파라미터(λ)를 자동으로 찾아 정규성을 높이는 기법이다","C) 데이터를 항상 0~1 범위로 변환하는 기법이다","D) 결측값을 대체하는 기법이다"],"answerIndex":1,"explanation":"Box-Cox 변환은 최적의 파라미터 λ를 추정하여 데이터를 정규분포에 가깝게 변환한다. λ=0이면 로그 변환, λ=1이면 변환 없음에 해당한다. 양수 데이터에만 적용 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C009"]},{"id":"S2_P4_Q025","subject":"빅데이터 탐색","part":"데이터 전처리","section":"분석 변수 처리","subtopic":"변수 선택","question":"임베디드법(Embedded Method)에 해당하는 것은?","options":["A) 상관계수 기반 변수 선별","B) 전진선택법(Forward Selection)","C) LASSO 회귀를 통한 변수 선택","D) 카이제곱 검정 기반 변수 선별"],"answerIndex":2,"explanation":"임베디드법은 모델 학습 과정에서 변수 선택이 동시에 이루어지는 방법이다. LASSO(L1 정규화)는 학습 중 불필요한 변수의 계수를 0으로 만들어 자동으로 변수를 선택한다. A와 D는 필터법, B는 래퍼법이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P4_C006"]},{"id":"S2_P5_Q001","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"데이터 탐색 개요","question":"탐색적 데이터 분석(EDA)에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) 존 튜키(John Tukey)가 제안한 분석 접근법이다","B) 사전 가설을 통계적으로 검증하는 것이 주 목적이다","C) 데이터를 시각화·요약하여 패턴과 이상을 파악한다","D) 가설 없이 데이터 자체가 이야기하게 하는 접근이다"],"answerIndex":1,"explanation":"사전 가설을 검증하는 것은 확인적 데이터 분석(CDA)이다. EDA는 사전 가설 없이 데이터를 탐색하여 패턴을 발견하는 것이 목적이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C001","S2_P5_C014"]},{"id":"S2_P5_Q002","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"데이터 탐색 개요","question":"EDA의 4가지 주제(4R)에 해당하지 않는 것은?","options":["A) 저항성(Resistance)","B) 잔차(Residual)","C) 회귀(Regression)","D) 현시성(Revelation)"],"answerIndex":2,"explanation":"EDA의 4R은 저항성(Resistance), 잔차(Residual), 자료 재표현(Re-expression), 현시성(Revelation)이다. 회귀(Regression)는 4R에 포함되지 않는다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C001"]},{"id":"S2_P5_Q003","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"상관관계 분석","question":"피어슨 상관계수에 대한 설명으로 가장 적절하지 않은 것은?","options":["A) -1에서 +1 사이의 값을 갖는다","B) 두 변수 간 선형 관계의 강도와 방향을 나타낸다","C) 비선형 관계도 정확하게 측정할 수 있다","D) 연속형 변수 간 관계를 측정하는 데 주로 사용된다"],"answerIndex":2,"explanation":"피어슨 상관계수는 '선형 관계'만 측정한다. 두 변수 간 강한 비선형 관계가 있어도 피어슨 r은 0에 가까울 수 있다. 비선형 관계에는 스피어만 순위 상관계수가 더 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C002"]},{"id":"S2_P5_Q004","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"상관관계 분석","question":"다음 중 올바른 설명은?","options":["A) 상관관계가 높으면 반드시 인과관계가 있다","B) 상관관계는 인과관계를 의미하지 않는다","C) 인과관계가 없으면 상관관계도 없다","D) 피어슨 상관계수가 0이면 두 변수는 어떤 관계도 없다"],"answerIndex":1,"explanation":"상관관계는 인과관계를 의미하지 않는다(Correlation ≠ Causation). 제3의 변수(교란변수)에 의해 상관관계가 나타날 수 있다. D도 오류: 피어슨 r=0은 '선형 관계 없음'이며, 비선형 관계는 존재할 수 있다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C002"]},{"id":"S2_P5_Q005","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"상관관계 분석","question":"결정계수(R²)가 0.81일 때 상관계수(r)의 절대값은?","options":["A) 0.81","B) 0.9","C) 0.656","D) 0.405"],"answerIndex":1,"explanation":"결정계수 R²는 상관계수 r의 제곱이다. R²=0.81이면 |r| = √0.81 = 0.9이다. 방향(부호)은 R²로는 알 수 없다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C007"]},{"id":"S2_P5_Q006","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"이상값에 가장 강건(Robust)한 중심 경향 측도는?","options":["A) 산술 평균","B) 기하 평균","C) 중앙값","D) 조화 평균"],"answerIndex":2,"explanation":"중앙값(Median)은 데이터를 크기순으로 정렬했을 때 가운데 값이므로 극단적인 이상값에 영향을 받지 않아 강건(Robust)하다. 평균은 이상값에 민감하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C003"]},{"id":"S2_P5_Q007","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"오른쪽으로 꼬리가 긴 분포(양의 왜도)에서 평균, 중앙값, 최빈값의 크기 관계로 올바른 것은?","options":["A) 평균 < 중앙값 < 최빈값","B) 최빈값 < 중앙값 < 평균","C) 평균 = 중앙값 = 최빈값","D) 중앙값 < 최빈값 < 평균"],"answerIndex":1,"explanation":"양의 왜도(오른쪽 꼬리) 분포에서는 최빈값 < 중앙값 < 평균이다. 오른쪽의 극단값이 평균을 오른쪽으로 끌어당기기 때문이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C003","S2_P5_C013"]},{"id":"S2_P5_Q008","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"변동계수(CV)에 대한 설명으로 가장 적절한 것은?","options":["A) 분산을 제곱근한 값이다","B) 표준편차를 평균으로 나눈 값으로 단위가 다른 데이터의 산포를 비교할 수 있다","C) 데이터의 중심 위치를 나타내는 측도이다","D) 사분위 범위와 동일한 개념이다"],"answerIndex":1,"explanation":"변동계수(CV = 표준편차 / 평균)는 상대적 산포 측도로, 평균이 다른 데이터 간 산포를 비교할 때 유용하다. 단위가 없으므로 서로 다른 단위의 데이터도 비교 가능하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C003"]},{"id":"S2_P5_Q009","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"5-Number Summary에 포함되지 않는 것은?","options":["A) 최솟값","B) Q1(제1사분위수)","C) 평균","D) Q3(제3사분위수)"],"answerIndex":2,"explanation":"5-Number Summary는 최솟값, Q1, Q2(중앙값), Q3, 최댓값이다. 평균은 포함되지 않는다. 박스플롯은 이 5-Number Summary를 시각화한 것이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C004"]},{"id":"S2_P5_Q010","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"기초통계량 추출 및 이해","question":"왜도(Skewness)가 음수인 분포의 특징으로 가장 적절한 것은?","options":["A) 오른쪽 꼬리가 길다","B) 왼쪽 꼬리가 길다","C) 완전히 대칭이다","D) 분포가 뾰족하다"],"answerIndex":1,"explanation":"음의 왜도(Negative Skewness)는 왼쪽 꼬리가 긴 분포이다. 이 경우 평균 < 중앙값 < 최빈값이다. D는 첨도(Kurtosis)와 관련된 설명이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C013"]},{"id":"S2_P5_Q011","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"시각적 데이터 탐색","question":"연속형 변수의 분포를 확인하는 데 가장 적합한 시각화는?","options":["A) 파이 차트","B) 히스토그램","C) 막대 그래프","D) 트리맵"],"answerIndex":1,"explanation":"히스토그램은 연속형 변수의 값을 구간(bin)으로 나누어 각 구간의 빈도를 표시하여 분포를 확인하는 데 가장 적합하다. 막대 그래프는 범주형 변수의 비교에 사용된다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C005"]},{"id":"S2_P5_Q012","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"시각적 데이터 탐색","question":"두 연속형 변수 간 관계를 시각화하는 데 가장 적합한 차트는?","options":["A) 파이 차트","B) 히스토그램","C) 산점도(Scatter Plot)","D) 도넛 차트"],"answerIndex":2,"explanation":"산점도는 두 연속형 변수를 x축과 y축에 놓고 각 관측치를 점으로 표시하여 변수 간 관계(선형, 비선형, 군집 등)를 시각적으로 파악하는 데 가장 적합하다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C005","S2_P5_C006"]},{"id":"S2_P5_Q013","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"시각적 데이터 탐색","question":"시간에 따른 데이터 추세를 확인하는 데 가장 적합한 시각화는?","options":["A) 꺾은선 그래프(Line Chart)","B) 파이 차트","C) 히트맵","D) 박스플롯"],"answerIndex":0,"explanation":"꺾은선 그래프는 시간(x축)에 따른 값(y축)의 변화를 선으로 연결하여 추세, 변동, 패턴을 파악하는 데 가장 적합한 시각화이다.","level":"core","verificationStatus":"verified","relatedConceptIds":["S2_P5_C006"]},{"id":"S2_P5_Q014","subject":"빅데이터 탐색","part":"데이터 탐색","section":"데이터 탐색 기초","subtopic":"시각적 데이터 탐색","question":"히트맵(Heatmap)의 주요 용도로 가장 적절한 것은?","options":["A) 범주형 변수의 구성 비율 표시","B) 행렬 형태의 데이터를 색상
